body:
  text: 第十三優陀耶學童所問之義釋一尊者優陀耶曰離塵靜慮而為坐所作已辦成無漏一切諸法達彼岸我已前來為欲問無明破壞之狀態請語了知之解脫一一五離塵靜慮而坐之句中靜慮者是世尊由初禪而靜慮由第二禪而靜慮由第三禪而靜慮由第四禪而亦靜慮由有尋有伺有覺有觀禪而靜慮由無尋唯伺無覺有觀禪而靜慮由無尋無伺無覺無觀禪而亦靜慮由有喜禪而靜慮由無喜禪而靜慮由可意俱禪而靜慮由捨俱禪而亦靜慮由空禪而靜慮由無相禪而靜慮由無願禪而亦靜慮由世間禪而靜慮由出世禪而亦靜慮樂禪專念重善義此是靜慮離塵之句中貪是塵瞋是塵癡是塵忿是塵恨是塵乃至三九頁參照一切不善行是塵彼等諸塵於佛世尊所捨斷根絶如截頂之多羅樹於未來不生起者故佛是無塵者離塵者去塵者塵之捨斷者塵之離脫者貪塵而言非塵芥塵者貪之同義語彼等賢者捨離塵住於離塵之佛教中瞋塵而言非塵芥塵者瞋之同義語彼等賢者捨離塵住於離塵之教中癡塵而言非塵芥塵者癡之同義語彼等賢者捨離塵住於離塵之教中此是離塵坐者是世尊坐於波沙那迦塔廟此是坐達苦之彼岸牟尼坐山側三明破死神諸弟子近侍如斯世尊坐或又世尊於一切齷齪之安息故梵行已成所作已辨而坐乃至一二頁以下參照是最後之生老死輪回彼無再有如斯而亦世尊坐此是離塵靜慮而為坐之義尊者優陀耶曰之句中曰斯者此是句之接續句之次第尊者此是敬語敬重語尊重語尊敬語優陀耶是彼婆羅門之名乃至一頁參照稱呼此是尊者優陀耶曰之義所作已辦成無漏是於佛世尊所作已辦種種之可作者無故已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛所作已辦輪回之流已捨斷彼之比丘無愛著捨斷種種所作善惡比丘無有熱惱事此是所作已辦無漏之句中漏者是欲漏有漏見漏無明漏之四漏彼等諸漏佛世尊已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是無漏此是所作已辦成無漏之義一切諸法達彼岸者是世尊由知通一切諸法之到彼岸者由遍知之到彼岸者由捨斷之到彼岸者由修習之到彼岸者由作證之到彼岸者由等至定之到彼岸者由一切法知通之到彼岸者由一切苦遍知之到彼岸者由一切煩惱捨斷之到彼岸者由四沙門道修習之到彼岸者由一切滅作證之到彼岸者由一切等至之等至到彼岸者彼於聖戒得自在得第一於聖定得自在得第一於聖慧得自在得第一於聖解脫得自在得第一彼到彼岸達彼岸到終邊達終邊到終點達終點到究竟達究竟到最終達最終到救護所達救護所到避難所達避難所到歸依所達歸依所到無畏達無畏到無死達無死到不死甘露達不死到涅槃達涅槃彼梵行已成所作已辨乃至一二頁以下參照而為最後之生老死輪回於彼無再有此是一切諸法達彼岸之義我已前來為欲問者為問而我來為質問而我來為聞問而我來如斯是我已前來為欲問之義或又欲問之人人欲質問之人人欲聞問之人人之來來至接近如斯亦是我已前來為欲問由質問而前來之義或又我欲來問尊師尊師是有能者有力者與我共問而得語説答説示如斯是我已前來為欲問之義請語了知之解脫之句中了知之解脫者是向阿羅漢位之解脫請語向阿羅漢位之解脫言示施設確立開顯分別顯示説明此是請語了知之解脫之義無明破壞之狀態者是無明之壞破壞捨斷寂滅捨遣安息不死涅槃此是無明破壞之狀態之義故彼婆羅門言尊者優陀耶曰離塵靜慮而為坐所作已辦成無漏一切諸法達彼岸我已前來為欲問無明破壞之狀態請語了知之解脫二世尊宣示優陀耶愛欲之捨斷與憂之兩者昏沈之棄除後悔之遮除一一六愛欲之捨斷之句中欲者是對諸欲之所有欲欲欲貪欲喜欲愛欲愛情欲熱惱欲昏迷欲縛著欲暴流欲軛欲取欲貪蓋愛欲之捨斷者是愛欲之捨斷寂滅捨遣安息不死涅槃此是愛欲之捨斷之義世尊宣示優陀耶之句中優陀耶是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示優陀耶之義與憂之兩者之句中憂者是所有心之不可意心之苦心觸所生之不可意苦感心觸所生之不可意苦受與憂之兩者之捨斷者是愛欲與憂兩者之捨斷寂滅捨遣安息不死涅槃此是與憂之兩者之義昏沈之棄除之句中昏沈者是所有心之不善巧不適業鈍重魯鈍沈鬱沈滯沈滯性昏沈昏昧昏昧性昏沈之棄除者是昏沈之棄除捨斷寂滅捨遣安息不死涅槃此是昏沈之棄除之義後悔之遮除之句中後悔惡作者是由手惡作亦惡作後悔由足惡作亦是惡作由手與足之惡作亦是惡作想許不許者想不許許者想無罪為有罪想有罪為無罪斯誤行為後悔如斯之惡作追悔追悔性心之後悔意悔恨此言為惡作後悔又由作與不作之二原因而惡作心之後悔生起意悔恨作與不作故而惡作心之後悔生起意悔恨者云何謂我令作身惡行我已不作身善行而生起惡作心之後悔意悔恨我作語惡行我已不作語善行我作意惡行我不作意善行我作殺生我不作離殺生我作偷盜我不作離偷盜我作邪欲行我不作離邪欲行我作妄語我不作離妄語我作兩舌我不作離兩舌我作惡口粗語我不作離惡口我作綺語我不作離綺語我作貪欲我不作不貪欲我作瞋恚我不作不瞋恚我作邪見我不作正見而生起惡作心之後悔意悔恨如斯由作與不作之二原因而生起惡作心之後悔意悔恨或又我戒不圓滿而生起惡作心之後悔意悔恨我不守護諸根我不知食之適量我不勵警寤我不具備念正知我不修習四念處我不修習四正勤我不修習四神足我不修習五根我不修習五力我不修習七覺支我不修習八支聖道我不遍知苦我不捨斷集我不修習道我不為作證滅而生起惡作心之後悔意悔恨後悔之遮除者是後悔之遮障蓋覆捨斷寂滅捨遣安息不死涅槃此是後悔之遮除故世尊宣示世尊宣示優陀耶愛欲之捨斷與憂之兩者昏沈之棄除後悔之遮除三捨念之清淨前行法思擇了知之解脫無明之破壞一一七捨念之清淨之句中捨者於第四禪所有捨放捨捨置心平等性心安息性是心之中庸念者於第四禪關係於捨之所有念隨念乃至一八頁參照是正念此是捨與念清淨者於第四禪有捨念淨清淨遍白無穢隨煩惱之離去柔軟適業住立不動之得達此是捨念之清淨前行法思擇之句中法思擇者是正思惟此是了知解脫之初步是前是先行如斯是前行之法思擇或又法思擇者是正見此了知解脫之初步是前是先行如斯前行之法思擇或又法思擇者是於四沙門道之前分觀毗鉢舍那此是了知解脫之初步是前是先行如斯是前行法思擇我言了知之解脫之句中了知解脫是向阿羅漢位之解脫我言向阿羅漢位之解脫示施設確立開顯分別顯示説明此是了知之解脫之義無明之破壞之句中無明者對苦而無智乃至一二頁參照無明閂癡不善根無明之破壞者是無明之壞破壞捨斷寂滅捨遣安息不死涅槃此是無明之破壞之義故世尊宣示捨念之清淨前行法思擇了知之解脫無明之破壞四何結縛世間何使此運行由何物捨斷能言有涅槃一一八何結縛世間是何為世間之結縛懸著縛隨煩惱耶於何伴世間隨伴應相應懸懸著礙著耶此是何世間結縛之義何使此運行者是何者令彼行運行運轉耶由何而世間行運行運轉耶此是何使此運行之義由何物捨斷能言有涅槃者由何物之捨斷寂滅捨遣安息而能言有涅槃耶能説語話説明言説耶此是由何物捨斷能言有涅槃之義故彼之婆羅門言何結縛世間何使此運行由何物捨斷能言有涅槃五喜結縛世間尋使此運行渴愛之捨斷能言有涅槃一一九喜結縛世間之句中喜者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根世間所結縛懸著縛隨煩惱之喜於此喜之世間伴隨伴應相應懸懸著礙著此是喜結縛世間之義尋使此運行之句中尋者是欲尋恚尋害尋親里尋國土尋不死尋關係於向他人之憐憫尋關係於不輕賤尋之九尋此等言為九尋此等九尋使行彼世間使運行使運轉由此等之九尋而彼之世間行運行運轉此是尋使此運行之義渴愛之捨斷能言有涅槃之句中渴愛者是色愛聲愛香愛味愛觸愛法愛渴愛之捨斷能言有涅槃由渴愛之捨斷寂滅捨遣安息而能言有涅槃能説語話説明言説故世尊宣示喜結縛世間尋使此運轉渴愛之捨斷能言有涅槃六行者如何而有念行者之識止滅耶我等來向世尊問欲將聞彼尊師語一一一行者如何而有念者是如何而有念有正念而行行作動作活動護持持續維持此是行者如何而有念之義識止滅耶識滅耶寂滅耶滅沒耶安息耶此是識止滅耶之義我等來向世尊問者是可向佛世尊問可質問可乞可求可信樂我等前來接近到達與尊師相會此是我等來向世尊問之義欲將聞彼尊師語之句中彼者是尊師欲聞尊師之語語路説示示教教訓欲把取保持觀察此是欲將聞彼尊師語之義故彼婆羅門言示行者如何而有念行者之識止滅耶我等來向世尊問欲將聞彼尊師語七內與外之受不為歡喜者如斯而有念行者識止滅一一一一內與外之受不為歡喜者一對內之受而住於受隨觀不歡喜受不歡迎不於縛著捨斷歡喜歡迎縛著執執取住著除去滅除令之滅無二對外之受而住於受隨觀不歡喜受不歡迎不在於縛著捨斷歡喜歡迎縛著執執取住著除去滅除令之滅無三對內外之受而住於受隨觀不歡喜受不歡迎不在於縛著捨斷歡喜歡迎縛著執執取住著除去滅除令之滅無四住於隨觀內受之集法五住於隨觀內受之衰滅法六住於隨觀內受集之衰滅法七住於隨觀外受之集法八住於隨觀外受之集衰滅法九住於隨觀外受之集衰滅法十住於隨觀內外受之集法十一住於隨觀內外受之衰滅法十二住於隨觀內外受之集衰滅法不歡喜受不歡迎不在縛著捨斷歡喜歡迎縛著執執取住著及除去滅除令之滅無由於此等十二行相對受住於受隨觀不歡喜受不歡迎不在於縛著歡喜歡迎縛著乃至前方參照令之滅無或又觀受一無常不歡喜受不歡迎不在縛著捨斷歡喜歡迎縛著執執取住著及除去滅除令之滅無二是苦三是病四是癰五是箭六是痛七是惱乃至三頁參照三一是觀無歸依所而不歡喜受不歡迎不於縛著捨斷歡喜歡迎縛著執執取住著及除去滅除令之滅無日此等四十二行相對受住於受隨觀不歡喜受不歡迎而不在縛著捨斷歡喜歡迎縛著執執取住著及除去滅除令之滅無此是內與外之受不為歡喜者之義如斯而有念而行者是如斯有念有正知而行行作動作活動護持持續維持此是如斯而有念之義識止滅者是福行俱起之識非福行俱起之識不動行俱起之識滅寂滅滅沒安息此是識止滅之義故世尊宣示內與外之受不為歡喜者如斯而有念行者識止滅偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐優陀耶學童所問之義釋第十三畢
