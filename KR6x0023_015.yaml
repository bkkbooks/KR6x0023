body:
  text: 第十四布沙羅學童所問之義釋一尊者布沙羅曰説示過去之所之不動而為斷疑惑諸法到彼岸者佛我已前來為欲問一一一二説示過去之所之之句中所之者是彼世尊自存者無師者於未曾聞之諸法自正覺真諦者其時得一切知者力自在得者此是所之説示過去者是世尊亦説示自己及他人之過去亦説示未來亦説示現在世尊説示自己之過去者云何世尊對自己之過去亦説示一生亦説示二生亦説示三生亦説示四生亦説示五生亦説示十生亦説示二十生亦説示三十生亦説示四十生亦説示五十生亦説示百生千生十萬生諸多之壞劫諸多之成劫諸多之壞成劫即在我於某處已有斯名斯姓斯容貌斯食物斯苦樂之享受斯壽量其我由彼死而生於某處於彼處我有斯名斯姓斯容貌斯食物斯苦樂之享受斯壽量其我由彼死而生於此人界斯多説示宿住之樣相或素姓世尊説示他人之過去者云何世尊對他人之過去亦説一生亦説二生乃至亦説示諸多之壞成劫即彼於某處有斯名斯姓斯容貌斯食物斯苦樂之享受斯壽量彼由彼死而生於某處者於彼處彼有斯名斯姓斯容貌斯食物斯苦樂之享受斯壽量彼由彼死而生於此人界説示斯多之宿住之樣相或素姓世尊説五百本生談而説示自己及他人之過去大本經而説示自己及他人之過去大善見經説示自己及他人之過去大典尊經説示自己及他人之過去大天林經而説示自己及他人之過去又世尊已如斯説純陀關於過去世如來有念隨念之識只彼所望之物一切隨念純陀未來乃至純陀關於現在世如來生起覺所生之智此是最後之生今無再有根上下智是如來之如來力諸有情之意樂隨眠智是如來之如來力雙變智是如來之如來力大悲定智是如來之如來力一切智是如來之如來力無障智是如來之如來力於一切處無著無害無障智是如來之如來力如斯世尊亦説示自己及他人之過去亦説示未來亦説示現在言示施設確立開顯分別顯示説明此是説示過去之所之尊者布沙羅曰之句中曰斯者是句之接續尊者是敬語布沙羅者是彼婆羅門之名乃至一頁參照稱呼此是尊者布沙羅曰之義不動而為斷疑惑之句中動者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根佛世尊捨斷彼之動渴愛根絶如截頂之多羅樹成為滅無於未來不生起者故佛是不動者動之捨斷故是不動世尊於利得亦不動於不利得亦不動於名聲亦不動於不名聲亦不動於賞讚亦不動於毀訾亦不動於樂亦不動於苦亦不動不動不怖動不動搖不震不震動不震駭此是不動斷疑惑之句中疑惑者即對苦猶豫乃至一五頁參照心之硬直意困惑此之疑惑世尊已斷斷絶正斷寂滅安息不得生起以智火所燒故佛是斷疑惑此是不動斷疑惑之義一切諸法之到彼岸者佛世尊由知通是一切諸法之到彼岸者由遍知是到彼岸者由捨斷是到彼岸者由修習是到彼岸者由作證是到彼岸者由等至定是到彼岸者由一切法之知通是到彼岸者乃至二一四頁以下參照最後之生老死輪回而彼無再有此是一切諸法之到彼岸之義我已前來為欲問我已前來為欲問乃至二一五頁參照説示得語如斯我已前來為欲問之義故彼婆羅門言尊者布沙羅曰説示過去之所之不動而為斷疑惑諸法到彼岸者佛我已前來為欲問二無有色想事捨斷一切身內外無何物見者之觀處我問釋迦智佛斯人如何導一一一三無有色想事之句中色想者云何色界定之入定者於色界生起者又於色界現法樂住者之想想念已想念此是色想無有色想事者是得四無色定者之無有色想事為非有超超越離越此是無有色想事之義捨斷一切身者彼一切之結生色身由彼分捨斷超越捨斷鎮伏捨斷而捨斷彼之色身是捨斷故為捨斷一切身內外無何物見者之觀處之句中無何物者是無所有處定由何無何物是無所有處定耶於識無邊處定有念而入定由彼出定而其識是無非有觀消滅亦無何物由此無何物者是無所有處定此是內外無何物見者之觀處我問釋迦智之句中釋迦是釋迦族世尊由釋迦族出家故是釋迦乃至一一七頁參照是怖畏恐怖之捨斷者身毛豎立之離去者故是釋迦我問釋迦智我問者是彼於如何如何之住立如何類之欲如何智耶此是我問釋迦智之義斯人如何導彼應如何導耶應調伏耶應指導耶應令知耶應令省思耶應令觀察耶應令信樂耶如何令彼生起上級智耶斯人者如斯如彼令住立彼為彼之類彼部類之人即得彼無所有處定者此是斯人如何導之義故彼婆羅門言無有色想事捨斷一切身內外無何物見者之觀處我問釋迦智佛斯人如何導三世尊宣示布沙羅一切之識住知通如來言知有情止住解脫與趣至一一一四一切之識住者世尊是一知由行四識住二知由結生七識住一知由行四識住者云何即世尊已如斯説諸比丘近著於色識是續存立而住以色為所緣住立於色受用喜自增大生長而為廣大諸比丘或近著於受乃至諸比丘或近著於想乃至諸比丘或近著於行識乃續存立而住以行為所緣住立於行受用喜自增大生長而廣大如斯世尊知由行四識住二世尊知由結生七識住者云何即世尊如斯説諸比丘有此等之七識住七者云何諸比丘有種種身種種想之諸有情所謂一部之人與一部之天是一切之墮處惡趣此是第一識住諸比丘種種身同一想之諸有情所謂最初生記為梵衆天初禪天此是第二識住諸比丘同一身種種想之諸有情所謂光音天第二禪天此是第三識住諸比丘同一身同一想之諸有情所謂遍淨天第三禪天此是第四識住諸比丘普超越色想滅沒有對想不作意種種想虛空是無邊至空無邊處諸有情此是第五識住諸比丘普超空無邊處識是無邊至識無邊處諸有情此是第六識住諸比丘普超識無邊處已無何物至無所有處諸有情此是第七識住如斯世尊知由結生七識住此是一切之識住之義世尊宣布沙羅之句中布沙羅者是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示布沙羅之義知通如來之句中知通者是知通別知通達如來者即世尊關於如來如斯説純陀若過去之事不實不真其説不伴利益者如來即不解説此純陀若過去之事如實如真其説不伴利益如來亦不解説此純陀若過去之事如實如真其説如伴利益如來其時知其質問應為解説之時純陀若未來之事乃至純陀若現在之事而不實不真其説彼亦不伴利益如來不解説此純陀若現在之事而如實如真其説不伴利益如來亦不解説此純陀若現在之事而如實如真其説伴利益如來其時知其質問應解説之時如斯純陀對過去未來現在之諸法如來是時説者如實説者義説者法説者律説者故言如來純陀於含天含魔含梵天世界之人人於含沙門婆羅門含天人之人人見聞覺識得遍求以意所尋求之一切此由如來所現之正覺故言如來又純陀如來現正覺無上正等覺之夜於無餘涅槃界般涅槃於夜之中間説話説示一切之物如而不異故言如來純陀如來如説而行如行而説如斯説而行行如説故言如來於含天含魔含梵天之世界於含沙門婆羅門含天人之人人之間而如來自勝不他所勝見所有之物而得自在故言如來此是知通如來之義知其止助者是世尊由有情之業行此者身壞死後應生於苦界惡趣墮處地獄而知此之狀態世尊由有情之業行此者身壞死後應生於畜生界而知此之狀態世尊由業行此者身壞死後應生於餓鬼界而知此之狀態世尊由業行此者身壞死後應生於人中而知此之狀態世尊由業行此者身壞死後應生於善趣天界而知此之狀態即世尊如斯説舍利弗茲我以自己之心而悉知某者之心如此者身壞死後應生苦界惡趣墮處地獄如其行道如其動作以進斯道又舍利弗茲我以自己之心悉知某者之心如此者身壞死後應生於畜生界如其行道如其動作以進斯道又舍利弗茲我以自己之斯心悉知某者之心如此者身壞死後應生於餓鬼界如其行道如其動作以進斯道又舍利弗茲我以自己之心悉知某者之心如此者身壞死後應生於人中如其行道如其動作以進斯道又舍利弗茲我以自己之心悉知某者之心如此者身壞死後應生於善趣天界如其行道如其動作以進斯道又舍利弗茲我以自己之心悉知某者之心如此者諸漏盡無漏心解脫慧解脫於現世自知通作證具足而住如其行道如其動作以進斯道此是知彼之止住之義解脫與趣至之句中解脫者是於無所有處而解脫信解此以此為主又或世尊知此者信解色信解聲信解香信解味信解觸信解施主家信解衆信解住居信解利得信解名聲信解賞讚信解樂信解衣服信解食物信解臥坐所信解病者之資具醫藥信解經信解律信解論信解糞掃衣支信解但三衣支信解常乞食支信解次第乞食支信解一坐食支信解一鉢食支信解食後不食支信解阿練若住支信解樹下住支信解露地住支信解冢間住支信解隨處住支信解常坐不臥支信解初禪信解第二禪信解第三禪信解第四禪信解空無邊處定信解識無邊處定信解無所有處定信解非想非非處定此是解脫者其趣至是無所有處所成之其趣至即無所有處所成之業趣至異熟報之趣至應重業應重結生又或世尊知此者以色為趣至依據乃至前方參照以非想非非想為趣至此是解脫與趣至之義故世尊宣示世尊宣示布沙羅一切之識住知通如來言知彼之止住解脫與趣至四無所有處發生喜結為障礙及斯已知通然後觀其處彼有如實智住梵婆羅門一一一五知無所有之發生之句中無所有之發生因者是至無所有處之業行至無所有處業行知無所有之發生知懸著知結縛知礙著識考量度知辨知明暸此是知無所有之發生之義喜結為障礙之句中喜結者是無色貪由無色貪而其業是懸懸著礙著知喜結是無色貪知懸著知結縛知礙著識考量度知辨知明暸及者是此句之接續乃至一頁參照句之次第也此是喜結為障礙之義斯此已知通者是如斯此已知通知考量度知辨知明暸此是如是斯此已知通之義然後觀其處者於無所有處入定由其處出定而觀於其處所生之心心所法無常觀苦病乃至三頁參照觀無歸依所見眺省思普觀此是然後觀其處之義彼有此如實智者彼有此之如理事實如真不顛倒智此是彼有此如實智之義住者婆羅門之句中婆羅門者是拒外七法故為婆羅門乃至一一頁參照無依止者此言婆羅門此是婆羅門住者是善凡夫及七有學為得未得為得達未得達為作證未作證而住止住遍住阿羅漢已住梵行所作已辦卸下重擔隨得妙義遍盡有結有完全智解脫彼梵行已成所作已辦乃至一二頁參照為最後之生老死輪回於彼無再有此是住者婆羅門之義故世尊宣示無所有發生喜結為障礙及斯已知通然後觀其處彼有如實智住者婆羅門偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐布沙羅學童所問之義釋第十四畢
