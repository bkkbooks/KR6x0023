body:
  text: 第十一暗都乾耳學童所問之義釋一尊者暗者乾耳曰雄者不欲欲者我有聞佛越暴流可來問俱生眼者語寂句世尊彼之如真請語我一九六雄者不欲欲者我有聞之句中聞者是聽把持保持觀察即斯彼之世尊是阿羅漢等正覺者明行具足者善逝世間解無上者調御丈夫天人師佛世尊我聞雄者是雄者英雄世尊是具精進者故是雄者有能者故是雄者權力者故是雄者有用者故是雄者是勇者英雄戰士無怖者無懼者無駭者無敗走者怖畏恐怖之捨斷者身毛豎立之離去者故是雄者離此世之一切諸惡彼精進者越地獄苦有精進與有精勤者斯人其故而言雄者此雄者我聞之義不欲欲者之句中欲概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲佛世尊遍知事欲捨斷煩惱欲事欲之遍知與煩惱欲之捨斷故世尊不欲諸欲不冀求諸欲不喜悅諸欲不熱望諸欲故佛為無欲者不欲者捨欲者唾棄欲者脫欲者捨斷欲者捨遣欲者離貪者離去貪者捨貪者唾棄貪者脫貪者捨斷貪者捨遣貪者無愛者煩惱消滅者清涼者樂受者為梵而自住此是雄者不欲欲者我有聞之義尊者暗都乾耳曰之句中曰斯者是此句之接續乃至一頁參照句之次第尊者者此是敬語敬重語尊敬語暗都乾耳者彼波羅門之姓乃至一頁參照稱呼此是尊者暗都乾耳曰之義佛越暴流可來問之句中越暴流者是越暴流者超暴流超越離越者此是越暴流之義可問者是可問問乞求可信樂我等可來問無欲者者可問不欲者捨欲者唾棄欲者脫欲者捨斷欲者捨遣欲者離貪者離去貪者捨貪者唾棄貪者脫貪者捨斷貪者捨遣貪者我等來是來者接近達與尊師相會此是佛越暴流可來問之義俱生眼者語寂句之句中寂者若依一方面寂亦與寂句同一此是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃即世尊已如斯說此是寂句此是勝妙句即一切行之止一切依之捨遣渴愛之滅盡離貪滅涅槃或又依他方面寂句是所有寂之得達寂之觸達所至寂之作證諸法所謂四念處四正勤四神足五眼五力七覺支八支聖道此等言為寂句語寂句者救護所句避難所句歸依所句無畏句無死句不死句涅槃句言示施設確立開顯分別顯示說明俱生眼者之句中眼者是一切知智佛世尊之眼與勝者位於菩提樹下而非前後一剎那生起故佛是俱生眼者此是俱生眼者語寂句之義世尊彼之如真請語我之句中如真者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者請語彼於我請語言乃至同頁前面參照說明此是世尊彼之如真請語我之義故彼婆羅門言尊者暗都乾耳曰雄者不欲欲者我有聞佛越暴流可來問俱生眼者語寂句世尊彼之如真請語我二太陽威光打勝地世尊動作勝諸欲語我小慧廣慧者我可識知語所法捨斷此世之生老一九七世尊動作勝諸欲之句中世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者諸欲者概言之事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲世尊遍知事欲捨斷煩惱欲打勝者是打勝打超奪去粉碎而行行作動作活動護持持續維持此是世尊動作勝諸欲之義太陽威光打勝地之句中太陽者是日輪地者是土地譬如有威光之日輪以威光具備威光打勝於地勝打超奪去熱照破斥一切虛空之物摧破黑暗放光明於虛空行於中天之軌道斯有智之威光之世尊具備智之威光一切行之集原因乃至煩惱之暗摧破無明之暗黑放智之光明而遍知事欲捨斷煩惱欲打勝勝打超奪去粉碎而行行作動作活動護持持續維持此是太陽威光打勝地之義語我小慧廣慧者我是小慧者下劣慧者劣小慧者尊師是大慧者博慧者疾慧者速慧者利慧者擇慧者廣者是地如地其廣大為廣博之慧此是語我小慧廣博者之義我可識知語所法之句中語法者是初善中善後善而有義有文完全圓滿遍淨梵行語四念處四正勤四神足五根五力七覺支八支聖道涅槃至涅槃行道言示施設確立開顯分別顯示說明此是語法之義我可識知語所法我可知識知別知通達得達觸達作所證之法此是我可識知語所法之義捨斷此世之生老者是此世之生老死之捨斷寂滅捨遣安息不死涅槃此是捨斷此世之生老之義故彼婆羅門言太陽威光打勝地世尊動作勝諸欲語我小慧度慧者我可識知語所法捨斷此世之生老三世尊宣暗都乾耳調伏對諸欲貪求如是見出離安穩執著亦應捨離者於汝何物令勿存一九八調伏對諸欲貪求之句中諸欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲貪求者言渴愛為貪求即所有貪染貪乃至一三頁參照貪欲貪不善根調伏對諸欲貪求者須調伏折伏捨斷除去滅除令之滅無此是調伏對諸欲貪求之義暗都乾耳者是世尊呼彼婆羅門之姓世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣暗都乾耳之義見出離安穩之句中出離者是安穩正行道隨順之行道無害之行道隨義之行道法隨法之行道諸戒之完成諸根之守護對食而知量向警寤之努力念正知四念處四正勤四神足五根五力七覺支八支聖道涅槃向涅槃之行道是救護所避難所歸依所在於歸依之狀態者無畏無死不死涅槃見觀考量度知辨知明暸此是見出離安穩之義執著應被捨離者之句中執著者由愛見而取執取住著縛著信解應捨離者是應捨離應脫者應捨斷者應除去者應滅除者應令之滅無者此是執著應捨離者之義於汝何物令勿存者是貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有此等所有何物於汝勿令存在事勿令在勿令存在事須捨斷除去滅除令之滅無此是於汝何物令勿存之義故世尊宣示世尊宣示暗都乾耳調伏對諸欲貪求如是見出離安穩執著亦應捨離者於汝何物令勿存四涸渴前過去所之物後未來何物汝亦無若於中現在汝不執汝將成行為寂靜一九九涸渴前所之物關於過去之諸行可所生起之諸煩惱一切須令涸令涸渴令乾盡令之無種捨斷除去滅除令之滅無如斯是涸渴前所之物之義或又涸過去之業行未受所報之諸業行涸渴乾盡令之無種捨斷除去滅除令之滅無如斯是涸渴前所之物之義後成何物汝亦無未來言為後關於未來之諸行所生起之貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有此等所有何物於汝無所有不令現前不生不發生不起不生起捨斷除去滅除令之滅無此是後成何物汝亦無之義若成為中汝不執中成為現在之受想行識由於愛現在之諸行由於見而汝不執不執著不執受如不住著捨斷歡喜歡迎縛著執執取住著除去滅除如使為滅無此是若成為中汝不執之義汝將成行為寂靜貪之寂之故成為寂靜瞋之寂故成為寂靜癡之寂故成為寂靜忿恨乃至三九頁參照一切不善行之寂之故寂止之故寂滅之故消盡之故消滅之故離去之故安息之故成為寂成為寂靜寂滅消滅安息而汝將成行將成行作將成動作將成活動將成護持將成持續將成維持此是汝將成行為寂靜之義故世尊宣示固渴前所之物後何物汝亦無若於中汝不執將於汝行寂靜五婆羅門普對名與色於離貪求者為死所左右彼無諸漏事一一婆羅門普對名與色於離貪求者之句中普者是普皆一切之一切無殘無餘名者是四無色蘊色者是四大種及四大種所造色貪求者是渴愛即彼所有之貪染貪乃至一三頁參照貪欲貪不善根婆羅門普對名與色為離貪求者是普對名色之離貪求者離去貪求捨貪求唾棄貪求脫貪求捨斷貪求捨遣貪求者此是婆羅門普對名色離貪求者之義彼無諸漏事之句中漏者是欲漏有漏見漏無明漏之四漏彼者是阿羅漢漏盡者無此事者是此等之諸漏於彼為無有不存不存在不能得捨斷正斷寂滅安息不得生起以智火所燒此是彼無諸漏事之義為死所左右者其等為諸漏應為死所左右應為死神所左右應為魔黨所左右之無有諸漏事不存不存在不能得捨斷正斷寂滅安息不得生起以智火所燒者此是為死所左右故世尊宣示婆羅門普對名與色於離貪求者為死所左右彼無諸漏事偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐暗都乾耳學童所問之義釋第十一畢
