body:
  text: 第九刀提耶學童所問之義釋一尊者刀提耶曰無有諸欲之住在無有渴愛之存事且度所疑惑之人斯人如何有解脫一八八無有諸欲之住者是不住諸欲不共住不止住尊者刀提耶曰之句中曰斯者是句之接續乃至一頁參照句之次第尊者此是敬語敬重語尊重語尊敬語刀提耶者是彼婆羅門之名乃至一頁參照稱呼此是尊者刀提耶曰之義無有渴愛之存事者是無有渴愛不存在不能得被捨斷正斷寂滅安息不得生起以智火燒者此是無有渴愛存在事之義且度所疑惑之人者是且度疑惑越度超度超超越離越之人此是且度所疑惑之人之義斯人如何有解脫如斯之人如何使如何住立如何類之不論如何解脫是可欲求耶以問彼之解脫此是斯人如何有解脫之義故彼婆羅門言尊者刀提耶曰無有諸欲之住在無有渴愛之存事且度所疑惑之人斯人如何有解脫二世尊宣示刀提耶無有諸欲之住在無有渴愛之存事且度所疑惑之人斯人別無有解脫一八九無有諸欲之所住之句中所者是阿羅漢漏盡者諸欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲無住者是不住諸欲不共住不止住此是無有諸欲之所住之義世尊宣示刀提耶之句中刀提耶者是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示刀提耶之義無有渴愛之所存之句中渴愛是色愛聲愛香愛味愛觸愛法愛所者是阿羅漢漏盡者無有渴愛之所存者是無有渴愛不存在不能得被捨斷正斷寂滅安息不得生起以智火所燒者此是無有渴愛之所存之義且度所疑惑之人之句中疑惑者是疑即對於苦猶豫乃至一五頁參照是心之硬直意之困惑所之人者是阿羅漢漏盡者且度所疑惑之人者是且度疑惑越度超度超超越離越之人此是且度所疑惑之人之義斯人別無有解脫如斯之人由彼解脫所應解脫者別無解脫云何於如斯之人由解脫而應為耶此是斯人別無有解脫之義故世尊宣示世尊宣示刀提耶無有諸欲之住在無有渴愛之存事且度所疑惑之人斯入別無有解脫三彼成無意樂者耶又成為意槳者耶彼成為具慧者耶又由慧計度者耶釋迦佛我欲如實知牟尼普眼者佛請向我為教說彼一九彼成無意樂者耶又成為意樂者耶彼是無渴愛者耶又是有渴愛者耶即望色耶望聲香味觸施主家衆住居利得名聲賞讚安樂衣服食物臥坐所病者之資具藥品欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有過去未來現在見聞覺識之諸法欲求樂冀求希望熱望耶此是彼成無意樂者耶又成為意樂者耶之義彼成為具慧者耶又由慧計度者耶之句中為具慧者耶者是彼為具慧者智者辨知者有慧者耶又由慧成計度者耶或由八等至之智又五神通之智又由邪智而計度愛又計度見計度生計度發生起令生起耶此是彼成為具慧者耶又由慧計度者耶之義釋迦佛我欲如實知牟尼之句中釋迦者是世尊由釋迦族出家故而為釋迦或又有富者大富者具財者故亦為釋迦彼有此等諸財信財戒財慚財愧財聞財捨財慧財念處財神足財根財力財覺支財道財果財涅槃財由此等多數之財寶而富者大富者具財者故亦為釋迦或又可能者有能者權力者有用者勇者英雄戰士無怖者無懼者無駭者無敗走者怖畏恐怖之捨斷者身毛豎立之離去者故亦為釋迦釋迦我欲如實知牟尼者釋迦我欲知彼之牟尼識知別知欲通達此是釋迦我欲如實知牟尼之義普眼者請向我為教說彼之句中彼者是我問我乞我求我信樂教說者是請言示施設確立開顯分別顯示說明普眼者是言一切知智為普眼乃至一一六頁參照如來以其故是普眼者此是普眼者請向我為教說彼之義故彼婆羅門言彼成無意樂者耶又成為意樂者耶彼成為具慧者耶又由慧計度者耶釋迦佛我欲如實知牟尼普眼者佛請向我為教說彼四彼成為無意樂者彼不成為意樂者彼已成為具慧者非由慧為計度者刀提耶不著欲有無所有應須如斯識牟尼一九一彼成為無意樂者彼不成為意樂者彼是無渴愛者不為有渴愛者即不望色聲香乃至一七七頁參照不望見聞覺識之諸法不欲求不樂不冀求不希望不熱望此是彼成為無意樂者彼不成為意樂者之義彼已成為具慧者非由慧為計度者之句中彼已成為具慧者彼是賢者具慧者覺慧者智者辨知者有慧者非由慧為計度者由八等至之智又五神通之智又邪智而計度愛又計度見計度不生計度不發生不起不生起此是彼已成為具慧者非由慧為計度者之義刀提耶應須如斯識牟尼者牟尼智言為牟那乃至八四頁以下參照超著與網者此是牟尼刀提耶牟尼乃為如斯識者刀提耶須如斯知識別知牟尼此是刀提耶應須如斯識牟尼之義不著欲有無所有之句中無所有者是貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有捨斷此等所有正斷令寂滅安息不得生起以智火所燒者言彼為無所有欲有之句中欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照言此等為事欲乃至二八頁參照言此等為煩惱欲有者是業有與結生再有之二有乃至九三頁參照此是結生再有不著欲有無所有是無所有而不著欲與有不懸不懸著不礙著出離其等棄遣離脫離縛以不限定之心而住故世尊宣示彼成為無意樂者彼不成為意樂者彼已成為具慧者非由慧為計度者刀提耶不著欲有無所有應須如斯識牟尼偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐刀提耶學童所問之義釋第九畢
