body:
  text: 第五度多迦學童所問之義釋一尊者度多迦曰世尊我問尊師請語我大仙尊師之語我期待聞尊師說法音聲可學自己之寂滅一六一世尊我問尊師請語我之句中我問者為明解未見之問為令他合流己見之問為斷疑念之問之三問乃至六三頁以下參照此是三問乃至四九頁以下參照是涅槃問我問尊師者我問於尊師乞於尊師求於尊師信樂於尊師請為我說此是我問尊師之義世尊者是尊重之同義語乃至一二頁以下參照請語我者請語我請言示施設確立開顯分別說明此是世尊我問尊師請語我之義尊者度多迦曰之句中曰如斯者此是句之接續尊者是敬語度多迦者是彼婆羅門之名乃至一頁參照稱呼此是尊者度多迦曰之義大仙尊師之語我期待者我期待尊師之語語路說示示教教訓而期待欲樂冀求希望熱望大仙者由何之義而為大仙耶世尊求大戒蘊覓求遍求故是大仙乃至一二頁參照人牛王於何處耶求覓求遍求故是大仙此是大仙尊師之語我期待之義聞尊師之音聲聞尊師之語語路說示示教教訓聽把持保持觀察此是聞尊師之音聲之義可學自己之寂滅之句中可學者是增上戒學增上心學增上慧學之三學乃至二五頁以下參照此是增上慧學可學自己之寂滅者為貪之消滅瞋之消滅癡之消滅忿之消滅恨之消滅乃至四一頁參照為一切不善行之寂寂靜寂滅消滅捨遣安息亦學增上戒亦學增上心亦學增上慧顧念學此等三學知而學見而學觀察而學於心決意而學以信信解而學勵精進而學令現起念而學等持心而學以慧知解而學知通應知通而學以信信解而學遍知應遍知而學捨斷應捨斷而學修習應修習而學作證應作證而學應行應修行應正行應行正持此是可學自己之寂滅之義故彼婆羅門言尊者度多迦曰世尊我問尊師請語我大仙尊師之語我期待聞尊師說法音聲可學自己之寂滅二世尊宣示度多迦然而須熱心茲佛教有智有念由茲聞音聲可學自寂滅一六三然而須熱心者須熱心須努力須勤勉須精進須堅固心須精勤令生努力之欲令發生令現起令起令生起此是然而須熱心之義世尊宣示度多迦之句中度多迦者是世尊呼彼婆羅門之名世尊者此是尊重同義語乃至一二頁以下參照是與作證共同施設者此是世尊宣示度多迦之義茲有智有念之句中茲者是於此佛教之見於此之忍智於此之意欲於此之持說於此之法於此之律於此之法與律於此之宣說於此之梵行於此之師佛教於此之身體於此之人界有智者是有智者賢者有慧者覺慧者智者辨知者慧者有念者是由四原因而有念即對於身修習身隨觀念處而有念乃至三頁以下參照言彼為有念此是茲有智有念之義由茲聞音聲者是由茲聞我語語路說示示教教訓聽聽取把取保持觀察此是由茲聞音聲之義可學自寂滅之句中可學者是增上戒學增上心學增上慧學之三學乃至二五頁以下參照此是增上慧學可學自寂滅者為貪之消滅瞋之消滅癡之消滅忿之消滅恨之消滅乃至三九頁參照為一切不善行之寂寂靜寂滅消滅捨遣安息亦學增上戒亦學增上心亦學增上慧顧念此等三學而可學知而學乃至一一二頁參照作證應作證而學可行修行正行正持而行此是可學自寂滅之義故世尊宣示世尊宣示度多迦然而須熱心茲有智有念由茲聞音聲可學自寂滅三我見天與人之世界動作無所有婆羅門普眼者我將禮尊師釋迦佛度我諸疑惑一六三我見天與人之世界之句中天者是一世俗天二生起天三清淨天之三天一世俗天者云何世俗天是王王子王后二生起天者云何生起天者是四大王天三十三天夜摩天都率天化樂天他化自在天梵衆天及其上之天三清淨天者云何清淨天者是如來之弟子聲聞之阿羅漢漏盡者及辟支佛緣覺世尊是世俗天生起天清淨天中之天是勝之天天中之勝天是師子中之師子是龍中之龍衆主中之衆主牟尼中之牟尼王中之王我見天與人之世界者於人間世間我見天見勝之天見天中之勝天觀眺省思普觀此是我見天與人之世界之義動作無所有婆羅門之句中無所有者是貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有之捨斷於佛世尊捨斷彼等諸所有能根絶如截多羅樹頂而為滅無於未來不生起者故世尊是無所有者婆羅門者世尊乃拒外七法故是婆羅門即拒外有身見拒外疑拒外戒禁取拒外貪拒外瞋拒外癡拒外慢彼世尊拒外雜染而齎再有有不安有苦報於未來齎生老死諸惡不善法世尊宣示薩毗耶離垢斥一切諸惡等持善心自住立有諸功德越輪回無依止者婆羅門動作者是有行行作動作活動護持持續維持此是動作無所有婆羅門之義普眼者我禮尊師之句中尊師者是言世尊禮拜者是由身而禮拜由語而禮拜由意而禮拜由隨義之行道而禮拜由法隨義之行道而禮拜恭敬尊重尊敬奉事敬重普眼者之句中普眼者是一切知智世尊具一切知智正具達正達成正成具備彼不能見之物此世亦無何物又不能識之物亦無不可知者可能知之物一切此皆知通旨此如斯之故如來是普眼者此是普眼者我禮拜尊師之義釋迦佛度我諸疑惑之句中釋迦者是世尊由釋迦族出家故而為釋迦或又富者大富者具財者故亦為釋迦彼有此等諸財所謂信財戒財慚財愧財聞財捨財慧財念處財神足財根財力財覺支財道財果財涅槃財由此等多數之財寶而是富者大富者具財者故亦是釋迦或又可能者權力者有用者勇者英雄戰士無怖者無懼者無駭者無財走者怖畏恐怖之捨斷者身毛豎立之離去者故亦是釋迦疑惑者是疑即對苦猶豫疑對苦之集猶豫對後際猶豫對前後際猶豫對此緣性之諸緣起法猶豫是對所有如斯猶豫疑問猶豫性疑念疑迷惑二路疑惑多岐取不決定不確定不沈潛心之硬直意困惑釋迦佛度我諸疑惑者放我諸疑惑箭請脫我請度脫我請拔取我請拔去我請使我上起此是釋迦佛度我諸疑惑之義故彼之婆羅門言我見天與人之世界動作無所有婆羅門普眼者我禮拜尊師釋迦佛度我諸疑惑四度多迦我於世間不能度脫疑惑者但汝自了最勝法如斯汝可度暴流一六四我不能令度脫之句中我不能由疑惑箭放汝解放令脫令度脫拔取拔去起上此是我不能令度脫之義或又不信不欲懈怠而乏精進向不行道人說法我無力不堪不努力不勵行不努力不盡力不用力不堅固心不精進不生努力之欲不令發生不起不令生起此是我不能令度脫之義或又其他何人亦無可使脫若彼等欲脫彼由於己力勢由於己力由於己精進由於己發勤由於己堅強力勢由於己堅強力由於己堅強精進力由於己堅強發勤且自行道之正行道隨順之行道隨義之行道法隨法之行道可令脫此是我不能使度脫之義即世尊已如斯說純陀實彼自陷泥沼其他無有道理可救出陷於泥沼純陀實彼自不調御不周伏不寂滅其他無有道理可調御調伏令寂滅此是我不能令度脫之義又世尊已如斯說自如行惡自污染自如不行惡自淨不可淨他各自淨如斯亦是我不能令度脫之義又世尊如斯說如斯婆羅門涅槃存在至涅槃是道亦存在宣教者之我亦存在而我諸弟子受我如斯之教誡如斯之教示一部者令成滿究極涅槃一部者未成滿婆羅門此時我為何耶婆羅門如來是說道者只被問而宣說道學人自行道而不可不解脫如斯亦是我不能令度脫之義度多迦我於世間不能度脫任何疑惑者之句中疑惑者是有疑惑猶豫栽頑迷迷惑疑之人是剎帝利婆羅門毗舍首陀在家者出家者天人亦是於世間者是惡趣世間乃至一八頁參照而於處世間此是度多迦我於世間不能度脫任何疑惑者之義但汝且了最勝法之句中最勝法者是不死涅槃是所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃最勝者是最高最勝最殊勝透逸最上勝妙之法且了知是且了知識知別知通達此是但汝且了最勝法之義如斯汝可度暴流如斯汝可度欲流有流見流無明流可超越可離越此是如斯汝可度暴流之義故世尊宣示度多迦我於世間不能度脫疑惑者但汝自了最勝法如斯汝可度暴流五梵者悲愍請教授我可識知遠離法恰如虛空無障礙可行無依茲寂靜一六五梵者悲愍請教授之句中梵者請教授梵者請教授者乃梵者請攝取梵者請憐愍此是梵者請教授之義悲愍者是悲愍哀愍隨護攝取憐愍此是梵者悲愍請教授之義我可識知遠離法之句中遠離法者是不死涅槃即是所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃我可識知者是我可知可識知可別知可所通達此是我可識知遠離法之義恰如虛空無障礙者是恰如虛空無著無縛無結縛如斯無著無縛不結縛此是如虛空無障礙譬如虛空而亦血赤色而亦鬱金色而赤青色亦深紅色而不染如斯不染不污不昏迷不染污此亦是如虛空無障礙譬如虛空不怒不恚怒不拒斥不害破如斯是不怒不恚怒不拒斥不被害破此亦是如虛空無障礙可行無依茲寂靜之句中茲寂靜者是茲寂靜而坐於茲而此坐為坐而在此衆中坐此是茲寂靜之義或又於茲是寂寂靜寂滅而安息此亦是茲寂靜之義無依之句中依者是愛依見依之二依乃至四頁參照此是愛依乃至四頁參照此是見依捨斷愛依捨遣見依不依止眼不依止耳不依止鼻不依止舌不依止身不依止意不依止於色聲香味觸施主衆住居利得名聲賞讚安樂衣服食物臥坐所病者之資具藥品欲界色界無色界欲有色有想有無想有非想非非想有一蘊有四蘊有五蘊有過去未來現在可見聞覺識不依止諸法不依著不近著不縛著不信解出離棄遣離脫以不限定心而住此是無依可行者是可行行作動作活動護持持續維持此是可行無依茲寂靜之義故彼婆羅門言梵者悲愍請教授我可識知遠離法恰如虛空無障礙可行無依茲寂靜六世尊宣示多度迦有關現世非傳聞一切寂靜我告汝知彼有念而行作可度世間之愛著一六六一切寂靜我告汝之句中我欲告貪之寂瞋之寂癡之寂忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行之寂寂靜寂滅消滅安息而欲言示施設確立開顯分別顯示說明此是一切寂靜我告汝之義世尊宣示度多迦之句中度多迦者是世尊呼彼婆羅門之名世尊者此是尊重同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示度多迦之義有關現世非傳聞之句中有關現世者是現世所見之法所知之法考量之法度知之法辨知之法明暸之法即一切行是無常乃至一九頁以下參照所有集法皆是此滅法是有關於所見之法知之法考量之法度知之法辨知之法明暸之法如斯是有關於現世所見之法或又有關於所見之苦我語苦有關於所見集而語集有關於所見道而語道有關於所見滅而語滅如斯亦是有關於所見之法或又可自見是無時的可謂來見可導引於聖道諸識者是有關於所見法各自可知者如斯亦是有關於所見之法非傳聞者不由他之傳聞不傳說不傳承不依於藏經之說不依於思擇不依於推論不依於行相之審思不依於見省思忍說自己自知通自現見法此是有關現世非傳聞之義知彼有念而行作之句中知彼者是知解彼考量度知辨知而明暸即一切行是無常乃至一九頁以下參照知解所有集法皆是滅法考量度知辨知而明暸有念者是由四行相而有念即對身修習身隨觀念處而有念乃至三頁參照言彼有念行作者是行行作動作活動護持且維持此是知彼有念而行作之義可度世間之愛著之句中愛著者是渴愛即所有貪染貪乃至一三頁參照是貪欲貪不善根愛著由於何義而為愛著耶乃至八九頁參照能擴大擴展此是愛著之義世間者是惡趣世間乃至八九頁參照於處世間可度世間之愛著者世間之所有愛著之有念彼愛著而可度越度超越離越此是可度世間之愛著之義故世尊宣示世尊宣示度多迦一切寂靜我告汝有關現世非傳聞知彼有念而行作可度世間之愛著七大仙彼之最上寂我聞彼而成歡喜知彼有念而行作可度世間之愛著一六七我聞彼而歡喜之句中彼者是尊師之語語路說示教訓歡喜者是歡歡喜喜隨喜欲樂冀求希望熱望此是我聞彼而歡喜之義大仙彼之最上寂之句中大仙者是世尊求大戒蘊覓求遍求故是大仙大求者是大定蘊乃至九頁以下參照人牛王於何處耶能求覓求遍求故是大仙最上之寂之句中寂者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅是離貪滅涅槃最上者是最高最勝最殊勝秀逸最上勝妙此是大仙彼最上寂之義知彼有念而行作之句中知彼者是知解彼考量度知辨知而明暸即一切行是無常乃至一九頁以下參照知解所有集法皆是此滅法考量度知辨知而明暸有念者是由四行相而有念即對身修習身隨觀念處而有念乃至三頁參照言彼為有念行作者是行行作動作活動護持持續且維持此是知彼有念而行作之義可度世間之愛著之句中言渴愛為愛著即所有貪染貪乃至一三頁參照是貪欲貪不善根愛著者由何義而為愛著耶乃至八九頁參照於擴擴大此是愛著之義世間者是惡趣世間乃至八九頁參照於處世間可度世間之愛著者是世間之所有愛著有念愛著之可度越度度過超越離越此是可度世間之愛著之義故彼婆羅門言大仙彼之最上寂我聞彼而成歡喜知彼有念而行作可度世間之愛著八世尊宣示度多迦上與下與橫及中汝善知解所有物知於世間此是著勿為種種有愛事一六八汝善知解所有物之句中汝知解了知識知辨知通達所有物此是汝善知解所有物之義度多迦者是世尊呼彼婆羅門之名世尊者是尊重同義語乃至一二頁以下參照此謂世尊語是與作證共同施設之物此是世尊宣示度多迦之義上與下與橫及中之句中上者是言未來下是過去橫及中是現在上是天世間下是地獄世間橫及中是人世間上是善法下是不善法橫及中是無記法上是無色界下是欲界橫及中是色界上是樂受下是苦受橫及中是不苦不樂受上是由足跖以上下是由髮之頂端以下橫及中是胴體此是上與下與橫及中之義知於世間此是著知此是著此是懸著此是結縛此是礙著了知考量度知辨知而明暸此是知於世間此是著之義勿為種種有愛事之句中愛者是色愛聲愛香愛味愛觸愛法愛種種之有是於種種之有對業有再有之義即於欲有對業有於欲有對再有於色有對業有於色有對再有於無色有對業有於無色有對再有之義是對於再三之有再三之趣再三之生起再三之結生再三之身體發生之義勿向其等種種有之愛令生事令發生事起事令生起事而須捨斷除去滅除令為滅無此是勿為種種有愛事之義故世尊宣示世尊宣示度多迦上與下與橫及中汝善知解所有物知於世間此是著勿為種種有愛事世尊之說法之偈終否乃至三二頁參照說世尊尊師是我師我是弟子而坐度多迦學童所問之義釋第五畢
