body:
  text: 十六學童所問結語之義釋世尊且住於摩竭陀國之波沙那迦塔廟已說以上之諸偈為門弟子之十六人婆羅門所請所問所問而解說質問世尊說以上說以上之彼岸道波羅延世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊說以上之義且住摩竭陀國者是且住於名摩偈陀地方且動作且活動且護持身且持續且維持波沙那迦塔廟者是佛之坐所言波沙那迦塔廟此是且住於摩竭陀國之波沙那迦塔廟之義門弟之十六人婆羅門賓祗耶婆羅門是婆和利婆羅門之最勝最第一之門弟子彼等與賓祗耶共同十六人如斯為門弟子十六人之婆羅門之義或又彼等十六人之婆羅門應為佛世尊之最勝最第一之門弟子如斯亦是門弟十六人之婆羅門之義所請所問所問而解答質問之句中所請者是被求所問所問者是所問質問被乞求信樂於解答質問者是解答於質問而言示施設確立開顯分別顯示說明此是所請所問問而解答質問之義若了知一一質問之義已了知法者應行道法隨法應到於老死之彼岸此等諸法是令到於彼岸者故此法教名稱為彼岸道若一一之質問者是若一一之阿耆多所問經若一一之帝須彌勒所問經若一一之富那迦所問經若一一之彌多求所問經若一一之度多迦所問經若一一之優波私婆所問經若一一之難陀所問經若一一之醯摩迦所問經若一一之刀提耶所問經若一一之劫波所問經若一一之闍都乾耳所問經若一一之跋陀羅浮陀所問經若一一之優陀耶所問經若一一之布沙羅所問經若一一之莫伽羅闍所問經若一一之賓祗耶所問經此是若一一之質問了知義已了知法者之句中法者是此質問義者是解答了知義知考量度知辨知明暸此是了知義已了知法者是了知法知考量度知辨知明瞭此是了知義已了知法之義應行道法隨法者是正行道隨順之行道無害敵之行道隨義之行道應行道法隨法之行道此是應行道法隨法之義應到老死之彼岸之句中老死之彼岸者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃應到老死之彼岸者可到彼岸可達於彼岸可觸達於彼岸可作證彼岸此是應到老死之彼岸之義此等諸法可令到彼岸者是此等諸法可令到彼岸者令達於彼岸令到著於彼岸令到達於彼岸令至於度老死此是此等諸法可令到於彼岸者之義故在此之法教之句中故者故是彼之理由彼之因彼之緣彼之因緣此是故在此之法教者在此彼岸道波羅延此是故在此之法教之義有名稱彼岸道之句中彼岸者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃道者道也所謂正見正思惟正語正業正命正精進正念正定名稱增語者名稱名稱施設乃至一頁參照稱呼此是有名稱彼岸道之義一阿耆多帝須彌勒富那迦又彌多求度多迦優波私婆難陀又與醯摩迦一一二四二刀提耶劫波兩人闍都乾耳為賢者還有跋陀羅浮陀優陀耶與布沙羅莫伽羅闍有慧者乃至賓祗耶大仙一一二五三彼等接近佛世尊乃具足行之仙人佛為諸微妙之質問乃是接近最勝佛一一二六彼等接近佛世尊之句中彼等者是婆羅門佛者是彼世尊自存者無師者於未曾聞之諸法自正覺真諦又於其處得一切知性得自在性者佛者是由何之義而為佛耶覺真諦故而為佛覺者人人之令覺者故是佛一切知者故是佛一切見者故是佛知道者故是佛明照者故是佛由漏盡者之稱是佛由無煩惱者之稱是佛一向離貪者故是佛一向離瞋者故是佛一向離癡者故是佛一向無煩惱故是佛行一行道故是佛正覺獨一無上正等覺故是佛破害不覺故獲得覺故是佛佛之名非由母作非由父作非由兄弟作非由姊妹作非由友人同僚作非由親戚者作非由沙門婆羅門作非由諸天神作此佛是諸佛世尊於菩提樹下一切智者之獲得作證已共同之施設者此是於佛彼等接近於佛者是彼等行近於佛近至近侍遍問而遍問此是彼等接近佛世尊之義乃具足行之仙人之句中行者是戒行之完成亦行戒律儀亦行根律儀亦行知食適量亦行向警寤之勤勵亦行七妙法亦行四禪令具足行者令具足行有最勝行有秀逸行有最上行有勝妙行此是令具足行仙人者是仙人大求者世尊求大戒蘊覓求遍求故是仙人求者乃至九頁參照又由有大權勢諸有情佛是於何處耶世尊是於何處耶天中天是於何處耶人牛王是於何處耶被求覓求遍求故是仙人此是乃具足行之仙人為諸微妙之質問之句中為質問者是問乞求信樂諸微妙之質問者是甚深難見難隨覺善勝妙不入於思擇微妙賢者知得之質問此是為諸微妙之質問之義乃是接近最勝佛之句中佛是彼世尊乃至二七三頁以下參照此謂佛名是與作證共同施設者最勝者是最高最勝最殊勝秀逸最上勝妙此是最勝近者是行至近近至近侍遍問而遍問此是乃是接近最勝佛之義故如斯能說彼等接近佛世尊乃具足行之仙人為諸微妙之質問乃是接近最勝佛四佛向彼等之質問世尊如實為解說由向諸問之解說牟尼滿足婆羅門一一二七佛向彼等已解說之句中向彼等者是十六人應到彼岸之婆羅門佛是彼世尊乃至二七三頁以下參照此謂佛之名已與作證共同施設者已解說者是佛已向彼等解說言示施設確立開顯分別顯示說明此是佛向彼等已解說之義所質問於如實之句中質問者是以問問乞求信樂如實者如應說而說如應說示而說示如應施設而施設如應確立而確立如應開顯而開顯如應分別而分別如應顯示而顯示如應說明而說明此是所質問於如實之義由向諸問之解說者是由向諸問之解說而宣說說示施設確立開顯分別顯示說明此是由向諸問之解說之義牟尼滿足婆羅門之句中已令滿足者是令滿足滿悅信樂愈悅適意諸婆羅門是十六人到彼岸之婆羅門牟尼者以智言牟那即所有慧知解乃至一三頁參照超越著網之此牟尼此是牟尼滿足婆羅門之義故如斯說佛向彼等之質問世尊如實為解說由向諸問之解說牟尼滿足婆羅門五彼等依日種具眼佛世尊甚示滿足最勝優異慧者許出家而為行梵行一一二八彼等依具眼者示甚滿足之句中彼等者是到彼岸十六人之婆羅門示滿足者是滿足滿悅信樂愈悅適意具眼者是世尊由五眼具眼者即由肉眼為具眼者由天眼為具眼者由慧眼為具眼者由佛眼為具眼者由普眼為具眼者世尊由肉眼為具眼者云何乃至二四頁以下參照如斯世尊由普眼為具眼者此是彼等依具眼者示甚滿足之義日種佛之句中佛者是彼世尊乃至二七三頁以下參照此謂佛之名是與作證為共同施設者日種之句中太陽言日彼太陽之姓是瞿曇世尊姓亦是瞿曇世尊由姓為太陽之親戚由姓為親類故佛日種太陽之親戚此是日種佛之義為行梵行之句中梵行者遠離犯不妙法離離去不如法之離離去不作不行不干犯不越限為橋之破壞又不依教說經典說依於阿毗達磨說而言梵行者是八支聖道所謂正見正思惟正語正業正命正精進正念正定行梵行者是行梵行受持而行動此是為行梵行之義最勝優異慧者許之句中優異之慧者者是最高之慧者最勝之慧者秀逸之慧者最上之慧者勝妙之慧者許者是於許於周邊於近於不遠而近在此是最勝優異慧者許之義故斯言彼等依日種具眼佛世尊甚示滿足最勝優異慧者許出家而為行梵行六對一一之問由佛如所示如欲行道者此岸到彼岸一一二九對一一之問者是對一一之阿耆多之質問對一一帝須彌勒之質問乃至對一一賓祗耶之質問此是對一一之問由佛如所示之句中佛者是彼世尊乃至二頁參照此謂佛之名是與作證共同施設者由佛如所示者是由佛如所說如所示如所施設如所確立如所開顯如所分別如所顯示如所說明此是由佛如所示如欲行道者是正行道隨順之行道無害敵之行道隨義之行道法隨法之行道者此是如欲行道者由此岸到彼岸之句中彼岸者是不死涅槃即所有一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃此岸者是煩惱與蘊之行由此岸可到彼岸者是由此岸可到彼岸可到達彼岸可觸達彼岸可作證彼岸此是由此岸到彼岸之義故彼斯言對一一之問由佛如所示如欲行道者此岸到彼岸七修習最上之道者由此岸可到彼岸彼可到彼岸之道是故稱為彼岸道一一三由此岸可到彼岸之句中此岸者是煩惱與蘊之行彼岸者是不死涅槃即所有一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃由此岸到彼岸者是由此岸可到彼岸可到達彼岸可觸達彼岸可作證彼岸此是由此岸可到彼岸之義修習最上道者之句中道者是八支正道正見乃至正定最上者是最高最勝最殊勝秀逸最上勝妙也此是最上之道修習者是修習習行多作者此是修習最上之道者之義彼可到彼岸道之句中道者是道道路路徑直道徑路船渡橋回廊通路可到彼岸可到彼岸可到著彼岸可到達彼岸可度生死此是彼可到彼岸道之義是故稱及彼岸道之句中故者是故於彼之理由於彼之因於彼之緣於彼之因緣彼岸者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃道者道也及者乃此句之接續乃至一頁參照句之次第此是是故稱及彼岸道之義八尊者賓祗耶婆和利曰我將隨誦彼岸道世尊離垢廣智者已如所見之為說無欲無藪之龍象以何因是語虛妄一一三一我將隨誦彼岸道者我將由佛誦而隨誦我將由佛語而隨誦我將由佛告而隨誦我將由佛話而隨誦此是我將隨誦彼岸道之義尊者賓祗耶曰之句中曰斯者是此句之接續乃至一頁參照句之次第尊者此是敬語敬重語尊敬語賓祗耶是彼長老之名稱名稱施設概念世間之言說名名業命名詞文稱呼此是尊者賓祗耶曰之義已如所見之說者是已如所見之說言示施設確立開顯分別顯示說明即一切行是無常乃至一九頁以下參照所有集法皆是此滅法已如所見之說言示施設確立開顯分別顯示說明此是已如所見之說之義離垢廣智者之句中離垢者貪是垢瞋是垢癡是垢忿是垢恨是垢乃至三九頁參照一切不善行是垢彼等諸垢於佛世尊所捨斷根絶如截頂之羅樹成為滅無於未來不生起者故佛是無垢者離垢者非垢者垢之離去者垢之捨斷者垢之離脫者一切垢之離越者廣者是言地世尊等於此地廣大擴而具備慧智者是慧也即所有慧知解乃至一八頁參照是不癡擇法正見世尊具此之智慧正具達成正成之具備故佛是廣智者此是離垢廣智者之義無欲藪之龍象之句中欲者概言之則事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲佛世尊遍知事欲以捨斷煩惱欲事欲之遍知故煩惱欲之捨斷故世尊不欲諸欲不冀求諸欲不希望諸欲不熱望諸欲欲諸欲冀求希望熱望諸欲所之人人是欲之欲者貪之貪者想之想者世尊不欲諸欲不冀求諸欲不希望諸欲不熱望諸欲故佛而為無欲者非欲者捨斷者唾棄欲者脫欲者捨斷欲者捨遣欲者離欲者離去貪者捨貪者唾棄貪者脫貪者捨斷貪者捨遣貪者無愛者煩惱消滅者清涼者樂之覺受者為梵而自住此是無欲之義無藪者貪是藪瞋是藪癡是藪忿是藪恨是藪乃至三九頁參照一切不善行是藪彼等諸藪於佛世尊已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是無藪者非藪者涅槃者藪之離去者藪之捨斷者藪之離脫者一切藪之離越者此是無藪龍象者是世尊不行罪惡故是龍象不行故是龍象不來故是龍象乃至一頁以下參照如斯不來故是龍象此是無欲無藪之龍象之義以何因耶語虛妄者之句中以何因耶是以何因耶由何理由耶由何緣耶此是以何因耶之義語虛妄者是語妄言語妄語語非聖語於此或者在集會中又在會合中又在親戚之間又在法廷中被連出作為證人於被問時卿須語汝所知彼不知而言我知知而言我不知未見而言我見又已見而言我未見如斯為自己又為他人又為某等之利益語故意之妄語此言為妄言又由三行相而有妄語即一於彼豫我有妄語之心二於現且有妄言者我於現有妄言之心三於既妄言者我有妄言之心由此等三行相而有妄語又由四行相而有妄語即一於彼豫我將有妄語之心乃至由五行相六行相七行相八行相而有妄語即一彼豫我有妄語之心二於現且有妄言者我現有妄言之心三於既妄言者我有妄言之心四自己之見相異五忍於相異六意欲相異七想相異八於實況相異而妄語由此等八行相而有妄語佛以何因耶而語虛妄說說明言說此是以何因耶而妄語之義故賓祗耶長老言尊者賓祗耶曰我將隨誦彼岸道世尊離垢廣智者已如所見之為說無欲無藪之龍象以何因是語虛妄九捨斷垢與癡捨斷慢與覆佛言辭表讚嘆如何我將述一一三二捨斷垢與癡之句中垢者貪是垢瞋是垢癡是垢慢是垢見成為垢煩惱是垢一切惡行是垢癡者對苦而無智乃至一二頁參照是無明閂癡不善根以此言癡垢與癡佛世尊已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是捨斷垢與癡此是捨斷垢與癡之義捨斷慢與覆佛之句中慢者一有一種慢即所有心之高貢二有二種慢即稱揚自己之慢與貶下他人之慢三有三種慢即我勝之慢我等之慢我劣之慢四有四種慢即由利得而生慢由名聲而生慢由稱讚而生慢由樂而生慢五有五種慢即我得可意之色而生慢我得可意之聲香味觸而生慢六有六種慢即由眼之具足而生慢由耳之具足鼻之具足舌之具足身之具足意之具足而生慢七有七種慢即慢過慢慢過慢卑慢增上慢我慢邪慢八有八種慢即由利得而生慢由不利得而生卑慢由名聲而生慢由不名聲而生卑慢由稱讚而生慢由毀訾而生卑慢由樂而生慢由苦而生卑慢九有九種慢即勝者我勝之慢勝者我等之慢勝者我劣之慢等者我勝之慢等者我等之慢等者我劣之慢劣者我勝之慢劣劣者我等之慢劣者我劣之慢十有十種慢即於茲或者生姓家世麗容財誦學事業技術學術博識辨舌又由某種之根據而生慢如斯所有慢慢心高慢高貢高舉心之幢幡傲慢心之旗幟以此言慢覆者是覆覆僞僞善嫉視業以此言覆於佛世尊慢覆已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是捨斷慢覆此是捨斷慢與覆之義言辭表讚嘆如何我將述之句中然我者然是此句之接續乃至一頁參照句之次第將述者是具讚辭正具達正達成正成具備言辭語語路我將述發言示施設確立開顯分別顯示說明此是言辭表讚嘆如何我將述之義故賓祗耶長老言捨斷垢與癡捨斷慢與覆佛言辭表讚嘆如何我將述一世尊除暗者覺者普眼者知世間邊者越度一切有佛為無漏者捨斷一切苦切實名梵者使我為近坐一一三三世尊除暗者覺者普眼者之句中除暗者世尊是除排除捨斷除去滅除已滅無貪暗瞋暗癡暗慢暗見暗煩惱暗惡行暗暗黑者無眼者無智者滅慧者害敵之黨不至涅槃者此是除暗者覺者彼世尊乃至二七三頁參照此之覺者佛之名與作證共同施設者普眼者之句中普眼是一切知智乃至一一六頁參照如來已具備彼之普眼此是世尊除暗者覺者普眼者知世間邊者越度一切有之句中世間者有一世間有世間有二世間是成具之有世間與毀失之有世間有三世間是三受有四世間是四食有五世間是五取蘊有六世間是六內處有七世間是七識住有八世間是八世間法有九世間是九有情居有十世間十隨煩惱有十一世間是十一欲有有十二世間是十二處有十八世間是十八界知世間邊者世尊到世間之終邊達於終邊到於終點達於終點乃至一三頁參照到於涅槃達於涅槃彼梵行已成所作已辦乃至一二頁以下參照為最後之生老死輪回彼無再有此是知世間邊者越度一切有之句中有者是業有與結生再有之二有業有者云何是福行非福行不動行此是業有結生之再有者云何結生色受想行識此是結生再有世尊越度業有與結生再有超越離越此是知世間邊者越度一切有佛為無漏者捨斷一切苦之句中無漏者漏者是欲漏有漏見漏無明漏之四漏此等之漏佛世尊已捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是無漏者捨斷一切苦彼世尊是一切結生之生苦老苦病苦死苦愁悲苦憂惱苦乃至一四頁以下參照失正見苦之捨斷根絶如截頂之多羅樹成為滅無於未來不生起者故佛是捨斷一切苦切實名梵者使我為近坐之句中有切實之名者是等於真實之名即毗婆尸世尊尸棄世尊毗沙浮世尊迦鳩孫陀世尊拘那伽摩那世尊迦葉世尊與佛世尊有同等之名同等真實之名是故切實名梵者使我為近坐於梵者是我彼侍坐世尊近坐近侍遍問速遍問此是切實名梵者使我為近坐之義故賓祗耶長老言世尊除暗者覺者普眼者知世間邊者越度一切有佛為無漏者捨斷一切苦切實名梵者我使為近坐一一譬如鳥捨於山林止住果多之森林斯我捨諸少見者如鷲鳥到大海洋一一三四譬如鳥捨山於林止住果多之森林之句中鳥二生者鳥是有翼者由何言鳥為二生者耶二生者鳥是由母胎卵殼之二回生因此而言鳥為二生者譬如捨山林者譬如鳥於山林即捨棄越去離越食少水少貧乏之林而得達於他之果多食多樹多之大林森林所有獲得於彼森林以營住居此是譬如鳥捨於山林止住果多大森林之義斯我捨諸少見者如鷲鳥到大海洋之句中斯者是譬喻與事實照合之句捨諸少見者是婆和利婆羅門及他之彼諸師比於佛世尊為少見者小見者僅少見者下劣見者賤劣見者劣小見者捨少見者小見者僅少見者下劣見者賤劣見者劣小見者之彼等婆羅門捨斷過去超越而得達最高見者最勝見者最殊勝見者最上見者勝妙者無等者無等等者無比類者無比肩者天中天人牡牛人師子人龍人良馬人牛王人軛獸十力者如同者佛世尊使我所有獲得譬如鵝鳥為不動而得達無量水之大人工池阿耨達池又大海洋所有獲得斯賓祗耶婆羅門不動而有無量威力有明了智明開之眼證得巧慧分別無礙解達於四無畏淨信解有白蓋者說不二而如同公言如實不小偉大甚深不可量難沈潛有多實等同海洋具備不分捨無比廣大為如不可量之同者勝道之說者山嶽中之須彌二生者鳥中之金翅鳥獸中之師子河海中之大洋勝妙之勝者得達所有獲得之佛世尊此是斯我捨諸少見者如鷲鳥到大海洋之義故賓祗耶婆羅門言譬如鳥捨於山林止住果多之森林斯我捨諸少見者如鷲鳥到大海洋一二瞿曇教之前人人曾語我有斯應有斯已為之解說一切此之語成為受賣說一切此思擇忘相增尋物一一三五人人曾向我解說事之句中事者是婆和利婆羅門及其他彼阿闍梨師等解說自己之見自己之忍自己之意欲自己之持說自己之意樂自己之意趣說示施設確立開顯分別顯示說明此是人人曾向我解說之義瞿曇之教前者由瞿曇之教前由瞿曇之教以外由瞿曇之教以前是由瞿曇之教佛之教勝者之教如來之教阿羅漢之教開始此是由瞿曇之教前有斯應有斯者實有如斯實應有如斯此是有斯應有斯之義一切此為受賣說者此一切是受賣之說傳聞由於傳說由於傳承由於藏經之說由於思擇由於推論由於行相之審思而由見省思忍之物而非自己知通之語而非自現見法之語此是一切此為受賣說之義一切此思擇為增物一切增此思擇增尋增思惟增欲尋增恚尋增害尋增親里尋增國土尋增不死尋增關係他人之憐憫尋增關係利得恭敬讚歎尋增關係不輕賤尋之物此是一切此思擇為增物之義故賓祗耶長老言瞿曇教之前人人曾語我有斯應有斯已為之解說一切此之語成為受賣說一切此思擇妄想增尋物一三煩惱之暗獨坐除彼具光者光照者瞿曇乃是廣慧者瞿曇是為廣智者一一三六煩惱之暗獨坐除之句中獨者是世尊一由出家之稱為獨二由無伴義為獨三由渴愛之捨斷義為獨四一向離貪故為獨一向離瞋故為獨一向離癡故為獨一向無煩惱故為獨五行一行道一乘道故為獨六獨自正覺無上正等覺故為獨一世尊由出家之稱為獨者云何世尊年少而黑髮之青年具備善福青春於人生之第一期不欲捨彼出家淚顏涕泣之父母捨親戚衆斷一切家居之障礙斷妻子之障礙斷親戚之障礙斷友人同僚之障礙剃除鬚髮著袈裟衣由家出家而非家為無一物之狀態獨行行作動作活動獲持持續維持如斯世尊由出家之稱為獨二世尊由無伴義而獨者云何彼如斯出家獨住阿練若森林之邊鄙無人聲無騷音無人之境觀隱人而住於禪思用適當之臥坐所彼獨行獨立獨坐獨臥獨入村行乞獨由行乞歸獨密坐禪獨為經行獨行行作動作活動護持持續維持如斯世尊由無伴義為獨三世尊渴愛之捨斷故為獨者云何彼如斯無伴不放逸而熱心住於精勤於尼連禪河畔之菩提樹下精勤大精勤擊破放逸親類之惡魔障解脫之軍捨斷渴愛網罟輪回之流捨斷愛著除去滅除令之滅無渴愛為友之人人長時不斷入輪回由此狀態他狀態向彼輪回為超度渴愛苦發生之緣如此知為大過患離去渴愛無有取有念比丘應普行如斯世尊渴愛之捨斷故為獨四世尊一向離貪故為獨者云何貪之捨斷故一行離貪故為獨瞋之捨斷故一向離瞋故為獨癡之捨斷故一向離癡故為獨煩惱之捨斷故一向離煩惱故為獨五世尊行一行道故為獨者云何一行道者是四念處乃至是八支聖道有情利益者見生盡滅邊憐愍者之佛知解一行道過去由此道諸佛是已度現在亦正度未來度暴流如斯世尊行一行道故稱為獨六世尊獨正覺無上正等覺故為獨者云何覺菩提者是於四沙門道智慧慧根慧力乃至擇法覺支觀慧觀毗鉢舍那正見世尊由彼覺智而覺一切行是無常乃至一九頁以下參照已覺所有集法皆是此滅法或又所有應覺隨覺別覺正覺得達觸達所作證之一切物由覺智而覺隨覺別覺正覺得達觸達作證如斯世尊獨正覺無上正等覺故為獨除暗者是世尊對貪暗瞋暗癡暗慢暗見暗煩惱暗惡行暗令除暗黑者無眼者無智者滅慧者害敵之黨不至涅槃者排除捨斷除去滅除令之滅無坐者是請世尊能坐於波沙那迦塔廟苦之彼岸已到達牟尼而坐於山側有三明而破死神諸弟子來為近侍如斯世尊坐或又世尊於一切齷齪之安息故梵行已成所作已辨而坐乃至一二頁參照為最後之生老死輪回彼無再有如斯亦世尊坐此是獨坐除暗之義彼具光者照者之句中具光者是具光者賢者具慧者覺慧者有智者辨知者具智者光照者是明照者光耀者燃燈者照耀者輝耀者此是彼具光者光照者之義瞿曇是廣慧者瞿曇以廣慧為標識以智為標識以慧為旗幟以慧為幢幡以慧為主思擇多簡擇多沈思多默考多明暸法而住行此多為此重此向於此傾於此赴於此信解此以此為主旗幟乃車之標識煙乃是火之標識王是國家之標識夫是妻女之標識如斯瞿曇以廣慧為標識以智為標識以慧為旗幟以慧為幢幡以慧為主思擇多簡擇多沈思多默考多明暸法而住行此多為此重此向於此傾於此赴於此信解此以此為主此是瞿曇為廣慧者之義瞿曇是廣智者之句中廣者是言地世尊等於此地具備廣大擴展之慧智者是慧即所有慧知解乃至一八頁參照是不癡擇法正見世尊具此之智慧正具達正達成正成具備故佛是廣智者此是瞿曇為廣智者之義故賓祗耶長老言煩惱之暗獨坐除彼具光者光照者瞿曇乃是廣慧者瞿曇是為廣智者一四即時有果現能見盡滅渴愛無患惱彼已向我說示法決無可譬於彼者一一三七彼向我說示法之句中彼者是彼世尊自存者無師者於未曾聞之諸法自正等覺真諦又於其處而得一切知性於諸力而得自在性者說示法之句中法者是初善中善後善有義有文是完全圓滿遍淨之梵行四念處乃至八支聖道涅槃至涅槃行道說彼法說示施設確立開顯分別顯示說明此是彼向我說示法之義現見即時有果者是自見無時的可證見導引智識者是各自可知者如斯是現見即時有果或又於現世而修習八支聖道者彼聖之無間直後證得聖果所有獲得如斯亦是現見即時有果之義譬如人人某時布施財無間直後非得於彼果待迄得果時如斯者非此之法於現世而修習八支聖道者彼聖道之無間直後證得聖果所有獲得不在於他處不在於他世間如斯亦是現見即時有果之義此是現見即時有果盡滅渴愛無患惱之句中渴愛者是色愛聲愛香愛味愛觸愛法愛盡滅渴愛者是令渴愛盡滅貪盡滅瞋盡滅癡盡滅趣盡滅生起盡滅結生盡滅有盡滅輪回盡滅輪轉盡滅也無患惱者患惱是煩惱蘊行是患惱之捨斷患惱之寂滅患惱之捨遣患惱之安息不死涅槃此是盡滅渴愛無患惱之義決無可譬於彼者之句中彼者是涅槃無可譬者是可譬無可比較者無等者無可比肩者不存在不能得決者是決於任何於何處於內於外於內外亦是此是決無可譬於彼者之義故賓祗耶長老言即時有果現能見盡滅渴愛無患惱彼已向我說示法決無可譬於彼者一五賓祗耶雖須臾間汝由彼而離住耶由有廣慧之瞿曇由有廣智之瞿曇一一三八汝由彼而離住耶汝由彼佛離而住耶離耶離去耶無佛而住耶此是汝由彼而離住耶之義賓祗耶雖須臾間者是雖須臾剎那一時暫時瞬時亦是也此是雖須臾間之義賓祗耶者是婆和利呼彼甥之名此是賓祗耶雖須臾間之義由有廣慧之瞿曇以廣慧為標識以智為標識以慧為標識以慧為幢幡以慧為主思擇多簡擇多沈思多默考多明暸法而住行此多為此重此向於此傾於此赴於此信解此由以瞿曇為主此是由有廣慧之瞿曇之義由有廣智之瞿曇之句中廣者是言地世尊等於此地具備廣大擴展之慧智者是慧即所有慧知解乃至一八頁參照是不癡擇法正見世尊具此之智慧正具達正達成正成具備故佛是廣智者此是由有廣智之瞿曇之義故彼婆和利婆羅門言賓祗耶雖須臾間汝由彼而離住耶由有廣慧之瞿曇由有廣智之瞿曇十六現能見即時有果盡滅渴愛無患惱決無可譬於彼者向汝之所說示法一一三九向汝之所說示法之句中之所者是彼世尊乃至二九五頁參照於其處而得一切知性於諸力已得自在性者說示法之句中法者是初善乃至八七頁以下參照說至於涅槃行道說示施設確立開顯分別顯示說明也此是向汝之所說示法之義現見即時有果是自可見無時的可證見導引智識者是各自可知者如斯是現見即時有果或又現世修習八支聖道者於彼聖道之無間直後證得聖果所有獲得如斯亦是現見即時有果譬如人人於某時為布施財於無間直後非得彼果待迄得果時而於斯者非此之法於現世修習八支聖道者彼聖道之無間直後證得聖果所有獲得不於他處不於他世間如斯亦是現見即時有果之義此是現見即時有果盡滅渴愛無患惱之句中渴愛者是色愛聲愛香愛味愛觸愛法愛盡滅渴愛者是令盡滅渴愛盡滅貪盡滅瞋盡滅癡盡滅趣盡滅生起盡滅結生盡滅有盡滅輪回盡滅輪轉無患惱患惱者是煩惱蘊行是患惱之捨斷患惱之寂滅患惱之捨遣患惱之安息不死涅槃此是盡滅渴愛無患惱之義決無可譬於彼者之句中彼者是涅槃無可譬者是無可譬者無可比較者無有等者無可比肩者不存在不能得決者是決於任何於何處於內於外於內外亦是此是決無可譬於彼者故彼婆和利婆羅門言現能見即時有果盡滅渴愛無患惱決無可譬於彼者向汝之所說示法一七婆羅門雖須臾間我不由彼為離住由有廣慧之瞿曇由有廣智之瞿曇一一四我不由彼為離住我不離彼佛而住不離不離去而非無佛此為我不由彼為離住之義婆羅門雖須臾間者雖須臾剎那一時暫時瞬時亦是婆羅門是尊敬稱呼叔父由有廣慧之瞿曇以廣慧為標識以智為標識以慧為旗幟以慧為幢幡以慧為主思擇多簡擇多沈思多默考多明暸法而住行此多為此重此向於此傾於此赴於此信解此瞿曇為彼之主此是由有廣慧之瞿曇之義由廣智之瞿曇之句中廣者是言地世尊等於此地具備廣大擴展之慧智者是慧即所有慧知解乃至一八頁參照不癡擇法正見世尊具此之智慧正具達正達成正成具備故佛正是廣智者此是由有廣智之瞿曇之義故彼婆和利婆羅門言賓祗耶雖須臾間我由彼而不離住由有廣慧之瞿曇由有廣智之瞿曇一八現能見即時有果盡滅渴愛無患惱決無可譬於彼者為我之所說示法一一四一為我之所說示法之句中之所者是彼世尊自存者無師者於未曾聞之諸法而自正等覺真諦又於其處而得一切知性於諸力得自在性者說示法之句中法者是初善中善後善有義有文為完全圓滿遍淨之梵行四念處四正勤四神足五根五力七覺支八支聖道涅槃是至於涅槃行道說彼法是說示施設確立開顯分別顯示說明此是為我之所說示法現能見即時有果是自可見無時的可證見導引智識者是各自可知者如斯是現見即時有果或又於現世修習八支聖道者於彼之聖道之無間直後證得聖果所有獲得如斯為現見即時有果譬如人人某時布施財於無間直後而非得彼果待迄得果時於斯者非此之法於現世為修習八支聖道者於彼之聖道之無間直後證得聖果所有獲得不於他處不於他世間如斯亦是現見即時有果之義此是現能見即時有果盡滅渴愛無患惱者渴愛者是色愛聲愛香愛味愛觸愛法愛盡滅渴愛者是令盡滅貪盡滅瞋盡滅癡盡滅趣盡滅生起盡滅結生盡滅有盡滅輪回盡滅輪轉無患惱患惱者是煩惱蘊行是患惱之捨斷患惱之寂滅患惱之捨遣患惱之安息不死涅槃此是盡滅渴愛無患惱之義決無可譬於彼者之句中彼者是涅槃無可譬者是無可譬者無可比較者無等者無可比肩者不存在不能得決者是決定於任何於何處於內於外於內外亦是此是決無可譬於彼者故賓祗耶長老言現能見即時有果盡滅渴愛無患惱決無可譬於彼者為我之所說示法十九婆羅門晝夜不放逸我以意眼見世尊過夜繼續禮拜彼故我思惟不離住一一四二我以意眼見世尊譬如以眼眺人見諸色覩眺省思普觀如斯我以意見佛世尊覩眺省思普觀此是我以意眼見世尊之義婆羅門晝夜不放逸者是夜晝以意繼續修習而不放逸此是婆羅門晝夜不放逸過夜繼續禮拜彼之句中繼續禮拜者是由身不斷禮拜由語不斷禮拜由意不斷禮拜由隨義之行道不斷禮拜由法隨義之行道不斷禮拜不斷恭敬不斷尊重不斷尊敬不斷奉事不斷敬重過晝夜過暮此是過夜繼續為禮拜之義故我思惟不離住我思惟修習彼佛隨念與佛不離住我思惟不離住斯知斯了知斯識知斯別知此是故我思惟不離住之義故賓祗耶長老言婆羅門晝夜不放逸我以意眼見世尊過夜繼續禮拜彼故我思惟不離住二我信與喜與意念此等不離瞿曇教廣慧者赴各方角其處必是我歸向一一四三我信與喜與意念之句中信者是對於世尊所有信信憑信賴信樂信根信力喜者是對於世尊所有喜悅喜歡喜喜悅幸福雀躍適意心之甚欣樂意者是對於世尊所有心意意所心臟淨白心意意處意根識識蘊隨順於觸等法之意識界念者是對世尊所有念隨念乃至一八頁參照正念此是信與喜與意念此等不離瞿曇教此等四法是瞿曇之教佛之教勝者之教如來之教阿羅漢之教不離不去不捨離不失此是不離瞿曇教之義廣慧者赴各方角者是世尊趣行步過於所有方角即於東方於西方於南方於北方亦是廣慧者是廣慧者大慧者利慧者博慧者疾慧者速慧者擇慧者此是廣慧者赴各方角其處必是我歸向此我必歸向於彼佛之處向於彼處傾於彼處赴於彼處信解於彼處以彼處為主此是其處必是我歸向之義故賓祗耶長老言我信與喜與意念此等不離瞿曇教廣慧者赴各方角其處必是我歸向二一我老而為力弱身是故身無至彼處然欲思惟為常赴婆羅門我意與彼佛結合一一四四我老而為力弱身之句中是老者是老長老年重齡達於老齡成為老力弱者是力弱力少力小此是我老而為力弱身是故身無至彼處身弱無至佛之處不赴不行無趣至此是是故身無至彼處之義然欲思惟為常赴以思惟令行以尋令行以智令行以慧令行以覺令行而我赴行趣至此是然欲思惟為常赴之義婆羅門我意與彼為結合之句中意者是所有心意意所心臟淨白心意意處意根識識蘊隨順於觸等法之意識界婆羅門我意與彼為結合者是我意與彼佛結合相應此是婆羅門我意與彼為結合之義故賓祗耶長老言我老而為力弱身是故身無至彼處然欲思惟為常赴婆羅門我意與彼為結合二二不斷戰栗臥泥中洲渚洲渚我漂流我見無漏正覺者彼乃已度於暴流一一四五不斷戰栗臥泥中之句中臥泥中者是臥於欲泥欲污泥欲染欲鈎欲熱惱欲障礙伏臥且橫臥此是臥於泥中之義不斷戰栗由愛顫而顫動由見顫而顫動由煩惱顫而顫動由加行顫而顫動由異熟顫而顫動由惡行顫而顫動由貪所染而顫動由瞋怒而顫動由癡蒙昧而顫動由慢所結縛而顫動由見所執取而顫動由掉舉散亂而顫動由疑不決定而顫動由隨眠強力而顫動由利得而顫動由不利得而顫動由名聲而顫動由不名聲而顫動由毀訾而顫動由賞讚而顫動由樂而顫動由苦而顫動由生而顫動由於老而顫動由病而顫動由死而顫動由愁悲苦憂惱而顫動由地獄苦而顫動由畜生界苦而顫動由餓鬼界苦而顫動人界之苦以入胎原因之苦在胎原因之苦出胎原因之苦隨結生者之苦生者之受他所支配苦令自苦之苦為他所苦之苦行苦壞苦眼病之苦耳病之苦鼻病之苦舌病之苦身病之苦頭病之苦外耳病之苦口腔病之苦齒病之苦咳喘息外鼻病熱病老腹病氣絶赤痢腹痛虎列剌癰疱瘡肺病癲癎輪癬疥癬風癬抓傷皸裂出血糖尿病痔痰疙疸潰瘍膽汁等起病痰等起病風等起病膽汁疾風集合病氣候變化所生病不等姿勢所生病傷害所生病業報所生病寒暑飢渴大便小便虻蚊風炎熱與爬行類之接觸之苦母死之苦父死之苦兄弟死之苦姊妹死之苦親子死之苦親女死之苦失親戚之苦失財富之苦失健康疾病之苦失戒之苦由失正見之苦而顫戰栗布動顫動此是不斷戰栗臥泥中之義洲渚洲渚我漂流者是由師向師由法說向法說由衆向衆由見向見由行道向行道由道向道我漂流流浪此是洲渚洲渚我漂流之義時我得見正覺者之句中時者是此句之接續乃至一頁參照句之次第得見者是見觀通達正覺者是彼世尊乃至二七三頁以下參照此謂佛名與作證共同為施設者此是時我得見正覺者之義度暴流者是世尊度欲流度有流度見流度無明流越度超度超超越離越彼梵行已成所作已辦乃至八二頁以下參照為最後之生老死輪回彼無再有此是度暴流之義無漏漏者欲漏有漏見漏無明漏之四漏此等之漏於佛世尊被已斷根絶如截頂之多羅樹於未來不生起者故佛是無漏者此是無漏度暴流之義故賓祗耶長老言不斷戰栗臥泥中洲渚洲渚我漂流我見無漏正覺者彼乃已度於暴流二三譬如薄迦利跋陀羅浮陀阿邏毗瞿曇彼已為信解如斯賓祗耶汝亦須信解然汝死領域將至於彼岸一一四六譬如薄迦利跋陀羅浮陀阿邏毗瞿曇彼已為信解譬如薄迦利信解重信以信為先以信信解以信為主已達於阿羅漢位譬如跋陀羅浮陀信解重信以信為先以信信解以信為主已達於阿羅漢位譬如阿邏毗瞿曇信解重信以信為先以信信解以信為主已達於阿羅漢位此是譬如薄迦利跋陀羅浮陀阿邏毗瞿曇彼已為信解之義如斯汝亦須信解如斯汝亦出信放放出現出置即一切行是無常乃至一九頁以下參照出信所有集法皆是此滅法放放出現出置此是如斯汝亦須信解之義然賓祇耶汝死領域將至於彼岸死之領域者是煩惱蘊行死之領域之彼岸者是不死涅槃即彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃然賓祇耶汝死領域將至於彼岸此汝將至彼岸到達觸達作證此是然賓祇耶汝死領域將至於彼岸之義故世尊宣示譬如薄迦利跋陀羅浮陀阿邏毗瞿曇彼已為信解如斯賓祗耶汝亦須信解然汝死領域將至於彼岸二四而由聞牟尼之語我益信樂此佛教開煩惱蔽無栽頑迷具應辨之正覺者一一四七我益信樂此者是我益信樂此信信解信賴即一切行是無常乃至一九頁以下參照所有集法皆是此滅法我益信樂信信解信賴此是我益信樂此佛教之義而由聞牟尼之語之句中牟尼者是言智為牟那即所有慧知解乃至九頁以下參照超越著網此是牟尼而由聞牟尼之語由聞尊師之語語路說示示教教訓聽把取保持觀察此是而由聞牟尼之語之義正覺者開煩惱蔽之句中蔽者是愛蔽見蔽煩惱蔽惡行蔽無明蔽之五蔽彼等之蔽佛世尊已所開摧破害破捨斷正斷令寂滅安息不得生起以智火所燒故佛開蔽者正覺者是彼佛世尊乃至二七三頁以下參照此謂佛名與作證共同施設者此是正覺者開煩惱蔽之義無栽具應辨之句中無栽貪是栽頑迷瞋是栽癡是栽忿是栽恨是栽乃至三九頁參照一切不善行是栽此等諸栽於佛世尊已捨斷根絶如多羅樹之截頂成為滅無於未來不生起者故佛是無栽具應辨是一對教說具應辨者二對遍問具應辨者三對證得具應辨者之三具應辨者一對教說應具辨者云何於此或者是佛語即如為學得契經祗夜記說偈自說如是語本生未曾有法毗陀羅依彼之教說而具應辨者應辨此是對教說應具辨者二對遍問應具辨者云何於此某者遍問有關義所知相原因處非處理非理而遍問依彼遍問而應具辨者應辨此是對遍問應具辨者三對證得應具辨者云何於此某者證得四念處四正勤四神足五根五力七覺支八支聖道四沙門果四無礙解六神通彼知義知法知詞文法應具辨者對於知義者應說義知法者應說法知詞者應說詞對此等義法詞三者之智是應辨無礙解世尊具此應辨無礙解正具達正達成正成具備故佛具應辨亦無有教說亦不遍問亦未所證得者應具辨者將如何應辨此是無栽應能具應辨之義故賓祗耶長老言而由聞牟尼之語我益信樂此佛教開煩惱蔽無栽頑迷具應辨之正覺者二五知通超天者知彼此一切師對諸質問修令告其終有疑問人人公言無疑問一一四八知通超天者之句中天者是一世俗天二生起天三清淨天之三天一世俗天者云何王王子王后此等言世俗天二生起天者云何是四大王天三十三天夜摩天都率天化樂天他化自在天梵衆天及彼上之天此等言生起天三清淨天者云何是如來之弟子諸阿羅漢漏盡者及辟支佛此等言清淨天知通世尊是超世俗天中之天者知通超生起天中之天者知通超清淨天中之天者知考量度知辨知明暸此是知通超天者之義知彼此一切世尊知了知觸知已通達自己及他人之超天法一自己超天之法者云何是正行道隨順行道無害敵行道隨義行道隨法行道諸戒完成諸根守護對食知量向警寤之努力念正知四念處乃至八支正道此等言自己超天之法二他人超天之法者云何是正行道乃至前說參照八支聖道此等言超天之法如斯世尊知了知觸知已通達自己及他人超天之法此是知彼此之一切之義師對諸質問終令告其終世尊對彼岸道之諸質問終令告其終告終邊告斷滅告終止對群集之諸質問令告其終告終邊告斷滅告終止對賓祗耶之諸質問令告其終告終邊告斷滅告終止對帝釋之諸質問非人之諸質問比丘之諸質問比丘尼之諸質問優婆塞之諸質問優婆夷之諸質問王之諸質問剎帝利之諸質問婆羅門之諸質問毗舍之諸質問首陀之諸質問梵天之諸質問以令告其終告終邊告斷滅告終止此是師對諸質問終令告其終師是師隊商世尊是隊商主導師譬如隊商主為諸隊商度難所度盜賊難所度猛獸難所度饑饉難所度無水難所上度下度到達安隱地如斯世尊為隊商主為諸有情令度難所度生老病死愁悲苦憂惱之難所度貪執度瞋執度癡執度見煩惱惡行執令上度下度到達不死涅槃之安穩地如斯世尊是隊商主或又世尊是導者調伏者指導者令知者令解者令觀者令信樂者或又世尊是未起道之令起者未生道之令生者未說道之宣說者知道者解道者達道者又現今隨從道諸聲聞弟子倣世尊具備諸德而住如斯世尊是隊商主導師此是師對諸質問終令告其終之義有疑問人人公言無疑問者有疑問而來者令至無疑問有困惑而來者令至無困惑有迷惘而來者令至無迷惘有疑而來者令至無疑有貪而來者令至離貪有瞋而來者令至離瞋有癡而來者令至離癡有煩惱而來者令至無煩惱此是有疑問人人公言無疑問之義故賓祗耶長老言知通超天者知彼此一切師對諸質問修令告其終有疑問人人公言無疑問二六無可譬之物決為無所有不搖與不動不死之涅槃確切我將至茲我無有疑我心令信解如斯能認受一一四九不搖與不動之句中不搖者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃不搖者由貪瞋癡忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行而不動搖常恆不變易法此是不搖不動者是不死涅槃即所有一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃不認生起對無所衰滅者確承認為常恆常恆不變易法涅槃此是不搖與不動之義無可譬之物決為無所有之句中所之者是涅槃無有可譬之物無可譬之物無可比較之物無相等之物無可比肩之物不存在不能得此是無有可譬之物決者是決定於任何於何處於內於外於內外亦是此是無可譬之物決為無所有之確切我將至茲我無有疑之句中確切我將至者是確切我將至將到達將觸達將作證此是確切我將至之義茲我無有疑關於得此涅槃無疑問無疑無迷惘無疑惑不存在不能得疑已捨斷正斷寂滅安息不得生起以智火燒之此是確切我將至茲我無有疑之義我心令信解如斯能認受之句中如斯能認受者是如斯省察我我心令信解者是向於涅槃傾於涅槃赴於涅槃信解涅槃此是我心令信解如斯能認受之義故賓祗耶長老言無可譬之物決為無所有不搖與不動不死之涅槃確切我將至茲我無有疑我心令信解如斯能認受彼岸道之義釋畢
