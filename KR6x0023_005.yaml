body:
  text: 第四彌多求學童所問之義釋一尊者彌多求曰世尊我向尊師問尊師以彼請語我尊師吠陀之達人我思自己修習者世間所有多種苦果由何處興起者一四九世尊我向尊師問尊師以彼請語我之句中問者一為欲明解未見之問二為欲向他合流已見之問三為欲斷疑念之問為三問一為欲明解未見之問者云何原來某者之特相未知未見未考量未度知於未為明暸時為欲知欲見欲考量欲度知欲辨知欲為明暸而問此是為欲明暸未見之問二為欲向他合流已見之問者云何原來某者之特相已知見考量度知辨知於明暸之時為欲與其他諸賢者之說合流而問於彼此是為合流已見之問三為欲斷疑之問者云何原來就於某事如斯耶不然耶何耶云何耶為此疑所襲為疑念所襲於生迷惑之時彼為斷彼疑念而問此是欲斷疑念之問有此等之三問更有一人問二非人問三化人問之三問一人問者云何是人接近於佛世尊而問即比丘問比丘尼問優婆塞問優婆夷問王問剎帝利問婆羅門問毗舍問首陀問在家者問出家者問此是人問二非人問者云何非人接近於佛世尊而問即龍問金翅鳥問夜叉問阿修羅問犍闥婆問大王問帝釋問梵天問天神問此是非人問三化人問者云何世尊自有四肢五體化作諸根完具意所成之色身彼之化人接近佛世尊而問世尊對彼回答此是化人問有此等之三問更有一自義問二他義問三兩義問之三問更有一現世義問二來世義問三第一義問之三問更有一無罪義問二無煩惱義問三淨白義問之三問更有一過去問二未來問三現在問之三問更有一內問二外問三內外問之三問更有一善問二不善問三無記問之三問更有一蘊問二界問三處問之三問更有一念處問二正勤問三神足問之三問更有一根問二力問三覺支問之三問更有一道問二果問三涅槃問之三問我向尊師問者我問於尊師乞於尊師求於尊師信樂於尊師請向我說此是向尊師問之義世尊此是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者請以彼語我以彼請向我語言示施設確立開顯分別說明此是世尊我向尊師問世尊以彼請語我之義尊者彌多求曰之句中曰如斯者是此句之接續乃至一一頁參照此是尊者彌多求曰之義尊師吠陀之達人我思自己修習者我思尊師是吠陀之達人我思尊師是自己修習者吠陀之達人自己修習者我如斯思如斯了知如斯識知如斯別知如斯通達然世尊是吠陀之達人者云何吠陀者是於四沙門道智慧慧根慧力擇法覺支觀慧觀毗鉢舍那正見世尊由其等吠陀而到生老死之終邊達於終邊到於終點達於終點到於究竟達於究竟到於最終達於最終到於救護所達於求護所到於避難所達於避難所到於歸依所達於歸依所到於無畏達於無畏到於無死達於無死到於不死甘露達於不死到於涅槃達於涅槃又到於吠陀諸受之終邊故是吠陀之達人又由吠陀諸受到於終邊故是吠陀之達人又知七法故是吠陀之達人即知有身見知疑知戒禁取知貪瞋癡慢於彼雜染齎再有不安有苦根已知可齎未來之生老死之諸惡不善法世尊宣示薩毗耶存知沙門婆羅門辨知一切之吠陀智離貪一切之諸受超一切受吠陀人世尊是自己修習者云何世尊是修習身修習戒修習心修習慧修習念處修習正勤修習神足修習根修習力修習覺支修習道捨斷煩惱通達不動作證滅於彼已遍知苦能捨斷集能修習道能作證滅能知通應知通能遍知應遍知能捨斷應捨斷能修習應修習能作證應作證不成小成為大為甚深無量之難沈替為多寶如海洋具備六支捨即以眼見色亦不喜不憂為捨而有念有正知而住以耳聞聲以鼻嗅香以舌嘗味以身觸所觸以意知法亦不喜不憂捨而有念有正知而住以眼見適意之色亦不貪求不希望不生貪彼世尊之身住立心住立於內善安住已能善解脫又以眼見不適意之色亦無悄心無反抗心無壞亂之意無瞋心彼世尊之身住立心住立於內善安住已善解脫以耳聞聲以鼻嗅香以身觸所以意識適意法亦無貪求無希望不生貪彼世尊之身住立心住立於內善安住已善解脫又以意識不適意之法亦無悄心無反抗心無壞亂之意無瞋心彼世尊之身住立心住立於內善安住已善解脫以眼見色亦對適意不適意之諸色彼世尊之身住立心住立於內善安住善解脫以耳聞聲以鼻嗅香以舌嘗味以身觸所觸以意識法對適意不適意之諸法彼世尊之身住立心住於內善安住善解脫以眼見色亦不貪所貪不瞋於所瞋不昏於所癡不怒於所怒不染於所染不憍於所憍以耳聞聲以鼻嗅香以舌嘗味以身觸所觸以意識法亦不貪所貪不瞋所瞋不昏所癡不怒所怒不染所染不憍所憍見者儘所見聞者儘所聞覺儘所覺所識儘所識不著於所見不著於所聞不著於所覺不著於所識不近著於所見不依止不結縛由彼離脫離縛以不限定之心而住不近著於所聞所覺所識者不依止不結縛由彼離脫離縛以不限定之心而住於世尊有眼世尊以眼見色於世尊無有欲貪世尊心善解脫於世尊有耳世尊以耳聞聲於世尊無有欲貪世尊心善解脫於世尊有鼻世尊以鼻嗅香於世尊無有欲貪世尊心善解脫於世尊有舌世尊以舌嘗味於世尊無有欲貪世尊心善解脫於世尊有身世尊以身觸所觸於世尊無有欲貪世尊心善解脫於世尊有意世尊以意識法於世尊無有欲貪世尊心善解脫眼樂色喜色喜悅色世尊調御彼眼守護防護且彼眼之防護而說示法耳樂聲鼻樂香舌樂味喜味喜悅味世尊調御彼舌守護防護且彼舌之防護而說示法身樂所觸意樂法喜法喜悅世尊調御彼意守護防護且彼意之防護而說示法人人使調御連出合戰象王乘調御象馳驅於戰場自行為周御堪忍誹謗者彼於人人中成為最勝者所被調御者皆為良騾馬信度産良馬大象亦良象自己使調御成為更良者此等騾馬象蓋由為駕獸善調御自己自己為駕獸由於自調御如至涅槃域涅槃之聖域不能不可至對種種煩惱心能不動搖由再有解脫到達調御地彼等於世間成為征服者於內外世間修習調諸根此世與他世一切為洞察修習待時者此成調御者如斯世尊是自己修習者此是尊師吠陀之達人我思自己修習者之義世間所有多種苦果由何處興起者之句中果由何處者是如斯耶不然耶何耶云何耶疑之質問疑念之質問迷惑之質問此是果由何處之義苦者是生苦老苦病苦死苦愁悲苦憂惱苦地獄之苦畜生界之苦餓鬼界之苦人界之苦入胎為原因之苦在胎為原因之苦出胎為原因之苦隨結為生者之苦被他支配為生者之苦使自苦之苦使他苦之苦苦苦行苦壞苦眼病耳病鼻病舌病身病頭病外耳病口腔病齒病咳喘息外鼻病熱病老腹病氣絶赤痢腹痛虎列剌癩癰疱瘡肺病癲癇輪癬疥癬風癬抓傷皸裂出血糖尿病痔疾疙瘩潰瘍膽汁等起病痰等起病風等起病膽汁痰風集合病氣候變化所生病不等姿勢所生病傷害所生病業報所生病寒暑飢渴大便小便虻蚊風炎熱與爬行類蛇接觸所生之苦母死之苦父死之苦兄弟死之苦姊妹死之苦親子死之苦親女死之苦失親戚之苦失財富之苦失健康疾病之苦失戒之苦失正見之苦在其等諸法於初有故認為興起有滅沒故認為滅有依止於業之異熟報有依止於異熟之業有依止於名之色有依止於色之名彼從於生瀰漫於老被病所打勝被死所攻擊住立於苦中無救護所無避難所無歸依所無可歸依者云此等為苦此等之苦由何處興起者耶由何處生由何處發生由何處起由何處生起由何處現前以何為因緣以何為集以何為發生因者耶問此等苦之根本問因問因緣問生成問發生問等起問食問所緣問緣問集質問乞求信樂此是世間所有多種苦果由何處興起者之義世間所有多種之句中所有者是普皆一切之一切無殘無餘於世間者是惡趣世間人世間天世間蘊世間界世間處世間多種者是多樣者多種類之苦此是世間所有多種之義故彼婆羅門言尊者彌多求曰世尊我向尊師問尊師以彼請語我尊師吠陀之達人我思自己修習者世間所有多種苦果由何處生起者二世尊宣示彌多求苦之發生汝問我隨依知解彼語汝所有種種於世間苦依因緣而發生一五苦之發生汝問我之句中苦者是生苦老苦病苦死苦愁悲苦憂惱苦此是苦汝問我發生者汝問我苦之根本問因問因緣問生成問發生問等起問食問所緣問緣問集質問乞求信樂此是苦之發生汝問我之義彌多求是世尊呼彼婆羅門之名世尊者此是尊重之同義語乃至一二頁以下參照謂世尊之語是與作證共同施設者此是世尊宣示彌多求之義隨依知解彼語汝之句中彼語汝將語汝彼苦之根本語汝因語因緣語生成語發生語等起語食語所緣語緣語集告示施設確立開顯分別顯示說明此是彼語汝之義隨知解者是我知解了知識知別知隨所通達不為使聞不依傳說不依傳承不依藏經之說不依思擇不依推論不依行相之審思不依見省思忍自己自知通說自現見之法此是隨知解苦依因緣而發生之句中依有十依即一渴愛依二見依三煩惱依四業依五惡行依六食依七瞋恚依八四取界依九六內處依十六識身依一切之苦亦由苦義為依言此等為十依苦者是生苦老苦病苦死苦愁悲苦憂惱苦乃至七七頁以下參照由病所打勝由死所攻擊於苦中住立無救護所無避難所無歸依所不可歸依者此等謂之苦此等之苦以依為因緣以依為因以依為緣有依為原因以依為因緣而生成發生生合生起生起現前此是苦依因緣而發生之義所有種種於世間之句中所有者是普皆一切之一切無殘無餘於世間者是於惡起世間人世間天世間蘊世間界世間處世間種種者是多樣多種之苦此是所有種種於世間之義故世尊宣示世尊宣示彌多求苦之發生汝問我隨依知解彼語汝所有種種於世間苦依因緣而發生三不知而所作依之愚鈍者屢屢近苦苦之發生隨觀者如實知而不作依一五一而不知所作依之之句中所者是無論剎帝利婆羅門毗舍首陀在家者家者天人雖然任何容貌任何業務任何職分任何階級任何地位任何法之具備者之義不知者乃不知至無明無智無辨知有惡慧作依者是作渴愛依作見依作煩惱依作業依作惡行依作食依作瞋恚依作四取界依作六內處依作六識身依令生令發生起此是而不知所作依之之義愚鈍者屢屢近苦之句中屢屢近苦者是屢屢至生苦老苦病苦死苦愁悲苦憂惱苦接近近寄執執取住著此是屢屢近苦之義愚鈍者者是愚鈍者蒙昧者無知者至無明者無智者無辨知者惡慧者此是愚鈍者屢屢近苦之義故如實知不作依之句中故者乃是故是彼理由彼因彼緣彼因緣於依正觀此之過患此乃是故之義知者是知了知識知別知通達即知一切行是無常了知識知別知通達一切行是苦一切法是無我乃至一九頁以下參照知所有集法皆是此滅法了知識知別知通達不作依不可作愛依不可作見依不可作煩惱依不可作業依不可作惡行依不可作食依不可作瞋恚依不可作四取界依不可作六內處依不可作六識身依令生令發生不可起此是故如實知不作依之義苦者是生苦老苦病苦死苦愁悲苦憂惱苦苦之發生隨觀者是隨觀根本者隨觀因者隨觀因緣者隨觀生成者隨觀發生者隨觀等起者隨觀食者隨觀所緣者隨觀緣者隨觀集者隨觀者是慧即所有慧知解乃至一八頁參照是不疑擇法正見此之隨觀具慧正具達正達成正成所具備者言為隨觀者此是隨親苦之生起發者之義故世尊宣示而不知所作依之愚鈍者屢屢近苦苦之發生隨觀者如實知而不作依四我等問尊師尊師告我等我更問其他冀師請語彼如何諸賢者暴流生與老愁苦與悲泣得為超度耶我乞願牟尼願請為解說此之一切法尊師如實知一五二我等問尊師尊師告我等之句中我等所問尊師乃我等向尊師問乞求所信樂尊師告我等者是請尊師告我等請述彼請示請設施請確立請開顯請分別請顯示請說明此是我等問尊師尊師告我等之義我更問其他冀師請語彼如何諸賢者暴流生與老及愁苦與悲泣得為超度耶之句中如何是如斯耶不然耶何耶云何耶疑之質問疑念之質問迷惑之質問諸賢者者是諸之賢者學者有慧者有覺者辨別者具慧者暴流者是欲流有流見流無明流生是於彼彼之有情之彼彼之有情聚而生發生入來生起諸蘊之現前內六處之獲得老者是於彼彼之有情之彼彼之有情聚而老老耄齒落白髮皺皮壽之損耗諸根之毀熟愁者是失親戚失財富因病而失健康失戒失正見又失任何者又遭遇任何不幸者之愁憂愁愁心內愁內遍愁內熱內熱惱心之燒熱憂愁箭悲泣者是失親戚失財富因病而失健康失戒失正見又失任何者又遭遇任何不幸者之哭悲哭涕哭悲泣哭歎悲歡泣言涕泣號泣哭泣慟哭如何諸賢者暴流生與死愁苦與悲泣得為超度耶如何諸賢者得度暴流生老愁與悲泣越度度過超越離越耶此是如何諸賢者暴流生與老愁苦與悲泣得為超度耶之義我乞願牟尼願請為解說之句中彼者是我所問我所乞我所求我所信樂牟尼言智為牟那即所有慧知解乃至一八頁以下參照不癡擇法正見世尊具備彼智牟尼而達於牟那有一身牟尼二語牟尼三意牟尼之三牟尼一身牟尼者云何捨斷殺生偷盜邪欲行之三種身惡行是身牟尼三種身善行是牟尼以身為所緣智是身牟尼身之遍知是身牟尼伴遍知道是身牟尼對身欲貪之捨斷是身牟尼身行出入息滅之第四禪定是身牟尼此是身牟尼二語牟尼者云何捨斷妄語兩舌惡口綺語之四種語惡行是語牟尼四種之語善行是語牟尼以語為所緣智是語牟尼語遍知是語牟尼伴遍知道是語牟尼對語欲貪之捨斷是語牟尼語行尋伺滅之第二禪定是語牟尼三意牟尼者云何捨斷貪欲瞋恚邪見之三種意惡行是意牟尼三種之意善行是意牟尼以心為所緣智為意牟尼心之遍知是意牟尼伴遍知道是意牟尼對心捨斷欲貪是意牟尼心行滅之想受滅定是意牟尼此是意牟尼無漏身乃是身語意牟尼具足此牟尼一切捨斷者無漏身乃是身語意牟尼具足此牟尼惡之洗除者具足此等之三牟尼者有六牟尼即是在家牟尼非家牟尼有學牟尼無學牟尼辟支牟尼牟尼牟尼一在家牟尼者云何為在家者而見涅槃句能識教之人人此是在家牟尼二非家牟尼者云何為出家者而見涅槃句能識教之人人此是非家牟尼三七有學是有學牟尼四阿羅漢是無學牟尼五辟支佛是辟支牟尼六如來阿羅漢等正覺者言為牟尼牟尼無明智者為愚昧由寂默而非牟尼如取捨而但用稱牟尼只取優秀業回避諸惡諸賢者由彼而彼為牟尼內外兩世間測者由彼而彼言牟尼一切世間於內外知不善與善之法值由天人之供養超著與網是牟尼願請為解說者是願請述請示請施設請確立請開顯請分別請顯示請說明此是願請為解說之義此之一切法尊師如實知者此法尊師如實知識考量度知辨知明暸此是此之一切法尊師如實知之義故彼婆羅門言我等問尊師尊師告我等我更問其他尊師請語彼如何諸賢者暴流生與老愁苦與悲泣得為超度耶我乞願牟尼我請為解說此之一切法尊師如實知五世尊宣示彌多求有關現世非傳聞至涅槃法我告汝知彼有念而行作可度世間之愛著一五三至涅槃法我告汝者我將告示施設確立開顯分別顯示說明初善中善後善有義有文而完全圓滿遍淨之梵行四念處四正勤四神足五根五力七覺支八支聖道涅槃至涅槃之行道此是至涅槃法我告汝之義彌多求者是世尊呼彼婆羅門之名有關現世非傳聞之句中關現世者是現世能見法能知法能考量法能度知法能辨知法能明暸法即一切行無常乃至一九頁以下參照所有集法皆是此滅法而能見法能知法能考量法能度知法能辨知法能明暸法如斯有關現世能見法我將說或又關於能見苦我將說之關於能見集將語集關於能見道將語道關於能見滅將語滅如斯有關能見法我將說或又自見無時的可謂來見聖道導引我將語關於能見法諸識者各自知者如斯我將語能見之法此是有關現世能見法之義非傳聞者不由他之傳聞不依傳說不依傳承不依藏經之說不依思擇不依推論不依行相之審思不依見省思忍自知通自現見說法此是有關現世非傳聞之義知彼有念而行作之句中知彼者是知解彼考量度知辨知而為明暸即一切行是無常乃至一九頁以下參照知解所有集法皆是此滅法考量度知辨知明暸有念者是由四行相而有念即對身修習身隨觀念處而有念乃至三頁參照言彼為有念行者是行行作動作活動護持持續不斷維持此是知彼有念而行作之義可度世間之愛著之句中愛著是渴愛即所有貪染貪乃至一三頁以下參照是貪欲貪不善根愛著者由何之義而為愛著耶擴大故而為愛著廣大故而為愛著染著故而為愛著冒險故而為愛著奪取故而為愛著欺語者故而為愛著毒根故而為愛著毒果故而為愛著毒受用故而為愛著或又彼渴受廣大而為色聲香味觸施主家衆住居利得名聲賞讚安樂衣服食物臥坐所病者之資具藥品欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有過去未來現在見聞覺識於諸法中擴大擴展此是愛著之義世間者是在於惡趣世間人世間天世間蘊世間界世間處世間可度世間之愛著者是世間所有愛著有念其愛著而可度可越度可度過可超越可離越此是可度世間之愛著之義故世尊宣示世尊宣示彌多求有關現世非傳聞至涅槃法我告汝知彼有念而行作可度世間之愛著六大仙彼之最上法聞而我乃歡喜彼知彼有念而行作可度世間之愛著一五四我歡喜彼之句中彼者是尊師之語語路說示教訓歡喜者是歡歡喜喜隨喜欲樂冀求希望熱望此是我歡喜彼之義大仙以最上法之句中大仙者由何義為大仙耶世尊求大戒蘊覓求遍求故為大仙大求者是大定蘊大慧蘊大解脫蘊求覓求遍求大解脫智見蘊故是大仙又求覓求遍求大暗身之摧破故是大仙求覓求遍求大顛倒之破壞故是大仙求覓求遍求大愛箭之拔除故是大仙求覓求遍求大見葛藤之開解故是大仙求覓求遍求大慢幢之撤去故是大仙求覓求遍求大行作之寂滅故是大仙求覓求遍求成為大暴流之度越故是大仙求覓求遍求大重擔之放下故是大仙求覓求遍求大輪回輪轉之斷絶故是大仙求覓求遍求大熱苦之消滅故是大仙求覓求遍求大熱惱之安息故是大仙求覓求遍求大法幢之舉揚故是大仙求覓求遍求大念處大正勤大神足大根大力大覺支大八支聖道第一義不死涅槃故是大仙又由有大權勢之有情佛何處耶世尊是何處耶天中天是何處耶人牛王是何處耶求覓求遍求故是大仙最上之法者是不死涅槃言為最上之法即所有一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃最上者是最高最勝最殊勝秀逸最上勝妙之法此是大仙最上法之義知彼有念為行作之句中知彼者是知解彼考量度知辨知明暸即一切行是無常乃至一九頁以下參照知解所有集法皆是此滅法考量度知辨知明暸有念者是由四行相而有念即對於身修習身隨觀念處而有念乃至三頁參照言彼為有念行者是行行作動作活動護持持續不斷維持此是知彼有念為行作之義可度世間之愛著之句中渴愛言為愛著即所貪染貪乃至一三頁參照貪欲貪不善根愛著是由何義而為愛著耶乃至八九頁參照為擴大擴展此是愛著之義世間者是惡趣世間乃至八九頁參照於處世間可度世間之愛著者是世間所有愛著有念彼愛著而可度越度度過超越離越此是可度世間之愛著之義故彼婆羅門言大仙彼之最上法聞而我乃歡喜彼知彼有念而行作可度世間之愛著七世尊宣示彌多求上下與橫及於中汝善知解所有物對於此等喜執著除棄識不住立有一五五汝善知解所有物者是汝知解了知識知辨知通達所有之物此是汝善知解所有物彌多求是世尊呼彼婆羅門之名世尊者此是尊重之同義語乃至一二頁以下參照言此世尊之語與作證共同施設者此是世尊宣示彌多求之義上下橫及於中之句中上者是言未來下是過去橫及中是現在上者是天世間下是地獄世間橫及中是人世間上者是善法下是不善法橫及中是無記法上者是無色界下是欲界橫及中是色界上者是樂受下是苦受橫及中是不苦不樂受上者是由足跖以上下者是由頂端以下橫及中是胴體此是上下橫及於中之義對於此等喜執著除棄識不住立有之句中對於此等者是對於既述示施設確立開顯分別顯示說明者喜者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根執著者是愛執著與見執著之二執著愛執著者云何由渴愛物而乃至四頁參照此是愛執著見執著者云何有二十事有身見乃至四頁參照此是見執著除棄識之句中識者是與福行俱起識與非福行俱起識與不動行俱起識除對此等喜執著於行俱起識除棄斥除斥捨捨斷除去滅除令之滅無此是對於此等除去喜執識之義不住立有之句中有者是業有與結生為再有業有者云何是福行非福行不動行此是業有結生為再有者云何是結生色受想行識此是結生為再有不住立有者是捨斷喜執著於行俱起識業有與結生再有除去滅除令之滅無而不住立於業有不住立結生為再有不可止住此是除去識不住立有之義故世尊宣示世尊宣示彌多求上下與橫及於中汝善知解一切物對於此等喜執著除去識不住立有八如斯無執著住念不放逸行作之比丘捨愛見我執捨棄生與老愁苦與悲泣茲知如斯者應以捨斷苦一五六如斯而住有念不放逸之句中如斯而住者是捨所喜與執著於行俱起之識業有結生再有捨斷除去滅除令之滅無此是如斯而住之義有念者是由四行相而有念即對於身而修習身隨觀念處乃至三頁參照言彼為有念不放逸者是恭敬作諸善法常作堅住作不萎縮而行不放棄行之欲不放棄責任我某時之日未圓滿戒蘊令圓滿耶又我既已令圓滿之戒蘊於彼時時以慧助長對諸善法彼有所有之欲精進勇猛努力不退念正知熱心精勤決意勤勵不放逸我某時之日未圓滿之定蘊慧蘊解脫蘊解脫智見蘊令圓滿耶又我既圓滿之解脫智見蘊彼時時以慧令助長對諸善法於彼處所有欲精進勇猛努力不退念正知熱心精勤決意勤勵不放逸又我某時之日可遍知未遍知之苦耶可捨斷未捨斷之煩惱耶可修習未修習之道耶可作證未作證之滅耶於彼處所有欲精進勇猛努力不退念正知熱心精勤決意勤勵不放逸此是如斯而住有念不放逸之義行作之比丘捨我執之句中比丘者是善凡夫比丘又有學比丘行者是有行行作動作活動獲持持續維持不斷我執是愛我執與見我執之二我執乃至四頁參照此是愛我執乃至四頁參照此是見我執捨斷愛我執捨遣見我執捨我執是遍捨除去滅除令之滅無此是行作之比丘捨我執之義捨棄生老愁悲泣茲知如斯者應為捨斷苦之句中生者是彼彼之有情於彼彼之有情衆生發生入來生起諸蘊之現前內六處之獲得老者是彼彼之有情於彼彼之有情聚老老耄齒落白髮皺皮壽之損耗諸根之毀熟愁者是失親戚失財富由病而失健康失戒失正見又失任何者又於遭遇任何不幸者之愁苦憂愁愁心內愁內遍愁內熱內熱惱心之燒熱憂愁箭悲泣者是失親戚失財富由病而失健康失正見又失任何者又遭遇任何不幸者之哭悲哭涕哭悲泣哭嘆泣言涕泣號泣慟哭茲者是於此之見乃至二六頁參照於此之人世間知者是智者明達者有智者辨知者慧者苦者是生苦乃至七七頁參照是愁悲苦憂惱苦捨棄生老愁悲泣茲知如斯者應捨斷苦者是知者明達者有智者辨知者慧者於茲捨斷生老愁悲泣除去滅除令之滅無此是捨棄生老愁悲泣茲知如斯者應捨斷苦之義故世尊宣示如斯無執著有念不放逸行作之比丘捨愛見我執捨棄生與老愁苦與悲泣茲知如斯者應為捨斷苦九大仙此語我歡喜瞿曇善告無依涅槃世尊確已捨斷苦此法尊師如實知一五七大仙此語我歡喜之句中此者是尊師之語語路說示示教教訓我歡喜者是我歡歡喜喜隨喜欲樂冀求希望熱望大仙者是世尊求大戒蘊覓求遍求故是大仙大求者乃至九頁參照人牛王於何處耶被求覓求遍求故是大仙此是大仙此語我歡喜之義瞿曇善告無依涅槃之句中善告者是善告善言善示善施設善確立善開顯善分別善顯示善說明此是善告之義瞿曇無依之句中依者是煩惱蘊行無依者是依之捨斷依之寂滅依之捨遣依之安息不死涅槃此是瞿曇無依為善告之義世尊確已捨斷苦之句中確者是此一向之語無疑語無疑惑語不二之語確實之語嚴密之語純粹之語確立之語世尊者此是尊重之同義語乃至此言世尊語與作證共同之施設已捨斷苦者是捨斷生苦老苦病苦死苦愁悲苦憂惱苦除去滅除令之滅無此是世尊確已捨斷苦之義此法尊師如實知者此法如實尊師知識考量度知辨知明暸此是此法尊師如實知之義故彼婆羅門言大仙此語我歡喜瞿曇善告無依涅槃世尊確已捨斷苦此法尊師如實知一牟尼尊師懇切所教誡人人亦應捨斷苦龍象佛近至禮拜尊師世尊懇切教誡我一五八人人亦應捨斷苦否之句中人人者是剎帝利婆羅門毗舍首陀在家者出家者天人亦捨斷耶若捨斷是捨斷生苦老苦病苦死苦愁悲苦憂惱苦除去滅除令之滅無此是人人亦捨斷苦否之義尊師懇切所教誡之句中所者是剎帝利婆羅門毗舍首陀在家者出家者天人尊師者是言世尊牟尼者言智為牟那乃至八四頁以下參照超越著網此是牟尼懇切教誡者是殷勤教誡反復教誡再三教誡教訓此是尊師懇切所教誡之義近至禮拜尊師之句中尊師是言世尊禮拜是由身而禮拜由語而亦禮拜由意而亦禮拜由隨義之行道而亦禮拜由法隨法之行道而亦禮拜恭敬尊重尊敬奉事敬重也近至者是至近真至近相會謁見面前而禮拜尊師龍象者是龍象世尊一不行罪惡故是龍象二不行故是龍象三不來故是龍象一不行罪惡故是龍象者云何罪惡者有雜染有齎再有之苦報是齎未來生老死惡不善法世尊宣示薩毗耶不行罪惡於世間捨離一切結結縛解脫染著一切處斯者其故言龍象如斯不行罪惡故是龍象二不行故是龍象者云何不行於欲趣不行於瞋趣不行於癡趣不行於怖畏趣由於貪而不行由於瞋而不行由於癡而不行由於慢而不行由於見而不行由於掉舉而不行由於疑而不行由於隨眠而不行由於違和之諸法而不趣不導不運不將來如是不行故是龍象三不來故是龍象者云何由須陀洹道捨斷所有之煩惱一切於此彼不再來不返不還由斯陀含道阿那含道捨斷所有之煩惱一切於此不再來不返不還由阿羅漢道捨斷所有之煩惱一切於此不再來不返不還如是不來故是龍象此是龍象近至禮拜尊師之義世尊懇切教誡我者是世尊懇切殷勤教誡反復教誡再三教誡教訓故彼婆羅門言牟尼尊師懇切所教誡人人亦應捨斷苦龍象近至禮拜尊師世尊懇切教誡我一一婆羅門吠陀達人乃是無所有者也向欲有之無著者為汝所知通之彼確度此之暴流度彼無心栽猶豫一五九婆羅門吠陀之達人所汝知通之句中婆羅門者是拒外七法故是婆羅門即是拒外有身見拒外疑拒外戒禁取拒外貪拒外瞋拒外癡拒外慢彼是雜染齎再有有不安苦報於未來拒外齎生老死諸惡不善法世尊宣示薩毗耶離垢一切斥諸惡等持善心自住立超越輪回有功德無依止者婆羅門吠陀之達人之句中吠陀者是於四沙門道智乃至七二頁參照超一切受此是吠陀之達人知通者是知通了知識知別知通達此是汝所知通婆羅門吠陀之達人之義向欲有無著者是無所有者之句中無所有者所有者是貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有捨斷此等諸所有正斷令寂滅令安息不得令生起以智火所燒之人言為無所有者欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二七頁參照此等言為煩惱欲有者是業有與結生再有之二有乃至九三頁參照此是業有乃至九三頁參照此是結生再有向欲有無著者是無所有者無所有而不懸於欲有不懸者是不礙著者此是向欲有無著者是無所有者彼確度此暴流之句中彼確者此是一向之語乃至九八頁參照是確立之語暴流者是欲流有流見流無明流度者是度越度度過超越離越此是彼確度此暴流之義度彼無栽無猶豫之句中度者是度欲流度有流度見流度無明流是越度度過超越離越彼梵行已成所作已辨過去輪回道到涅槃之方域到終點護梵行達最上之見修習道捨斷煩惱通達不動之阿羅漢果已作證滅涅槃於彼能遍知苦捨斷集修習道作證滅已知通可知通能遍知可遍知能捨斷可捨斷能修習可修習能作證可作證彼放捨障礙埋沒輪回之濠拔除門柱渴愛無有關鑰五下分結而為聖卸慢幢卸重擔離繫捨斷五支蓋具備六支捨守護一念由慧而有習行回避除去捨斷四依除去獨一諦遍見完全遣求覓有不混濁之思惟有安息身行有善解脫心有善解脫慧而為獨存完全已住於梵行而為最上人第一人得達第一之得達彼無積善惡之報無除去已除而住立無捨斷煩惱無執取已捨斷而住立無由離煩惱無由慢而高亢已離而住立令具備無學之戒蘊故而住立具備無學之定蘊無學之慧運無學之解脫蘊無學之解脫智見蘊故已住立體得真諦而住立超越動搖而住立消盡煩惱火而住立不回行輪回而住立取達運而住立由解脫習行而住立依遍淨慈而住立依遍淨悲喜捨而住立依究竟清淨而住立依遍淨無煩惱性而住立解脫故而住立知足故而住立於蘊之終邊而住立於界之終邊而住立於處之終邊而住立於趣之終邊而住立於結生之終邊而住立於有之終邊而住立於輪回之終邊而住立於輪轉之終邊而住立於最後之終邊而住立於最後之人界而住立最後之持身者是阿羅漢此是彼之最後有此是最後之身體成為最後生老死彼無再有輪回事此是度彼岸者是不死甘露涅槃即是彼一切行之止寂一切依之捨遣渴愛之滅盡離貪滅涅槃彼已到於彼岸達於彼岸到於終邊達於終邊到於終點達於終點到於究竟達於究竟到於最終達於最終到於救護所達於求護所到於避難所達於避難所到於歸依所達於歸依所到於無畏達於無畏到於無死達於無死到於不死甘露達於不死到於涅槃達於涅槃彼梵行已成所作已辨乃至一二頁以下參照是最後之生老死輪回於彼無再有此是又度彼岸之義無有栽之句中栽頑迷者貪是栽瞋是栽癡是栽忿是栽恨是栽乃至四一頁參照一切不善行是栽捨斷此等諸栽為正斷令寂滅令安息令不得生起以智火所燒者言為無栽者無猶豫之句中猶豫者是對苦猶豫疑對苦集猶豫對苦滅猶豫對苦滅之道猶豫對前際猶豫對後際猶豫對前後際猶豫對此緣性之諸緣起法猶豫是所有如斯猶豫疑問猶豫性疑念疑迷惑二路疑惑多岐取不決定不確定不沈潛心之硬直意困惑捨斷此等之猶豫正斷令寂滅令安息使不得生起以智火所燒者言為無猶豫者此是無有心栽無猶豫之義故世尊宣示婆羅門吠陀達人乃是無所有者也向欲有之無著者為汝所知通之彼確度此之暴流彼度無心栽猶豫一二彼人知者達吠陀對種種有遣去著彼離愛無苦無求我言彼已度生老一六彼人知者達吠陀之句中知者是知者明達者有智者辨知者慧者彼者無論剎帝利無論人如何容貌乃至八一頁參照任何法之具備者達吠陀之句中吠陀者是四沙門道智乃至七二頁參照超一切受此是吠陀之達人人者是有情人摩奴之子士夫補特伽羅命者生死者生者根行者自在行者摩奴所生者茲於此之見乃至二六頁參照於此人世間此是彼人知者達吠陀之義對種種有遣去著之句中對種種有者是對於種種有之業有再有即於欲有對業有於欲有對再有於色有對業有於色有對再有於無色有對業有於無色有對再有是對再三之有再三之生起再三之結生再三身體之發生著者是貪著瞋著癡著慢著見著煩惱著惡行者之七著遣去者是棄遣去諸著或脫而遣去諸著結結縛懸懸著礙著縛譬如著載於馬象等之乘物車貨車戰車之物離著放下推落如是棄遣遣去彼等諸著又脫遣去諸著結結縛懸懸著礙著縛此是對種種諸有遣去著之義彼離渴愛無苦無求我言彼已度生老之句中渴愛者是色愛聲愛香愛味愛觸愛法愛言捨斷此愛正斷令寂滅令安息令不得生起以智火所燒者是離渴愛者捨渴愛者唾棄渴愛者脫渴愛者捨斷渴愛者捨遣渴愛者離貪者捨貪者唾棄貪者脫貪者捨斷貪者捨遣貪者彼無愛煩惱消滅是清涼覺受樂自為梵而住此是彼離渴愛之義無苦者貪是苦瞋是苦癡是苦忿是苦恨是苦乃至三九頁參照一切不善行是苦言捨斷此苦正斷令寂滅令安息使不得生起以智火所燒者為無苦者無求者言無求渴愛即所有貪染貪乃至一三頁參照貪欲貪是不善根捨斷此之求正斷令寂滅令安息令不得生起以智火所燒者言為無求者生者於彼彼有情之彼彼有情聚生發生入來生起諸蘊之現前六內處之獲得老者是於彼彼有情之彼彼有情聚老老耄齒落白髮皮壽之損耗是諸根之毀熟死者於彼彼有情之彼彼有情聚死沒死亡破壞滅失死滅死命終五蘊之破壞尸骸之投棄是命根之斷絶彼離愛無苦無求我言彼已度生老者是離渴愛無苦無求之彼度生老死越度度過超越令離越我言語示施設確立開顯分別顯示說明此是彼離渴愛無苦無求我言彼已度生老之義故世尊宣示彼人知者達吠陀對種種有遣去著彼離愛無苦無求我言彼已度生老世尊之說法終乃至三二頁參照合掌禮拜世尊說尊師世尊是我師我是弟子而坐彌多求學童所問之義釋第四畢
