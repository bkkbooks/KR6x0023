body:
  text: 第十劫波學童所問之義釋一尊者劫波曰暴流生時大怖畏在於湖沼輪回中老死打勝之人人我尊請語洲渚依止所此苦更應無有事尊師為我說洲渚一九二於湖沼中之句中湖沼者是輪回來往來往時趣種種有死亡生起起破壞生老死輪回之前際亦不承認後際亦不承認於輪回中之諸有情是存在住立依著近著縛著信解輪回之前際不認者云何只此使輪轉數生之輪轉說此以上不輪轉者無如是事如斯是不認輪回之前際之義只此使輪轉數百生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬生之輪轉如說彼以上已為不輪轉之事如斯亦成為輪回之前際不被認之義只此使輪轉數億生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數百億生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千億生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬億生之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義使輪轉此些年月之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數百年之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千年之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數億年之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數百億年之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千億年之輪轉說此以上已為不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬億年之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數百劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千劫之輪轉說此以上已為不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數億劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數百億劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數千億劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義只此使輪轉數十萬億劫之輪轉說此以上已不輪轉者無如是事如斯亦是不認輪回之前際之義即世尊已如斯說諸比丘此輪回是無始而不認彼之前際諸比丘有無明蓋有愛結而有續流轉輪回之諸有情斯亦長時經驗激苦與不幸增大墓所諸比丘故於一切諸行應厭離離貪解脫此是至當如斯認輪回之前際之義不認輪回之後際者云何彼應輪轉此些數生之輪轉說此以上不應輪轉者無如是事如斯不認輪回之後際之義彼應輪轉此些之數百生此些之數千生此些之數十萬生乃至此些之數億生此些之數百億生此些之數千億生此些之數十萬億生些此之年月此些之數百年此些之數千年此些之數十萬年此些之數億年此些之數百億年此些之數千億年此些之數十萬億年此些之數劫年此些之數百劫此些之數千劫此些之數十萬劫此些之數億劫此些之數百億劫此些之數千億劫此些之數十萬億劫之輪轉說此以上已不應輪轉者無如是事如斯不認輪回之後際之義如斯亦不認輪回之前際亦不認輪回之後際諸有情於輪回之中是住立依著近著縛著信解此是在於湖沼輪回中之義尊者劫波曰之句中曰斯者是此句之接續乃至一頁參照是句之次第世尊者此是敬語敬重語尊重語尊敬語劫波者彼婆羅門之名乃至一頁參照稱呼此是尊者劫波曰之義暴流生時大怖畏者是欲流有流見流無明流之生發生起生起現前之時大怖畏者是生之怖畏老之怖畏病之怖畏死之怖畏此是暴流生時大怖畏之義老死打勝之人人觸於老被襲圍具老觸於死被襲圍具從於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所是無歸依狀態之人人此是老死打勝之人人之義我尊請語洲渚所者是洲渚救護所避難所歸依所趣之依據請語者是請言示施設確立開顯分別顯示說明我尊者此是敬語敬重語尊重語尊敬語此是我尊請語洲渚所之義尊師為我說洲渚之句中尊師者是言世尊為我說洲渚者是請說洲渚救護所避難所歸依所趣之依據請言示施設確立開顯分別說明此是尊師為我說洲渚之義此苦更應無有事者苦滅於茲寂滅滅沒安息更不生結生之苦即不生於欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有再趣再生起再結生有輪回輪轉不發生不生起滅於茲寂滅滅沒為可安息之云義此是此苦更應無有事之義故彼婆羅門言尊者劫波曰暴流生時大怖畏在於湖沼輪回中老死打勝之人人我尊請語洲渚所此苦更應無有事尊師為我說洲渚二世尊宣劫波暴流生時大怖畏在於湖沼輪回中老死打勝之人人劫波我將語汝洲渚一九三在於湖沼中之句中湖沼者是輪回來往來往時趣種種有死亡生起起破壞生老死亦不認輪回之前際後際亦不認在輪回之中諸有情在住立依著近著縛著信解不認輪回之前際者云何乃至一八一頁以下參照如斯不認輪回之前際之義不認輪回之後際者云何乃至一八三頁參與如斯不認輪回之後際之義如斯輪回之前際亦不認輪回之後際亦不認諸有情在輪回之中住立依著近著縛著信解此是在於湖沼輪回中之義世尊宣示劫波之句中劫波是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示劫波之義暴流生時大怖畏者是欲流有流見流無明流之生發生起生起現前之時大怖畏者是生之怖畏老之怖畏病之怖畏死之怖畏此是暴流生時大怖畏之義老死打勝之人人觸於老被襲圍具老觸於死被襲圍具從於生為老所瀰漫為病所勝為死所害破無救護所無避難所無歸依所是無歸依狀態之人人此是老死打勝之人人之義劫波我將語汝洲渚語洲渚是語救護所避難所歸依所趣之依據言示施設確立開顯分別顯示說明也此是我將語汝洲渚之義劫波於汝之句中劫波者是世尊呼彼婆羅門之名此是劫波我將語汝洲渚之義故世尊宣示世尊宣示劫波暴流生時大怖畏在於湖沼輪回中老死打勝之人人劫波我將語汝洲渚三無取著而無所有在此洲渚無其他老與死之使滅盡我言此即是涅槃一九四無取著而無所有無所有者於所有貪所有瞋所有癡所有慢所有見所有煩惱所有惡行所有此所有之捨斷所有之寂滅所有之捨遣所有之安息成為不死涅槃此是無所有之義無取著言渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根取著之捨斷取著之寂滅取著之安息不死涅槃此是無取著而無所有之義在此洲渚無其他此洲渚者是救護所避難所歸依所非其他趣之依據由此而別無其他之洲渚但只此為最高最勝最殊勝秀逸最上勝妙之洲渚此是在此洲渚無其他之義我言此即是涅槃之句中槃渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根槃之捨斷槃之寂滅槃之捨遣槃之安息是不死涅槃興者此句之接續乃至一頁參照句之次第言者是言示施設確立開顯分別顯示說明此是我言此即是涅槃之義老死之滅盡者是老死之捨斷寂滅捨遣安息不死涅槃此是老死之滅盡之義故世尊宣示無取著而無所有在此洲渚無其他老與死之使滅盡我言此即是涅槃四有念所之了知此現世寂滅之人人彼等不隨行魔力彼等不為魔從者一九五有念所之了知此之句中此是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃了知者是了知知考量度知辨知明暸即一切行是無常乃至一九頁以下參照了知所有集法皆是此滅法知考量度知辨知明暸所之者是阿羅漢漏盡者有念者是由四原因而有念即對身修習身隨觀念處而有念乃至三頁參照彼言為有念此是有念所之了知此之義現世寂滅之人人之句中現世者是現世見法知法考量法度知法辨知法明察法也寂滅之人人者是貪之消滅故而令消滅之人人瞋之消滅故而令消滅之人人癡之消滅故而令消滅之人人忿恨乃至三九頁參照一切不善行消滅故而消滅安息之人人此是現世寂滅之人人之義彼等不隨行魔力之句中魔者是所有彼魔黑魔主邊行者障解脫放逸之親類彼等不隨行魔力者是彼等不在魔力中行動又魔亦不及彼等之力彼等對魔對魔黨對魔鈎對魔味對魔境對魔內熱對魔行處對魔結縛亦勝打勝打超奪去彼等粉碎而住動作活動護持持續維持此是彼等不隨行魔力之義彼等不為魔從者彼等不為為魔之從者扈從者侍從者使者彼等為佛世尊之從者扈從者侍從者使者此是彼等不為魔從者之義故世尊宣示有念所之了知此現世寂滅之人人彼等不隨行魔力彼等不成魔從者偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐劫波學童所問之義釋第十畢
