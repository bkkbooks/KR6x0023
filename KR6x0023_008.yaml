body:
  text: 第七難陀學童所問之義釋一尊者難陀曰世間諸牟尼如何對此事人人言之耶以智使生起牟尼言之耶活命使生起牟尼言之耶一七七世間諸牟尼之句中有者有存在能得世者是惡趣世間乃至一八頁參照是處世間諸牟尼者命名為牟尼是活命外學尼乾結髮外學苦行者此是世間諸牟尼之義尊者難陀曰之句中曰斯者是句之接續尊者是敬語難陀者是彼婆羅門之名乃至一頁參照稱呼此是尊者難陀曰之義如何對此事人人言之耶之句中人人者是剎帝利婆羅門毘舍首陀在家者出家者天人言者是語話說明言說如何對此事者是如斯耶不然耶何耶云何耶是疑之質問疑念之質問此是如何對此事人人言之耶之義以智使生起牟尼言之耶具八等至之智又五神通之智正具達正達成正成具備者世人言語話說明言說牟尼備者耶此是以智使生起牟尼言之耶之義活命使生起牟尼言之耶者或具種種極大之行作向麤惡生活之勤勵正具達正達成正成具備者世人言語話說明言說牟尼者耶此是活命使生起牟尼言之耶之義故彼婆羅門言尊者難陀曰世間有諸牟尼如何對此事人人言之耶以智使生起牟尼言之耶活命使生起牟尼言之耶二諸之善巧者難陀茲不說由見與由智牟尼亦不說為破煩惱軍無苦與無求牟尼與我言所行之人人一七八由見與由聞由智亦不說之句中由見亦不說者是由見淨亦不說由聞亦不說是由聞淨亦不說由智亦不說者由八等至智亦又由邪智亦不說此是由見與由聞由智亦不說之義諸善巧者難陀茲不說之句中善巧者是所有蘊善巧者界善巧者處善巧者緣起善巧者念處善巧者正勤善巧者神足善巧者根善巧者力善巧者覺支善巧者道善巧者果善巧者涅槃善巧者彼等諸善巧者具見淨與聞淨及八等至智邪智正具達正達成正成俱備者牟尼不說不語不話不說明不言說此是諸善巧者難陀茲不說之義牟尼與我言破煩惱軍而無苦與無求所行之人人之句中軍者是魔軍即身惡行是魔軍語惡是為魔軍意惡行是魔軍貪是魔軍瞋是魔軍癡是魔軍忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行是魔軍即世尊如斯宣示汝之第一軍是欲第二軍乃言不樂汝第三軍是飢渴第四軍是言可愛第六軍乃言怖畏汝第五軍是惛眼汝之第七軍是疑覆與強情第八軍利得名譽與恭敬以邪行而得名聲又對自己為賞揚貶下他人為不善汝之軍障此解脫汝是黑魔之軍勢不勝於彼無勇者勇者已勝而得樂由四沙門道而勝打勝一切之魔軍勝一切敵對煩惱破此摧破令潰走故彼等是破煩惱軍無苦者是貪苦瞋苦癡苦忿苦恨苦乃至四一頁參照一切不善行是苦捨斷此苦正斷令寂滅安息令不得生起以智火所燒者言為無苦者無求者言求渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根捨斷此求渴愛正斷令寂滅安息令不得生起以智火所燒者言為無求者之義牟尼與我言破軍無苦無求所行之人人者破軍而成阿羅漢漏盡者無苦無求而行於世間行作動作活動護持持續維持所行之人人牟尼與我言語話說明言說此是牟尼與我言破軍無苦無求所行之人人之義故世尊宣示諸之善巧者難陀茲不說由智與由聞牟尼亦不說為破煩惱事無苦與無求牟尼與我言所行之人人三尊者難陀曰所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨我師世尊彼等於其處自見行禁制果度生老耶我問於尊師世尊請語我一七九所有此等之沙門婆羅門之句中所有者是普皆一切之一切無殘無餘沙門者是所有此處至佛教以外之出家為出家者婆羅門者所有呼為卿者此是所有此等之沙門婆羅門之義尊者難陀曰之句中曰斯者是句之接續尊者是敬語難陀者是彼婆羅門之名乃至一頁參照此是尊者難陀曰由見亦由聞而為說有淨者由見亦說語話說明言說淨清淨徧淨脫解脫徧脫由聞亦說語話說明言說淨清淨脫解脫徧脫此是由見亦由聞而為說有淨之義由戒與由努亦說有淨者由戒亦說語話說明言說淨清淨徧淨脫解脫徧脫由努亦說語話說明言說淨清淨徧淨脫解脫徧脫由戒與努而亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由戒與由努說有淨之義由多種之物亦說有淨多種之努由祭典亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由多種之物說有淨之義世尊彼等於其處行禁制果之句中果者是如斯耶不然耶何耶云何耶疑之質問疑念之質問迷惑之質問此是果彼等者是惡見者世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設之物此是世尊彼等果之義於其處禁制之句中其處者是已見已忍已意欲於持說禁制者是慎用心守護防護且行者是行行作動作活動護持持續維持此是世尊彼等於其處行禁制果之義我師果度生老耶是度生老死越度度過超越離越我師此是敬語敬重語尊敬語此是我師果度生老耶之義我問於尊師世尊請語我之句中我問於尊師者是我問於尊師乞於尊師求於尊師信樂於尊師請為我說此是我問於尊師之義世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設之物請語我者是請言示施設確立開顯分別顯示說明此是我問於尊師世尊請語我之義故彼婆羅門言尊者難陀曰所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨我師世尊彼等於其處自見行禁制果度生老耶我問於尊師世尊請語我四世尊宣示難陀所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨假令於其處彼等行禁制我言之彼等生老不得度一八所有此等之沙門婆羅門之句中所有者是普皆一切之一切無殘無餘沙門者是所有至此處佛教以外之出家為出家者婆羅門者是所有呼為卿者此是所有此等之沙門婆羅門之義世尊宣示難陀之句中難陀者是呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示難陀之義由見亦由聞亦說有淨由見而亦說語話說明言說淨清淨徧淨脫解脫徧脫由聞亦說語話說明言說淨清淨徧淨脫解脫徧脫由見聞亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由見亦由聞亦說有淨之義由戒與由努亦說有淨由戒亦說語話說明言說淨清淨徧淨脫解脫徧脫由努亦說語話說明言說淨清淨徧淨脫解脫徧脫由戒與努亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由戒與由努亦說有淨之義由多種之物亦說有淨由多種之努祭典亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由多種之物亦說有淨之義假令於其處彼等行禁制之句中假令者是此句之接續句之相合句之圓滿句之合體文之接著句之次第彼等者是惡見者於其處者是己見己忍己意欲己於持說禁制者是慎用心守護守護防護行者是行行作動作活動護持持續維持此是假令於其處彼等行禁制之義我言之彼等生老不得度彼等不得度生老死不離越越度度過超越不出離生老死不棄捨不度過不離越於生老死之中而動作於輪迴路之中而動作從於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所我言於無歸依之狀態說示施設確立開顯分別顯示說明此是我言之彼等生老不得度之義故世尊宣示世尊宣示難陀所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨假令於其處彼等行禁制我言之彼等生老不得度五尊者難陀曰所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨若牟尼若彼等之說不為度暴流然我尊於天界人界果誰度生老我向尊師問世尊請語我一八一所有此等之沙門婆羅門之句中所有者是普皆一切之一切無殘無餘沙門者是所有至此處佛教以外之出家為出家者婆羅門者是所有呼為卿者此是所有此等之沙門婆羅門之義尊者難陀曰之句中曰斯者是句之接續尊者是敬語難陀是彼婆羅門之名乃至一頁參照稱呼此是尊者難陀曰之義由見亦由聞而為說有淨由見亦說語話說明言說淨清淨徧淨脫解脫徧脫由聞亦說語話說明言說淨清淨徧淨脫解脫徧脫由見聞亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由見亦由聞而為說有淨之義由戒與由努而為說有淨由戒亦說語話說明言說淨清淨徧淨脫解脫徧脫由努亦說語話說明言說淨清淨徧淨脫解脫徧脫由戒與努亦說語話說明言說淨清淨徧淨脫解脫徧脫此是由戒與由努而為說有淨之義由多種之物而亦說有淨由多種之努祭典亦說語話說明言說有淨清淨徧淨脫解脫徧脫此是由多種之物而亦說有淨之義若牟尼若彼等之說不為度暴流之句中若彼等者是惡見者牟尼言智為牟那乃至八四頁以下參照超著與網者此是牟尼若彼等之說不為度暴流不度欲流有流見流無明流不越度不度過不超越不離越在生老死之中而動作於輪迴路之中而動作從於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所如說無歸依之狀態若說示施設確立開顯分別顯示說明此是若牟尼若彼等之說不為度暴流之義然我尊於天界人界誰果度生老然於含天魔梵天之世界於含沙門婆羅門含天人之人人中誰度生老死越度度過超越離越者耶我尊此是敬語敬重語尊重語尊敬語此是然我尊於天界人界誰果度生老之義我向尊師問世尊請語我之句中我向尊師問者是我問於尊師乞於尊師求於尊師信樂於尊師請向我說此是我向尊師問之義世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者請語我者是請言示施設確立開顯分別顯示說明此是我向尊師問世尊請語我之義故彼婆羅門言尊者難陀曰所有此等之沙門婆羅門由見亦由聞而為說有淨由戒與由努而為說有淨由多種之物而為說有淨若牟尼若彼等為說不為度暴流然我尊於天界人界誰果度生老我向尊師問世尊請語我六世尊宣示難陀我言一切之沙門婆羅門非言生與老已能為所蓋見聞覺戒努於茲一切捨所有多種物亦皆一切捨令徧知渴愛無漏之人人我言彼人人已能度暴流一八二世尊宣示難陀我言一切之沙門婆羅門非言生與老已能為所蓋難陀我非言一切之沙門婆羅門為生與老所遮障所蓋覆所妨障所閉塞所蔽所隱蔽我言彼等沙門婆羅門捨斷生老死為根絕如截頂之多羅樹而滅無於未來不生起者示施設確立分別顯示說明此是世尊宣示難陀我言一切之沙門婆羅門非言生與老已為所蓋之義見聞覺戒努於茲一切捨之人人是捨一切之見淨捨斷除去滅除令滅無之人人捨一切之聞淨一切之見聞淨一切之覺淨一切之戒淨一切之務淨一切之戒務淨捨斷除去滅除滅無之人人此是見聞覺戒努於茲一切捨之人人之義所有多種物亦皆一切捨者是由多種之務祭典捨淨清淨徧淨脫解脫徧脫捨斷除去滅除令之滅無此是所有多種物亦皆一切捨之義使徧知渴愛無漏之人人我言彼人人已能度暴流之句中渴愛是色愛聲愛香愛味愛觸愛法愛使徧知者是渴愛一知徧知二度徧知三斷徧知之由三徧知而徧知一知徧知者云何渴愛即是徧知即徧知而觀此是色愛此是聲愛此是香愛此是味愛此是觸愛此是法愛此是知徧知二度徧知者云何斯知徧知之後度知渴愛即渴愛是無常是苦是病是癰乃至三頁參照度知是無歸依所此是度徧知三斷徧知者云何斯度知之後捨斷渴愛除去滅除令之滅無即世尊已如斯說諸比丘對渴愛如有所有欲貪須捨斷彼若如斯彼之渴愛捨斷根絕如截頂之多羅樹於未來不生起此是斷徧知由此等三徧知而徧知彼渴愛此是徧知渴愛之義無漏者捨斷根絕欲漏有漏見漏無明漏之四漏此等之漏如截頂之多羅樹令之滅無於未來不生起此言為無漏者人人者是阿羅漢漏盡者徧知渴愛無漏之人人我言彼人人已能度暴流者徧知渴愛無漏者彼等度欲流度有流度見流度無明流度一切輪迴路我言越度超度超超越離越者示施設確立開顯分別顯示說明此是徧知渴愛無漏之人人我言彼人人已能度暴流之義故世尊宣示世尊宣示難陀我言一切之沙門婆羅門非言生與老已能為所蓋見聞覺戒努於茲一切捨所有多種物亦皆一切捨使徧知渴愛無漏之人人我言彼人人已能度暴流七我喜大仙此之語瞿曇善能說無依涅槃茲捨見聞覺戒務多種之物一切捨徧知渴愛無漏人我言彼能度暴流一八三我喜大仙此之語之句中此之者是尊師之語語路說示示教教訓我喜者是我歡歡喜喜隨喜欲樂冀求希望熱望大仙者是大仙大求者世尊求大戒蘊覓求徧求故是大仙乃至九頁參照人牛王何處耶被求覓求徧求故是大仙此是我喜大仙此之語之義瞿曇善說無依之句中善說者是善告善言善示善施設善確立善開顯善分別善顯示善說明此是善告之義瞿曇無依之句中依者是煩惱蘊行無依者是依之捨斷依之寂滅依之捨遣依之安息不死涅槃此是瞿曇善說無依之義茲捨見聞覺戒務之人人是捨一切之見淨捨斷除去滅除令滅無之人人是捨一切之聞淨一切之見聞淨一切之覺淨一切之世淨一切之務淨一切之戒務淨捨斷除去滅除令滅無之人人此是茲捨見聞覺戒務之義多種之物一切捨者是由多種之務祭典淨清淨徧淨脫解脫徧脫捨斷除去滅除令之滅無此是多種之物一切捨之義徧知渴愛無漏人我言彼能度暴流之句中渴愛者是色愛聲愛香愛味愛觸愛法愛徧知渴愛渴愛為一知徧知二度徧知三斷徧知之由三徧知之徧知一知徧知者云何是徧知渴愛即徧知觀此是色愛此是聲愛此是香愛此是味愛此是觸愛此是法愛此是知徧知二度徧知者云何斯知徧知之後以度知渴愛即度知渴愛是無常是苦是病是癰是箭是痛是惱是敵是毀是疾是禍是不快是怖畏是災患是動是壞是不恒是無救護所是無避難所是無歸依所是不為歸依者是空缺是空虛是空是無我是過患是變易法是不堅實是痛根是殺戮者是非有是有漏是有為是魔食是生法是老法是病法是死法是愁悲苦憂惱法是雜染法是集是滅沒是不樂味是過患是不出離此是度徧知三斷徧知者云何斯度知之後以捨斷渴愛除去滅除令之滅無此是斷徧知由此等三徧知謂徧知彼渴愛是徧知渴愛之義無漏者是欲漏有漏見漏無明漏之四漏捨斷根絕此等之漏如截頂之多羅樹令之滅無於未來不生起者此言無漏者人人者是阿羅漢漏盡者徧知渴愛無漏之人人我言彼能度暴流者徧知渴愛無漏者彼等度欲流度有流度見流度無明流度一切輪迴路越度超度超超越使離越者我言示施設確立開顯分別顯示說明此是徧知渴愛無漏之人人我言彼度暴流之義故彼婆羅門言我喜大仙此之語瞿曇善能說無依涅槃茲捨見聞覺戒務多種之物一切捨徧知渴愛無漏人我言彼能度暴流終偈乃至三二頁參照尊師世尊是我師我是弟子而坐難陀學童所問之義釋第七畢
