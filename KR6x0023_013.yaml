body:
  text: 第十二跋陀羅浮陀學童所問之義釋一尊者跋陀羅浮陀曰窟宅之捨者渴愛之斷者一切不動者喜之捨斷者暴流之度者一切解脫者計度之捨者請問善慧者聞龍象人人由茲而將去一一一窟宅之捨者渴愛之斷者不動者之句中窟宅之捨者者於色界所有欲所有貪所有喜所有渴愛所有近著取著心之攝持執著隨眠此一切於佛世尊所捨斷根絕如截頂之多羅樹成為滅無於未來不生起者故佛是窟宅之捨者於受界想界行界識界所有欲所有貪所有喜所有渴愛所有近著取著心之攝持執著隨眠此一切於佛世尊所捨斷根絕如截頂之多羅樹成為滅無於未來不生起者故佛是窟宅之捨者渴愛之斷者之句中渴愛者是色愛聲愛香愛味愛觸愛法愛其渴愛於佛世尊所斷斷絕正斷寂滅安息不得生起以智火所燒故佛是渴愛之斷者一切不動者之句中動者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根此動是渴愛於佛世尊所捨斷根絕如截頂之多羅樹成為滅無於未來不生起者故佛是一切不動者動之捨斷故是不動者世尊於利得亦不動於不利得亦不動於名聲亦不動於不名聲亦不動於賞讚亦不動於毀訾亦不動於樂亦不動於苦亦不動不動不動搖不震不震動不震駭故佛是一切不動者此是窟宅之捨者渴愛之斷者一切不動者之義尊者跋陀羅浮陀曰之句中曰者是此句之接續乃至一頁參照是句之次第尊者此是敬語敬重語尊敬語尊重語跋陀羅浮陀者彼婆羅門之名乃至一頁參照稱呼此是尊者跋陀羅浮陀曰之義喜之捨斷者暴流之度者解脫者之句中喜者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根此喜渴愛於佛世尊所捨斷根絕如截頂之多羅樹成為滅無於未來不生起者故佛是喜之捨斷者暴流之度者者是世尊度欲流度有流度見流度無明流度一切輪迴路越度超度超越已離越彼已成梵行所作已辨乃至一二頁以下參照為最後之生老死輪迴於彼無再有此是喜之捨斷者暴流之度者解脫者者是世尊之心由貪脫解脫善解脫彼之心由瞋脫解脫善解脫彼之心由癡脫解脫善解脫忿恨乃至三九頁參照彼之心由一切不善行脫解脫善解脫此是喜之捨斷者暴流之度者解脫者之義計度之捨者請問善慧者之句中計度者見愛計度與見計度之二計度乃至四頁參照此是愛計度乃至四頁參照此是見計度於佛世尊愛計度已捨斷見計度為已捨遣愛計度之捨斷故見計度之捨遣故佛是計度之捨者請問者請請向求信樂冀求希望熱望善慧者之句中慧者是慧即所有慧知解乃至一八頁參照是不癡擇法正見世尊具此之慧般若正具達正達成正成具備故佛是善慧者此是計度之捨者請問善慧者之義聞龍象由茲而去之句中龍象者是龍象佛不行罪惡故是龍象不行惡趣故是龍象不來煩惱故是龍象乃至一頁以下參照如斯不來故是龍象聞龍象由茲而去者是聞聽尊師之語語路說示示教教訓把持保持觀察由茲而去發足往諸方行此是聞龍象由茲而去之義故彼婆羅門言尊者跋陀羅浮陀曰窟宅之捨者渴愛之斷者一切不動者喜之捨斷者暴流之度者一切解脫者計度之捨者請問善慧者聞龍象人人由茲而將去二雄者尊師之說繼續為期待諸多之人人由諸地方來請願於尊師解說於彼等尊師善慧者此法如實知一一二諸多之人人由諸地方來集之句中諸多之人人者是剎帝利婆羅門毘舍首陀在家者出家者天人由諸地方來集者是由鴦伽摩竭陀迦尸憍薩羅跋耆末羅支提沙竭羅般遮羅阿槃提臾那劍蒲闍來集者來會者入來者集會者此是諸多之人人由諸地方來集之義雄者尊師之言說繼續為期待之句中雄者是雄者英雄世尊是具精進者故是雄者有能者故是雄者乃至一九二頁參照身毛豎立之離去者故是雄者離此世一切諸惡越地獄苦精進者有精進有精勤者斯人其故言雄者雄者尊師之言說繼續為期待之句中尊師之言說是尊師之語語路說示示教教訓期待者是待期待欲樂冀求希望熱望此是雄者尊師之言說為期待之義請願於尊師解說於彼等之句中彼等者是剎帝利婆羅門毘舍首陀在家者出家者天人尊師者言世尊願尊師解說者願者是言示施設確立開顯分別顯示說明此是願尊師解說之義尊師是如實知法者是尊師如實知此法識考量度知辨知明暸此是尊師如實知法之義故彼婆羅門言雄者尊師之說繼續為期待諸多之人人由諸地方來請願於尊師解說於彼等尊師善慧者此法如實知三世尊宣示跋陀羅浮陀上與下橫及於中一切取愛須調伏所有取著於世間由物而魔從於人一一三一切取愛須調伏之句中取愛者是色愛因何色愛言為取愛耶由彼之取愛而人人取色取著熱熱取住著取受想行識趣生起結生有輪迴輪轉取著執執取住著因此而言色愛為取愛一切取愛須調伏者須調伏一切之取愛折伏捨斷除去滅除令之滅無此是一切取愛須調伏之義世尊宣示跋陀羅浮陀之句中跋陀羅浮陀是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示跋陀羅浮陀之義上下橫及於中之句中上者是未來下者是過去橫及於中者是現在上者是善法下者是不善法橫及中者是無記法上者是天世間下者是惡趣世間橫及中者是人世間上者是樂受下者是苦受橫及中者是不苦不樂受上者是無色界下者是欲界橫及中者是色界上者是由足蹠以上下者是由髮之頂端以下橫及中者是同體此是上下橫及中之義所有取著於世間者是取取著執執取住著所有色受想行識於世間者是惡趣世間乃至一八頁參照於處世間此是所有取著於世間之義由物而魔從於人者由彼業行而結生從扈從蘊魔界魔處魔趣魔生起魔結生魔有魔輪迴魔輪轉魔從於人者是有情人摩奴之子士夫補特伽羅命者生死者生者根行者摩奴所生者此是由物而魔從於人之義世尊宣示跋陀羅浮陀上與下橫及於中一切取愛須調伏所有取著於世間由物而魔從於人四比丘有念諸世間故且知解不取著死之領域使愛著有取有情斯且觀一一四故且知解不取著之句中故者故是彼理由而於其因於其緣於其因緣且知解者是且知知解了知識知別知通達即一切行是無常乃至一九頁以下參照知所有集法皆是此滅法知解了知識知別知通達不取著者不是取色不取著不執不執取不住著不取受想行識趣生起結生有輪迴輪轉不取著不執不執取不住著此是故且知解不取著之義比丘有念於諸世間以何物之句中比丘者是凡夫比丘又有學比丘此為比丘有念者是由四原因而有念即對身修習隨觀念處而有念乃至三頁參照彼言為有念此是比丘有念何物者是任何之色受想行識於諸世間者是一切惡趣世間一切天世間一切人世間一切蘊世間一切界世間一切處世間此是比丘有念諸世間之義有取有情斯且觀之句中有取有情者是色取取著執執取住著取受想行識生起結生有輪迴輪轉取著執執取所住著之人人斯者是此句之接續乃至一頁參照是句之次第且觀者是見覩觀眺省思普觀此是有取有情斯且觀之義死之領域使愛著此人人之句中人人者是有情之同義語死之領域者是煩惱蘊行言為死之領域人人固著止著懸懸著礙著於死神之領域魔之領域死之領域譬如壁釘於吊鉤品物是著固著取著懸懸著礙著如斯之人人於死神之領域魔之領域死之領域固著止著懸懸著礙著此是死之領域使愛著之義故世尊宣示比丘有念諸世間故且知解不取著死之領域使愛著有取有情斯且觀偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐跋陀羅浮陀學童所問之義釋第十二畢
