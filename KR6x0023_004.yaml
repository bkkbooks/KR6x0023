body:
  text: 第三富那迦學童所問之義釋一尊者富那迦曰佛見根本為不動我已前來欲質問為何仙人剎帝利婆羅門及其他人彼等在於此世間廣營供養諸天神世尊我奉問尊師尊師示彼請語我一四三佛見根本為不動之句中動者是渴愛即所有貪染貪乃至一四頁參照貪欲貪不善根佛世尊捨斷根絕彼之動渴愛如截頂之多羅樹成為滅無於未來為不生起者故佛是不動者動之捨斷故是不動世尊雖對利得亦不動雖對不利得亦不動雖對名聲亦不動雖對不名聲亦不動雖對賞讚亦不動雖對毀訾亦不動雖對樂亦不動雖對苦亦不動不動不怖動不動搖不震不震動不震駭此是不動者見根本者是世尊見根本見因見因緣見發生見等起見食見所緣見緣見集有三不善根即貪不善根瞋不善根癡不善根即世尊如斯說諸比丘為諸業之集起有此等之三因緣即為諸業之集起有貪因緣有瞋因緣有癡因緣諸比丘由貪所生之業瞋所生之業癡所生之業天不能認得人不能得又其他所有善趣亦不能得但諸比丘由貪所生之業瞋所生之業癡所生之業而地獄認得畜生界得餓鬼界得又其他所有惡趣得此等三不善根是地獄畜生界餓鬼界之身體發生因如斯世尊知見如斯世尊見根本乃至是見集有三善根即無貪善根無瞋善根無癡善根即世尊如斯說諸比丘為諸業之集起有此等之三因緣乃至諸比丘由無貪所生之業無瞋所生之業無癡所生之業而不得地獄不得畜生界不得餓鬼界又其他所有惡趣不得但諸比丘由無貪所生之業無瞋所生之業無癡所生之業而天得人得又其他所有善趣得此等三善根是天人之身體發生因如斯世尊知見如斯世尊見根本乃至是見集又世尊已如斯說諸比丘所有不善而有不善分屬於不善之諸法皆以無明為根本與無明合體無明若害破彼等皆至害破世尊如斯知見如斯世尊見根本乃至是見集又世尊已如斯說諸比丘所有善而有善分屬於善諸法皆以不放逸為根本與不放逸合體說不放逸是彼等諸法之最高世尊如斯知見如斯世尊見根本乃至是見集或又世尊知見無明是行之根本行是識之根本識是名色之根本名色是六處之根本六處是觸之根本觸是受之根本受是愛之根本愛是取之根本取是有之根本有是生之根本生是老死之根本世尊知見如斯世尊見根本乃至見集或又世尊知見眼是眼病之根本耳是耳病之根本鼻是鼻眼病之根本舌是舌病之根本身是身病之根本意是心病之根本世尊知見如斯世尊見根本見因見因緣見發生見等起見食見所緣見緣見集此是佛見根本為不動之義尊者富那迦曰之句中曰是句之接續尊者是敬語富迦那是彼婆羅門之名我已前來欲質問我來欲質問欲質問而我來欲聞質問之回答而我來如斯是我已前來欲質問之義或又欲質問之人人欲行質問之人人欲聞質問之回答之人人來至赴往接近近侍如斯亦是欲質問而來之義或又欲問尊師而來者我尊師為有能者有力者與我共同而問說答顯示得語如斯亦是我來欲質問之義為何仙人等之人人之句中所謂為何者是依何止著繫著近著縛著信解仙人者是謂有仙人之名者即所有活命外學出家為仙人之出家尼乾結髮外學苦行者人人即是人人之事此是為何仙人等之人人之義剎帝利與婆羅門於諸天神之句中剎帝利者是所有剎帝利王族之出生者婆羅門是所有呼為卿者婆羅門族諸天神者是活命外學之弟子以活命外學是天神於尼乾之弟子尼乾是天神於結髮外學之弟子結髮外學是天神於普行者之弟子普行者是天神於驅擯者之弟子驅擯者是天神於象務者象是天神於馬務者馬是天神於牛務者牛是天神於鷄務者鷄是天神於鴉務者鴉是天神於世天務者世天力士是天神於力天務者力天力士是天神於滿賢務者滿賢夜叉是天神於珠賢務者珠賢夜叉是天神於火務者火是天神於龍務者龍是天神於金翅鳥務者金翅鳥是天神於夜叉務者夜叉是天神於阿修羅務者阿修羅是天神於犍闥婆務者犍闥婆是天神於大王務者大王是天神於月務者月是天神於太陽務者太陽是天神於帝釋務者帝釋是天神於梵天務者梵天是天神於天務者天是天神於方務者禮拜方角是天神各自禮拜所供養者是彼人人天神此是廣為供養諸天神之義於此世間廣營供養之句中供養物者是衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等之施物營供養者一求衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養之覓求所徧求之人人亦營供養又二是準備衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養之人人亦營供養又三衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養物之施獻施捨人人亦營供養廣者一此等供養物多又二獻此等供養之人人多又三此等之受施者多一此等供養物多者云何此等之衣服食物臥坐所病者之資具藥品食物飲物衣物乘物鬘香塗油臥牀住宅燈具等之供養物多此是此等供養物多二獻此等供養之人人多者云何是獻此等供養人人之剎帝利婆羅門毘舍首陀在家者天人等多此是獻此等供養人人之多三此等之受施者多者云何是此等受施者之沙門婆羅門乞丐者行乞者及彼等之弟子此是此等之受施者多在此世間者是於人世間此是彼等於此世間之義世尊我奉問尊師尊師請語我之句中問者是一為欲明解未見之問二為欲向他合流已見之問三為欲斷疑念之問之三問一為欲明解未見之問者云何原來某者之特相未知未見未考量未度知未辨知於未明暸之時為欲知見為欲考量為欲度知為欲辨知為欲明暸而問此是為欲明暸未見之問二為欲向他合流已見之問者云何原來某者之特相已知見考量度知辨知為明暸之時為欲與他諸賢之說合流而問此是為欲向他合流已見之問三為斷疑念之問者云何原來就某事如斯耶不然耶何耶云何耶為疑所襲為疑念所襲於生迷惑之時彼為欲斷彼疑念而問此是為欲斷疑念之問有此等之三問更有一人問二非人問三化人問之三問一人問者云何是人接近佛世尊而問即比丘問比丘尼問優婆塞問優婆夷問王問剎帝利問婆羅門問毘舍問首陀問在家者問出家者問此是人問二非人問者云何是非人接近佛世尊而問即龍問金翅鳥問夜叉問阿修羅問犍闥婆問大王問帝釋問梵天問天神問此是非人問三化人問者云何世尊自有四肢五體化作完具諸根意所成之色身彼之化人接近佛世尊而問世尊答彼此是化人問有此等之三問更有一自義問二他義問三兩義問之三問更有一現世義問二來世義問三第一義問之三問更有一無罪義問二無煩惱義問三淨白義問之三問更有一過去問二未來問三現在問之三問更有一內問二外向三內外問之三問更有一善問二不善問三無記問之三問更有一蘊問二界問三處問之三問更有一念處問二正勤問三神足問之三問更有一根問二力問三覺支問之三問更有一道問二果問三涅槃問之三問世尊我奉問尊師者我向尊師問向尊師乞向尊師求向尊師信樂請為我說此是我奉問尊師之義世尊者此是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者尊師示彼請語我者是請語我請言示施設確立開顯分別顯示說明此是世尊我奉問尊師尊師示彼請語我之義故婆羅門言尊者富那迦曰佛見根本為不動我已前來欲質問為何仙人剎帝利婆羅門及其他人彼等在於此世間廣營供養諸天神世尊我奉問尊師尊師示彼請語我二世尊宣示富那迦所有此等之仙人剎帝利與婆羅門彼等在於此世間廣營供養諸天神彼等希望此狀態依著老死營供養一四四所有此等之仙人之句中所有此等者是普徧一切一切之一切無殘無餘之義仙人者謂有仙人之名者即仙人之出家為出家所有活命外學尼乾結髮外學苦行者所謂人人是人之事此是所有此等之仙人之義富那迦是世尊呼彼婆羅門之名世尊是尊重之同義語乃至一二頁以下參照此之世尊與所謂語成為與作證為共同施設者此是世尊宣示富那迦之義剎帝利與婆羅門於諸天神之句中剎帝利是所有剎帝利之生活者婆羅門是所有呼為卿者諸天神者於活命外學之弟子活命外學是天神乃至四七頁以下參照於方務者禮拜方角是天神各自所禮拜供養者是彼人人之天神此是諸天神之義於此世間廣營供養之句中供養物是衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等之設物營供養者一是求衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等之供養覓求所徧求之人人亦營供養又二是準備衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養之人人亦營供養又三是施衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等之供養物獻施捨之人人亦營供養廣者是此等供養物多又獻此等供養人人多又此等受施者多此等供養物多者云何乃至四九頁參照此是此等受施者多於此世間者是於人世間此是彼等在於此世間廣營供養之義富那迦希望此狀態之句中希望者是希望色之獲得希望聲之獲得希望香之獲得希望味之獲得希望觸之獲得希望子之獲得希望妻之獲得希望財之獲得希望名聲之獲得希望於自在之獲得希望於剎帝利大家身體之獲得希望於婆羅門大家身體之獲得希望於居士大家身體之獲得希望於四大王天身體之獲得希望於三十三天夜摩天都率天化樂天他化自在天梵眾天身體之獲得樂冀求冀望熱望此是希望之義富那迦希望此狀態之句中在此處希望身體之發生即希望於此剎帝利大家身體之發生希望於此婆羅門大家身體之發生希望於此居士大家身體之發生希望於四大王天身體之發生希望於此三十三天此夜摩天此都率天此化樂天此他化自在天此梵眾天身體之發生是樂冀求冀望熱望也此是希望此狀態之義依著老死營供養之句中依著老死是依止老依止病依止死依止愁悲苦憂惱依止於生此即依止於老依止於老者此即依止於病依止於病者此即依止於死依止於死者此即依止於愁悲苦憂惱依止於愁悲苦憂惱者此即依止於趣依止於趣者此即依止於生起依止於生起者此即依止於結生依止於結生者此即依止於有依止於有者此即依止於輪迴依止於輪迴者此即依止止著近著縛著信解於輪迴此是依著老死營供養之義故世尊已宣示世尊宣示所有此等之仙人剎帝利與婆羅門彼等在於此世間廣營供養諸天神彼等希望此狀態依著老死營供養三尊者富那迦曰所有此等之仙人剎帝利與婆羅門彼等在於此世間廣營供養諸天神於供養路不放逸果度生老與否耶世尊我向尊師問尊師示彼請語我一四五所有此等之仙人之句中所有此等乃至五二頁參照於供養路不放逸之句中果者是如斯耶不然耶成何耶云何耶是疑之質問疑念之質問迷惑之質問此是果之義彼等是奉獻供養之人人世尊是尊重之同義語乃至一二頁以下參照世尊之語是與作證共同施設者於供養路不放逸之句中供養言為供養路譬如聖道言為聖路天道言為天路梵道言為梵路如是供養言為供養路不放逸者是於供養路不放逸恭敬而作常作堅住作不萎縮行不放棄欲行之欲不放棄責任而行彼屢屢為彼重視彼向於彼傾於彼赴於彼信解彼是以彼為主此是於供養路不放逸之義恭敬作乃至前方參照以彼為主求衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等之供養覓求所徧求之人人亦於供養路不放逸恭敬作乃至以彼為主準備衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養之人人亦是於供養路不放逸恭敬而作乃至以此為主施衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具等供養獻施捨之人人亦是於供養路不放逸此是於供養路不放逸之義果度生老與否耶我尊是能度生老死耶越度耶度過耶超度耶離越耶此是果度生老與否耶之義我尊者是敬語敬重語尊重語尊敬語此是我尊度生老耶之義世尊我向尊師問尊師示彼請語我之句中我向尊師問者是我向尊師問向尊師乞向尊師求向尊師信樂請為我說此是我向尊師問之義世尊此是尊重之同義語乃至一二頁以下參照此謂世尊之語是與作證共同施設者請為我語者是請語我以彼言示施設確立開顯分別顯示說明此是世尊我向尊師問尊師示彼請語我之義故彼婆羅門言尊者富那迦曰所有此等之仙人剎帝利與婆羅門彼等在於此世間廣營供養諸天神於供養路不放逸果度生老與否耶世尊我向尊師問尊師示彼請語我四世尊宣示富那迦希望讚嘆望獻供緣於利得熱望欲彼等供養有貪染我言不度生與死一四五希望讚嘆望獻供之句中希望者是希望色之獲得希望聲之獲得希望香之獲得希望味之獲得希望子之獲得希望妻之獲得希望財之獲得希望名聲之獲得希望自在之獲得希望於剎帝利大家身體之獲得希望於婆羅門大家身體之獲得希望於居士大家身體之獲得於四大王天乃至五四頁參照希望於梵眾天身體之獲得樂冀求冀望熱望此是希望之義讚嘆是一讚嘆供養二讚嘆果三讚嘆受施者一讚嘆供養者云何此供養是可愛施適意施勝妙施適切施簡擇施無罪施屢屢施施而施者之心信樂而讚嘆稱譽讚說賞讚如斯是讚嘆供養二讚嘆果者云何於此之供養因緣而供養者可獲得色可獲得聲可獲得香可獲得味可獲得觸剎帝利大家婆羅門大家乃至五四頁參照可獲得於梵眾天之身體而為讚嘆稱譽讚說賞讚如斯是讚嘆果三讚嘆受施者云何受施者具足生善生具足姓習誦聖典持真言通達三吠陀語彙儀軌音韻語原論阿闥婆吠陀為第五傳說諸書典之句與解說文法熟達順世論大人相論離貪為貪之調伏而為行道離瞋為瞋之調伏而為行道離癡為癡之調伏而為行道已具足信具足戒具足定具足慧具足解脫具足解脫智見而為讚嘆稱譽讚說賞讚如斯是讚嘆受施者熱望者是熱望色之獲得熱望聲之獲得熱望香之獲得熱望味之獲得熱望觸之獲得熱望於剎帝利大家身體之獲得乃至五四頁參照熱望於梵眾天身體之獲得此是希望讚嘆獻熱望之義獻成為獻供施供養施捨衣服食物臥坐所病者之資具藥品食物飲物著物乘物鬘香塗油臥牀住宅燈具此是希望讚嘆獻熱望之義世尊宣示富那迦之句中富那迦是世尊呼彼婆羅門之名世尊此是尊重之同義語乃至一二頁以下參照世尊之語此是與作證共同為施設者此是世尊宣示富那迦之義緣於利得熱望欲緣於色之獲得而熱望欲緣於聲之獲得而熱望欲乃至五四頁參照緣於梵眾天身體之獲得而熱望欲切望翹望此是緣於利得熱望欲之義彼等供養有貪染我言不度生與死之句中彼等是行供養之人人行供養者是行供養加行熱心專心行彼屢屢為彼重彼向於彼傾於彼赴於彼信解彼是以彼為主此是行供養之義有貪染之句中有貪者是渴愛即對所有之有有欲有貪有喜有渴愛有愛情有渴有熱惱有昏迷有縛著由於有貪對諸有而貪貪覓昏迷縛著懸懸著礙著此是彼等供養有貪染之義我言不度生與死彼等行供養而受有貪所染不得度生老死不得越度不得度過不得超越不得離越不出離生老死不棄遣不越度不超越不離越於生老死之中而動作於輪迴路之中而動作從於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所我言無歸依之狀態示施設確立開顯分別顯示說明此是彼等供養有貪染我言不度生與老之義故世尊已能宣示希望讚嘆獻熱望緣於利得熱望欲彼等供養有貪染我言不度生與死五尊者富那迦曰彼等行供養若不度生老我尊如若然果在天人界何人由供養得度生老耶我向尊師問尊師請語我一四七彼等行供養若不度生老者彼等行供養之人人行供養為貪所染不得度生老死不得越度不得度過不得超越不得離越為不出離生老死為不棄遣為不越度為不超越為不離越於生老死之中而動作於輪迴路之中而動作從於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所如為於無歸依之狀態此是彼等行供養若不度生死之義尊者富那迦曰之句中曰是此句之接續乃至一頁參照此是尊者富那迦曰之義我尊依供養而生或老之句中依供養者是依供養獻供種種之供養多供養我尊是敬語敬重語尊敬語此是我尊依供養而生老之義我尊如若然果在天人界何人得度生老耶然者何人含天含魔含梵天之於世界含沙門婆羅門含天與人之於人人之中得生老死耶得越度耶得度過耶得超越耶得離越耶我尊是此敬語敬重語尊重語尊敬語此是然者果於天界人界何人得度生老耶之義我向尊師問世尊請語我之句中我向尊師問者是我向尊師問乞於尊師求於尊師信樂於尊師請向我說此是我向尊師問之義世尊此是尊重之同義語乃至一二頁以下參照此謂世尊之語是與作證共同施設者請語我者請向我語言示施設確立開顯分別顯示說明此是世尊我向尊師問請語我之義故彼婆羅門言尊者富那迦曰彼等行供養若不度生老我尊若然果於大人界何人由供養得度生老者我向尊師問世尊請語我六世尊宣示富那迦察悟世間彼此狀於世何等之動貪寂靜無煙忿無苦無求言彼度生老一四八察悟世間彼此狀之句中察悟者是智即所有慧知解乃至一八頁參照不癡擇法正見彼此之句中此者是人世間彼者是天世間此是欲界彼是色界無色界此是欲界色界彼是無色界察悟世間彼此狀態察悟彼此是無常是苦是病是癰是箭乃至二九頁參照察悟是無歸依所是知考量度知辨知明暸此是察悟世間彼此狀之義世尊宣示富那迦之句中富那迦是世尊呼彼婆羅門之名世尊者此是尊重之同義語乃至一二頁以下參照此謂世尊之語是與作證共同施捨者此是世尊宣示富那迦之義於世間無何等之動人之句中人者是阿羅漢漏盡者動者是愛動見動慢動煩惱動業動此等有無之動不存不存在不能得捨斷者正斷者寂滅安息不得生起以智火所燒之人何等者是何等亦如何於何處亦亦在內亦在外亦在內外於此世間是惡趣世間乃至一八頁參照處世間此是有無何等之動人之義寂靜無煙無苦無求之人我言彼度生與老之句中寂靜者是貪之寂靜故是寂靜瞋之寂靜故是寂靜癡之寂靜故是寂靜忿恨覆惱嫉慳諂誑強情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行之寂靜故寂止故寂滅故燒盡故消滅故離去故安息故是寂靜寂滅消滅安息此是寂靜無煙者是身惡行無煙壞滅涸渴令之滅無語惡行意惡行無煙壞滅涸渴令之滅無貪無煙壞滅涸渴令之滅無瞋癡忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行為無煙壞滅涸渴令之滅無又以忿言為煙婆羅門實慢汝重擔忿言成為煙妄言成為灰獻供杓子舌獻火之處心自使調御者乃是人之火又由十行相生忿即一彼已行我不利而生忿二彼於行我不利而生忿三彼將行我不利而生忿四已行我可愛可意者之不利五行不利六將行不利而生忿七已行我不愛不可意者之利八行利九將行利而生忿十無道理而生忿如斯所有心之瞋害瞋恨瞋恚違逆怒激怒大激怒瞋激瞋心之大激瞋恚意之激瞋忿忿怒忿怒性瞋瞋怒瞋怒性恚恚怒恚怒性違背違逆憤怒憤慨心之不快此言為忿又對於忿應知有強烈微弱事於某時忿只亂心而未至於使口痙攣於某時忿只使口痙攣而未至於動顎於某時忿只動顎而未至於發惡口麤語於某時忿只發惡口而未有怒目諸方於某時忿只怒目諸方而未有執刀杖於某時忿只執刀杖而未有揚起刀杖於某時忿只揚起刀杖而未有以刀杖打下於某時忿只以刀杖打下而未有斬斫於某時忿只斬斫而未有種種撕裂於某時忿只種種撕裂而未斬斷手足於某時忿只斬斷手足而未奪生命於某時忿只奪生命而未至於搶徧捨一切狀態此忿殺害他人已而殺害自己故斯忿至第一增盛達第一廣大者捨斷此之忿正斷令寂滅令安息令不得生起以智火所燒者言為無煙者此是無煙無苦者貪是苦瞋是苦癡是苦忿是苦恨是苦乃至三九頁參照一切不善行是苦捨斷此苦正斷令寂滅令安息令不得生起以智火所燒者言無苦者此是無苦無求者言求渴愛即所有貪染貪乃至一四頁參照是貪欲貪不善根捨斷此之求渴愛正斷令寂滅令安息令不得生起以智火所燒者言無求者此是無求生者是於彼彼之有情之彼彼之有情聚生發生入來生起諸蘊之現前內六處之獲得老者是彼彼之有情彼彼之有情聚老老耄齒落白髮皺皮壽之損耗諸根之毀熟也寂靜無煙無苦無求之人我言彼度生與老者是所有寂靜無煙無苦無所求之人彼度生老死越度度過超越離越此為我言示施設確立開顯分別顯示說明此是寂靜無煙無苦無求我言彼度生與老之義故世尊宣示世尊宣示富那迦察悟世間彼此狀於世何等之動貪寂靜無煙無苦無求我言彼度生與老世尊說法之偈將終乃至三二頁參照合掌禮拜世尊謂尊師世尊是我師我是弟子而為坐富那迦學童所問之義釋第三畢
