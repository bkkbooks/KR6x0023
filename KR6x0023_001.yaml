body:
  text: 小義釋歸命彼世尊應供等覺者彼岸道品序偈一一婆羅門婆和利通達吠陀之真言繼續冀求無所有憍薩羅都去南路九七六二阿攝迦與阿羅迦中間境域等距離瞿陀婆利河畔住彼拾落穗食樹實九七七三於彼住所之附近已有廣大之村鎮收獲為生在彼處彼於營作大施與九七八四已進行作大施與彼再入於草菴屋當彼再入草菴時來一他處婆羅門九七九五傷足焦日咽喉渴頭受塵土齒著泥彼接近彼婆和利向彼乞討五百金九八六婆和利見此之彼招至坐所使坐息問彼樂善健康耶更向彼述次之語九八一七我有一切之施物我將以此為施捨梵者信認我之言我無有五百之金九八二八若於我繼續行乞卿不與我五百金為七日而汝之頭應使斷裂為七分九八三九呪咀作法有詭詐婆羅門唱恐怖言彼聞彼之呪咀言婆和利陷苦惱中九八四一彼為愁之箭所中悄瘁已不為攝食且彼成為如斯心意念已不樂禪定九八五一一見彼駭怖使苦惱天神起義欲相助彼即接近婆和利向彼述如次之語九八六一二彼不知解頂之事彼是求財詭詐者有關頂又與頂墮於彼非有此智慧九八七一三苦卿欲知此之事有關頂又頂墮智為我所問且語汝我將使卿聞其語九八八一四然我對此亦無知在我關此無有智然關頂與頂墮智此是諸勝者之見九八九一五然而於此地之上頂為頂墮有誰知天神請問汝知耶請求將彼告知我九九一六迦毗羅衛之都城有世間出家導師彼為甘蔗王後裔釋迦族子光照世九九一一七彼實是等正覺者一切諸法達彼岸一切神通得十力一切諸法具眼者一切諸法達盡滅解脫彼已斷盡依九九二一八彼佛世尊具眼者現正説法於世間汝往彼之前發問彼將向汝解説彼九九三一九聽聞正覺者之語踴躍意悅婆和利彼之愁煩漸稀薄彼獲得廣大之喜九九四二踴躍意悅婆和利感動向彼問天神如何村又如何街如何地方世主在將往最上人之處我等禮拜正覺者九九五二一憍薩羅都舍衛城勝者博優廣慧者卸荷無漏釋迦子頂墮知者人牛主九九六二二聞此通達彼真言告諸弟子婆羅門汝等前來諸學童我語汝等聞我言九九七二三彼向出現其世間此為常時難得所彼之正覺有令名興起教化於世間宜速急往舍衛城最上之人汝等見九九八二四然師婆羅門見彼如何成佛我等知如何而為知彼耶無知我等請師語九九九二五於諸真言吠陀中完全大人三十二相好光明被播傳順次已能為解説一二六彼之四肢與五體大人相好所有者在彼只有二途徑除此無有第三事一一二七彼若居住於在家彼將征服此地上不依笞杖與刀劍依法統治其國家一二二八若又彼由其家出而為非家出家者彼能開啓三毒蔽無上正覺阿羅漢一三二九我之生年姓特相真言吠陀與弟子有關頂與頂墮智向彼尋問在意中一四三彼若具有無障見彼若成為佛覺者我等以意為質問彼將以語成返答一五三一聞婆和利右之語弟子十六婆羅門阿耆多帝須彌勒富那迦與彌多求一六三二廣多迦優波斯婆難陀又與醯摩迦刀提耶劫波兩人與賢者闍都乾耳一七三三更有跋陀羅浮陀優陀耶及布沙羅莫伽羅闍有慧者最後賓祇耶大仙一八三四彼等各各有徒衆一切世間有令名樂禪定者以禪定為植宿善為賢者一九三五結髮身著羚羊皮彼等皆禮婆和利對彼且為右繞禮共使出發向北方一一三六阿羅迦首都入波底吒那由彼向東方之摩醯沙底轉往優禪尼又向瞿那墮更向卑地寫往都市婆那一一一三七憍賞彌往沙枳多入最上都舍衛城斯波醯迦毗羅衛入拘尸那羅都市一一二三八波婆城向菩伽市毗舍離向摩揭陀王舍城中美適意達波沙那迦塔廟一一三三九如渴者之求冷水如商人求得大利如被暑熱求樹蔭急登世尊所住山一一四四世尊正當彼之時比丘衆前被尊敬如獅子於林中吼為諸比丘説教法一一五四一阿耆多見正覺者身有黃金色之光光明照耀如太陽又如十五圓滿月一一六四二彼見世尊之肢體圓滿相好無等比彼心欣悅立一方意向世尊為質問一一七四三有關我師之生年請語其姓與特相請語真言通達狀師婆羅門教幾人一一八四四年齡成百二十歲彼姓乃是婆和利彼之肢體有三相彼已通達三吠陀一一九四五大人相好與傳説又達語彙與儀軌教授五百之弟子以達自法之極致一二四六已使斷愛最上人三相簡別婆和利尊者請為我等説勿使我等存疑惑一二一四七時彼以舌覆蔽顏兩眉中間有白毫彼陰處隱覆被馬陰藏學童斯知彼三相一二二四八何亦不聞質問者聞佛對問之回答一切人人心感激悉皆合掌為思惟一二三四九無論諸天與梵天須闍之夫如帝釋在於意中問質問得應答者將有誰一二四五我等之師婆和利遍問頂與頂墮智世尊請為彼解説仙人為我除疑惑一二五五一須知無明成為頂信與念與定三者欲與精進使相應有關明成頂墮智一二六五二於茲彼之諸學童不斷狂喜大感激片袒羚羊皮之依向佛兩足頭伏禮一二七五三婆羅門之婆和利彼與諸多弟子共心中踴躍大喜悅尊師足下為禮拜一二八五四婆羅門之婆和利與諸弟子共安樂學童汝等亦皆然成為安樂壽永久一二九五五婆羅門之婆和利汝之疑問被解明汝等意欲將為問可問所有一切事一三五六由正覺者為解明諸衆學童合掌坐茲阿耆多向如來使為第一質問者一三一序偈畢
