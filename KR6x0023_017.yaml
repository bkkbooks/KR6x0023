body:
  text: 第十六賓祗耶學童所問之義釋一尊者賓祗耶曰我老無力色衰者聽力不佳視不明使我中途勿蒙昧勿亡勿死勿滅亡須語我應識知法捨斷生老於此世一一二我老無力色衰者之句中老者是老長耆年重齡達於老齡生而百二十歲無力者是力弱力少無力勢色衰者是容色已過容色離去彼青年時美麗光輝之容色者此已消失過患衰相現前此是我老無力色衰者之義尊者賓祗耶曰之句中曰是句之接續尊者是敬語賓祗耶是彼婆羅門之名乃至一頁參照稱呼此是尊者賓祗耶曰之義聽力不佳視力不明淨之句中之視力成為不明淨是視力不淨不清淨不遍淨不淨白我以眼不見如實色此是視力不明淨之義聽力不佳是耳不淨不清淨不遍淨不淨白我以耳不聞如實聲此是視力不明淨聽力不佳視之義使我中途勿蒙昧勿亡勿令我亡死滅亡蒙昧是無知而陷於無明無智不辨知為惡慧中途者不了知道不闡明不知不獲得不觸不作證尊師之法見行道於中途而應命終此是勿使中途我蒙昧勿亡之義須語我應識知法之句中須語法者須語初善中善後善有義有文而完全圓滿遍淨之梵行四念處四正勤四神足五根五力七覺支八支正道至涅槃之行道須告示施設確立開顯分別顯示說明此是須語法之義我應識知者是我應知應識知別知通達得達觸達作證此是須語我應識知法之義捨斷生老於此世者是於此世生老死之捨斷寂滅捨遣安息不死涅槃此是捨斷生老於此世故彼婆羅門言尊者賓祗耶曰我老無力色衰者聽力不佳視不明使我中途勿蒙昧勿亡勿死勿滅亡須語我應識知法捨斷生老於此世二世尊宣示賓祗耶有色之故見蒙害色故病患放逸人故汝而為不放逸為不再有須捨色一一二一有色之故見蒙害之句中色者是四大種及四大種所造色有情以色為因以色為緣以色為源因而被害蒙害加害惱害色有時人人行種種之懲罰即以鞭笞以杖笞以棍棒笞斷手斷足斷手足斷耳斷鼻斷耳與鼻破頭蓋而入鐵丸剝頭皮磨頭蓋向口中入燈火捲油布而燒全身捲油布而燒手捆倒而剝皮剝下皮膚再行纏身綁縛手足由四方放火剝取皮肉腱令身粉碎擦灰汁於受傷之身向耳孔突刺鐵串而旋轉拔骨令身體如藁蒲團灌澆熱油使狗噉食於生中刺串以刀斷首如斯有情以色為因以色為緣以色為原因而被害蒙害者是被加害惱害如斯見被害蒙害觀考量度知辨知明暸此是有色之故見蒙害之義世尊宣示賓祗耶之句中賓祗耶是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示賓祗耶之義色故病患放逸人之句中病患者是病患動心惱心受擊痛心憂心即由眼病而病患動心惱心受擊痛心憂心由耳病而乃至一四頁參照由虻蚊風炎熱由與爬行類之接觸而病患動心惱心受擊痛心憂心此是色之故而有病患之義或又眼減退失毀失衰滅離去有消滅時人人病患乃至憂心耳鼻舌身色聲香味觸施主家衆住居利得名聲賞讚樂衣服食物臥坐所病者之資具藥品之減退失毀失衰滅離去有消滅時人人病患動心惱心受擊痛心憂心如斯亦是色之故而有病患之義人人者是剎帝利婆羅門毗舍首陀在家者出家者天人也為放逸之句中放逸者是身惡行語惡行意惡行又對五種欲心之放縱放縱之遂行又對諸善法之修習不作恭敬不作永續不作持續萎縮行為行欲之放棄責任之放棄不習行不修習不多作不受持不專念言為放逸即如斯所有放逸放漫放漫性此言為放逸具備此放逸之人人言為放逸者此是色故病患放逸人之義故汝而為不放逸之句中故者是彼理由彼之因彼之緣彼之因緣如斯有見色之過患故是故汝不放逸者是恭敬而作常為作乃至五六頁參照對諸善法而不放逸此是故賓祇耶汝而不放逸之義為不再有須捨色之句中色是四大種及四大種所造色捨色須捨色須捨斷色須除去色須滅除色令之滅無色此是須捨色之義為不再有者汝之色於此世滅更結生有於欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有再趣生起結生輪回輪轉為不再生為不發生為不起為不生起於此世而滅寂滅滅沒為安息此是為不再有須捨色之義故世尊宣示世尊宣示賓祗耶有色之故見蒙害色故病患放逸人故汝而為不放逸為不再有須捨色三四方四維上與下此等十方之世間不聞不覺不見師亦無何物又不識須語我應識知法捨斷生老於此世一一二二四方四維上與下此等十方之世間者是十方之一切世間無論自義無論他義無論兩義無論現世之義無論來世之義乃至二四二頁以下參照無論第一義何物亦不見尊師不聞不覺不識無有不存不存在不得此是於不聞不覺不見師亦不識何物之義須語我應識知法之句中須語法者是語初善乃至二六一頁參照須語至涅槃之行道告示施設確立開顯分別顯示說明此是須語法之義我應識知者是我應知識知別知通達得達觸達作證此是須語我應識知法之義捨斷生老於此世者是於此世生老死之捨斷寂滅捨遣安息不死涅槃此是捨斷生老於此世故彼婆羅門言四方四維上與下此等十方之世間不聞不覺不見師亦無何物又不識須語我應識知法捨斷生老於此世四世尊宣示賓祗耶且見人人陷渴愛為老所襲生熱苦故汝而為不放逸為不再有捨渴愛一一二三續見人人陷渴愛之句中渴愛者是色愛聲愛香愛味愛觸愛法愛陷於渴愛者是從渴愛渴愛之瀰漫墮於渴愛被打勝有遍取心人人者是有情之同義語且見是且見覩眺省思普觀此是且見人人陷渴愛之義賓祗耶者是世尊呼彼婆羅門之名為老所襲生熱苦之句中生熱苦者由於生而熱苦生由於老而熱苦生由於病而熱苦生由於死而熱苦生由於愁悲苦憂惱而熱苦生由於地獄之苦而熱苦生乃至一四頁以下參照由於失正見苦而熱苦生患惱生災禍生災厄之生者此是熱苦之生之義為老所襲者是觸於老被襲圍縱於生為老所瀰漫為病所打勝為死所害破無救護所無避難所無歸依所於無歸依之狀態此是為老所襲生熱苦故汝而為不放逸之句中故者是彼之理由彼之因彼之緣彼之因緣如斯且見渴愛之過患故是故賓祇耶故汝而為不放逸者是恭敬而作常作乃至九四頁參照對諸善法不放逸此是故賓祇耶汝而為不放逸之義為不再有捨渴愛之句中渴愛者是色愛聲愛香愛味愛觸愛法愛捨渴愛者是捨渴愛捨斷渴愛除去渴愛滅除渴愛令渴愛成為滅無此是捨渴愛之義為不再有者是汝之渴愛於此世滅更作結生有欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有再趣生起結生輪回輪轉不令生不發生不起不生起於此世而滅寂滅滅沒為安息此是為不再有捨渴愛之義故世尊宣示世尊宣賓祗耶且見人人陷渴愛為老所襲生熱苦故汝而為不放逸為不再有捨渴愛偈終否彼婆羅門對於同一欲同一加行同一意趣同一熏習之熏習者之數千類言所有集法皆是滅法遠塵離垢而法眼生又彼婆羅門之心為無取而解脫諸漏將得阿羅漢果消失羚羊皮結髮樹皮衣杖曼陀羅髮鬚彼成為著黃色之袈裟衣携僧伽梨衣鉢衣之比丘由隨義之行道而合掌禮拜世尊尊師世尊是我師我是弟子而坐賓祗耶學童所問之義釋第十六畢
