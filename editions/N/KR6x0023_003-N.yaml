body:
  text: 第二帝須彌勒學童所問之義釋一尊者帝須彌勒曰誰能滿足此世耶誰無動貪之事耶兩邊極端誰知通不著端中以慧智請言誰為大人耶誰在此處超縫愛一四誰能滿足此世耶者是誰在此世間有滿足悅意完全之思惟耶此是誰能滿足此世耶之義尊者帝須彌勒曰之句中曰如斯者此是句之接續句之相合句之圓滿字之合體文之接著句之次第尊者此是敬語敬重語尊敬語帝須者是彼婆羅門之名稱名稱施設言說名名業命名詞文稱呼彌勒者是彼婆羅門之姓稱名稱施設言說名名業命名詞文稱呼此是尊者帝須彌勒曰之義誰無動之事耶是愛動見動慢動煩惱動此等之動誰無有之事耶不存耶不存在耶不能得耶所捨斷正斷寂滅安息不得生起以智火燒耶此是誰無動事耶之義兩邊誰知通者誰知通兩邊為知考量度知辨知明暸此是兩邊誰知通之義不著端中以慧智者是不著不固著出離棄遣離脫離縛以不限定之心而住耶此是不著端中以慧智之義請言誰為大人耶是請言誰為大人最高人最勝人最殊勝人秀逸人最上人勝妙人請語誰考誰話誰見誰言說誰此是請言誰為大人耶之義誰在此處超縫愛者是誰縫凌渴愛凌駕越超越離越此是誰在此處超縫愛之義故婆羅門言尊者帝須彌勒曰誰能滿足此世耶誰無動貪之事耶兩邊極端誰知通不著端中以慧智請言誰為大人耶誰在此處超縫愛二世尊宣示彌勒於諸欲中具梵行常為有念離渴愛比丘寂滅察悟法在彼無有動之事一四一三極端兩邊彼知通不著端中以慧智我言彼為一大人彼在此處超縫愛一四二於諸欲中具梵行之句中欲者概言之是事欲與煩惱欲之二欲乃至三八頁參照此等言為事欲乃至二七頁參照此等言為煩惱欲具梵行之句中梵行者是遠離犯不妙法婬法之事離離去是彼之離不作不行不干犯不越限又為不由教說經典說言由阿毘達磨說梵行者是八支聖道所謂正見正思惟正語正業正命正精進正念正定具此八支聖道正具達正達成正成所具備者言具梵行者譬如由財產而言具財產者由財富而言具財富者由名聲而言具名聲者由工巧而言具工巧者由戒而言具戒者由精進而言具精進者由慧而言具慧者由明而言具明者如斯具此八支聖道正具達正達成正成之所具備者言為具梵行者此是在諸欲中具梵行之義彌勒者是世尊稱呼彼婆羅門之姓世尊者此是尊重之同義語乃至一二頁以下參照此謂世尊語此與作證共同施設者此是世尊宣示彌勒之義常有念離渴愛之句中渴愛者是色愛聲愛香愛味愛觸愛法愛捨斷此之渴愛正斷寂滅安息不得令生起以智火所燒者是離渴愛者捨渴愛者唾棄渴愛者脫渴愛者捨斷渴愛者捨遣渴愛者離貪者捨貪者唾棄貪者脫貪者捨斷貪者捨斷貪者彼無愛消滅煩惱為清涼覺受樂自為梵而住常者是於常於一切狀態一切時常時恒時常恒繼續不絕如逐次水波之生無間斷無間相續相接食前食後初夜中夜後夜新月黑分滿月白分兩季冬季夏季青年期中年期老年期有念者是由四原因而有念即對身而修習身隨觀念處者而有念乃至三一頁參照言彼為有念此是常為有念離渴愛之義比丘察悟法寂滅煩惱之句中察悟者是智即所有慧知解乃至一八頁參照是不疑擇法正見察悟者是由察悟而知考量度知辨知而明暸即一切行是無常由察悟而知考量度知辨知而明暸一切行是苦一切法無我緣無明而有行乃至一九頁以下參照所有集之法皆是此滅法由察悟而知考量度知辨知而明暸是苦病癰箭乃至二九頁參照不出離由察悟而知考量度知辨知而明暸寂滅者是貪之寂滅故是為消滅瞋之寂滅故是為消滅癡之寂滅故是為消滅忿恨覆惱嫉慳諂誑強情激情慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行之寂滅故是為消滅比丘者是破壞七法故是為比丘乃至三一頁參照梵行已行滅盡再有者此為比丘此是比丘消滅察悟法之義於彼無有動之事之句中於彼者是阿羅漢漏盡者動者是愛動見動慢動煩惱動業動於彼無有此等之動事不存不存在不能得被捨斷正斷寂滅安息不得生起以智火而燒此是於彼無有動之事之義極端兩邊彼知通不著端中以慧智之句中邊極端者是觸一邊觸之集原因是第二邊過去是一邊未來是第二邊樂受是一邊苦受是第二邊名是一邊色是第二邊六內處是一邊六外處是第二邊有身是一邊有身之集是第二邊慧智者是慧即所有慧知解乃至一八頁參照是不癡擇法正見著者是一愛著與二見著之二著一愛著者云何由渴愛者而有此是我物彼是我物此等是我物唯此是我物我之色聲香味觸敷物著物奴婢奴僕山羊羊鷄豚象牛馬牝馬田園宅地金銀貨幣村街王市國土地方四兵之營舍倉庫為境界限界限定制限而把取我執有限之物又一切大地由渴愛而我執乃至成為百八渴愛之作用此是愛著二見著者云何有二十事有身見有十事邪見十事有邊見所有如斯類之見惡見見執見難路見曲邪見異動見結執執取住著取邪道邪路邪性異學處邪倒執違邪執顛倒執對不如實如實執乃至六十二見此是見著極端兩邊彼知通不著端中以慧智者彼以慧智知通兩邊與中央知考量度知辨知而為明暸不著不附著於不著於不附著出離棄遣離脫離縛於不限定之心而住此是兩邊彼知通不著端中以慧智之義我言彼為大人之句中大人者是大人最高人最勝人最殊勝人透逸人最上人勝妙人我言語考話見言說彼為大人尊者舍利弗向世尊如斯言尊師言為大人者尊師究竟由云何而為大人耶舍利弗心解脫故我言為大人心勝解故非言為大人舍利弗然者心解脫者云何舍利弗茲有比丘對內之身而身隨觀有熱心有正知有念而住於調伏世間之貪憂對彼之身而身隨觀而住者之心離貪不取而解脫諸漏對受心法隨觀受心法有熱心有正知有念而住於調伏世間之貪憂對此之法為法隨觀而住者之心離貪不取而解脫諸漏舍利弗如斯比丘是心解脫者舍利弗心解脫故我言為大人心勝解故非言為大人此是我言彼為大人之義彼於此處超縫愛之句中縫者是渴愛即所有貪染貪乃至一四頁參照是貪欲貪不善根捨斷此縫渴愛正斷寂滅安息令不得生起以智火所燒者是凌越縫渴愛凌駕越超越離越此是彼於此處超縫愛之義故世尊宣說世尊宣示彌勒於諸欲中具梵行常為有念離渴愛比丘寂滅察悟法在彼無有動之事極端兩邊彼知通不著端中以慧智我言彼為一大人彼在此處超縫愛世尊說法之偈將終彼婆羅門與同一欲同一加行同一意趣同一熏習之所熏習者於數千之生類所有集法皆是滅法之遠塵離垢之法眼生又彼婆羅門之心無取而解脫諸漏將得阿羅漢果羚羊皮結髮樹皮衣杖曼陀羅髮鬚已消失彼成著黃色之袈娑衣携僧伽梨衣鉢衣之比丘而由隨義之行道而合掌禮拜世尊尊師世尊是我師我是弟子而坐帝須彌勒學童所問之義釋第二畢
