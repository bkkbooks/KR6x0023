body:
  text: 第一阿耆多學童所問之義釋一尊者阿耆多曰由何世間為被蓋由何世間無光輝何成世間之染著請語何成大怖畏一三二由何世間為被蓋之句中世間者是地獄世間畜生世間餓鬼世間人世間天世間蘊世間界世間處世間此世間他世間梵天世間含天之世間此謂世間此世間由何而被蔽被蓋被妨障被閉塞被蔽被隱蔽耶此是由何世間為被蓋之義尊者阿耆多曰之句中曰如斯者此是句之接續句之相合句之圓滿字之合體文之接著句之次第尊者此是敬語敬重語尊重語尊敬語阿耆多是彼婆羅門之名稱施設語說名名業命名詞文稱呼此是尊者阿耆多曰之義由何世間無光輝者是由何世間無光輝耶無照耀耶無明照耶無普照耶不被認識耶不被認耶此是由何世間無光輝之義何成世間之染著者何故彼世間之染著懸著結縛隨染耶由何而世間為被著固著染雜染塗著混合懸懸著礙著耶此是何成世間之染著之義請語者為請言示施設確立開顯分別顯示說明此是何成大怖畏之義如何成為大佈畏是如何彼世間之大怖畏惱苦衝擊災禍災厄耶此是請語何成大怖畏之義故彼婆羅門言尊者阿耆多曰由何世間為被蓋由何世間無光輝何成世間之染著請語何成大怖畏二世尊宣阿耆多世間被蓋由無明慳悋放逸世無光熱望世間之染著我言世苦大怖畏一三三世為被蓋由無明之句中無明者是對苦而無智對苦之集而無智對苦之滅而無智對至苦滅之道而無智對前際而無智對後際而無智對前後際而無智對此緣性緣起之諸法而無智所有如斯無智不見不現觀不隨覺不正覺不通達不潛入不沈潛不正觀不觀察不現見業惡慧愚癡疑蒙癡昧無明無明流無明軛無明隨眠無明纏無明網癡不善根此云無明世間是地獄世間畜生世間餓鬼世間人世間天世間蘊世間界世間處世間此世間他世間梵天世間含天之世間此云世間由此無明之被蔽蓋妨障閉塞蔽隱蔽此是世間被蓋由無明之義阿耆多者是世尊由呼婆羅門之名世尊者此是尊重之同義語又貪之破壞者故是世尊瞋之破壞者故是世尊癡之破壞者故是世尊見之破壞者故是世尊棘之破壞者故是煩惱煩惱之破壞者故是世尊頒法寶頒與頒布故是世尊諸有之終熄者故是世尊以修習身修習戒修習心定修習慧故是世尊或世尊是在阿練若森林之邊鄙無人聲無騷音無人人之景象應隱人而住禪思受用適當之臥坐所故是世尊又世尊受用衣服食物臥坐所病者之資具藥品故是世尊又世尊受用義味法味解脫味增上戒增上心增上慧故是世尊又世尊受用四禪四無量四無色定故是世尊又世尊受用八解脫八勝處九次第定故是世尊又世尊受用十想修習十徧定安般念定不淨定故是世尊又世尊受用四念處四正勤四神足五根五力七覺支八支聖道故是世尊又世尊受用十如來力四無畏四無礙解六神通六佛法故是世尊世尊此之名非由母所作非由父所作非由兄弟所作非由姊妹所作非由朋友同僚所作非由親戚緣者所作非由沙門婆羅門所作非由天神所作此世尊之名是諸佛世尊在菩提樹下解脫之後與一切知智之獲得作證共同之施設者此是世尊說示阿耆多之義慳悋放逸世無光之句中所謂慳悋者是住處慳施主家慳稱讚慳法慳之五慳所有如斯慳慳悋慳悋性雜欲悋緊縮心之堅執此言為慳又蘊慳亦是慳界慳是為慳處慳亦是慳把持此言為慳放逸者對身惡行語惡行意惡行又對五種欲心之放縱放縱之逐行又對諸善法之修習不作恭敬不作永續不作持續萎縮行行欲之放棄責任之放棄不習行不修習不多作不受持不專念是放逸即所有如斯放逸放慢放慢性此謂之放逸慳悋放逸世無光者由此慳由此放逸而世間無光輝不照耀不明照不普照不被認識不被認此是慳悋放逸世無光之義熱望成世之染著之句中熱望者是所有貪染貪隨導隨和喜喜貪心之染貪欲求昏迷縛著貪求徧貪執著污泥能動幻能生輪迴苦生因縫貪有網流貪愛著線綖染著營務伴侶願導有者貪林愛林親睦愛情期待結縛望望求望欲色望聲望香望味望觸望得望財望子望命望覓徧覓熱望覓望覓貪覓欲動貪動轉貪動欲貪媚貪善欲性非法貪不等貪欲求欲望冀求希望求望欲愛有愛無有愛色愛無色愛滅愛色愛聲愛香愛味愛觸愛法愛暴流軛縛取障蓋欲結縛隨煩惱隨眠纏蔓種種欲苦根苦因緣苦生魔罟魔鈎魔境愛河愛網愛羈愛海貪欲貪不善根此言為熱望熱望是世間之染著懸著結縛隨染由此熱望世間而被著固著染雜染塗著混合懸懸著礙著我言者所謂我言我語示施設確立開顯分別顯示說明此是熱望成世被染著之義苦是其大布畏之句中苦者是生苦老苦病苦死苦愁悲苦憂惱苦地獄之苦畜生界之苦餓鬼界之苦人界之苦入胎因之苦在胎因之苦出胎因之苦隨結於生者之苦生者為他所支配之苦使自苦之苦為他所苦之苦苦苦行苦壞苦眼病耳病鼻病舌病身病頭病外耳病口腔病齒病咳喘息外鼻病熱病老腹病氣絕赤痢腹痛虎列剌癲癰疱瘡肺病癲癎輪癬疥癬風癬抓傷皸裂出血糖尿病痔疾疙瘩潰瘍膽汁等起病痰等起病風等起病膽汁痰風集合病氣候變化所生病不等姿勢所生病傷害所生病業報所生病寒暑飢渴大便小便虻蚊風炎熱與爬行類蛇類之接觸所生苦母死之苦父死之苦兄弟死之苦姊妹死之苦親子死之苦親女死之苦失親戚之苦失財富之苦失健康疾病之苦失戒之苦失正見之苦於其等諸法有初故認為興起有滅沒故認為滅有依止於業之異熱報有依止於異熱之業有依止於名之色有依止於色之名彼從於生受老所瀰漫病所打勝死所攻擊住立於苦中無救護所無避難所無歸依所不可歸依者此言為苦苦成為世間之大怖畏惱苦衝擊災禍災厄此是我言其苦大怖畏之義故世尊宣示世尊宣示阿耆多世間被蓋由無明慳悋放逸世無光熱望世間之染著我言世苦大怖畏三尊者阿耆多曰煩惱流流一切處何以其等流遮障流之防護請為語由何流應被閉塞一三四煩惱流流一切處之句中流者是渴愛之流見之流煩惱之流惡行之流無明之流一切處者是一切十二處流者是流漏流漏作用即由眼對色而煩惱流漏流漏作用由耳對聲流由鼻對香流由舌對味流由身對所觸流由意對法流漏流漏作用由眼色愛流漏流漏作用由耳聲愛流漏流漏作用由鼻香愛流由舌味愛流由身觸愛流由意法愛流漏流漏作用此是煩惱流流一切處之義尊者阿耆多曰之句中曰如斯者是此句之接續句之相合句之圓滿字之合體文之接著句之次第尊者此是敬語敬重語尊重語尊敬語阿耆多者是彼婆羅門之名稱名稱施設言說名名業命名詞文稱呼此是尊者阿耆多之義何以其等流遮障者是如何流之掩蔽遮障防護守護護此是何以其等流遮障之義流之防護請為語者是請語流之掩蔽遮障防護守護護請言示施設確立開顯分別顯示說明此是流之防護請為語之義由何流應被閉塞者是由如何之流被閉塞被遮斷不流不漏不流漏不作用耶此是由何流應被閉塞之義故彼婆羅門言尊者阿耆多曰煩惱流流一切處何以其等流遮障流之防護請為語由何流應被閉塞四世尊宣阿耆多世間所有煩惱流其等遮障乃是念流之防護我將語此等由慧可閉塞一三五世間所有煩惱流者是我宣說述說宣示施設確立開顯分別顯示所說明之所有此等之流所謂渴愛之流見之流煩惱之流惡行之流無明之流世間者是惡趣世間人世間天世間蘊世間界世間處世間此是世間所有煩惱流之義阿耆多者是世尊呼彼婆羅門之名其等遮障乃是念之句中念者是所有念隨念現念念憶念憶持沈潛不忘失念念根念力正念念覺支一行道一乘道此言為念遮障者是掩蔽遮障防護守護護此是其等遮障乃是念之義流之防護我為語者是我將語言示施設確立開顯分別顯示說明流之掩蔽遮障防護守護護此是流之防護我為語之義此等由慧可閉塞之句中慧者是慧知解思擇簡擇擇法觀察思察省察賢明善巧巧妙辨別思念普觀廣慧慧導者觀毘鉢舍那正知鞭慧慧根慧力慧刀慧殿慧明慧光慧燈慧寶不癡擇法正見此等由慧可閉塞者是由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於一切行無常之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於一切行是苦之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於一切法是無我之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於緣無明而有行之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於緣行而有識緣識而有名色緣名色而有六處緣六處而有觸緣觸而有受緣受而有愛緣愛而有取緣取而有有緣有而有生緣生而有老死之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用於無明之滅故而有行之滅行之滅故而有識之滅識之滅故而有名色之滅名色之滅故而有六處之滅六處之滅故而有觸之滅觸之滅故而有受之滅受之滅故而有愛之滅愛之滅故而有取之滅取之滅故而有有之滅有之滅故而有生之滅生之滅故而有老死滅之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用此是苦此是苦之集此是苦之滅此是至苦滅道之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用此是漏此是漏之集此是漏之滅至此漏滅道之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用此等諸法應知通此等諸法應徧知此等諸法應捨斷此等諸法應修習此等諸法應作證之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用六觸處之集滅沒樂味過患與出離之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用五取蘊之集滅沒樂味過患與出離之知見者四大種之集滅沒樂味過患與出離之知見者所有集之法一切是此滅法之知見者由慧而此等之流可閉塞遮斷不流不漏不流漏不作用此是此等由慧可閉塞之義故世尊宣說世尊宣曰阿耆多世間所有煩惱流其等遮障乃是念流之防護我將語此等由慧可閉塞五尊者阿耆多曰慧與念為我所尊與此同倫名與色如何情況歸湮滅彼為我問請為語一三六慧與念之句中慧者是所有慧知解思擇簡擇擇法觀察思察省察賢明善巧巧妙辨別思念普觀廣慧慧導者觀正知鞭慧慧根慧力慧刀慧殿慧明慧光慧燈慧寶不癡擇法正見念者是所有念隨念乃至一八頁參照是正念此是尊者阿耆多曰慧與念之義我尊名與色之句中名者是受想行識之四無色蘊色者是地水火風之四大種所造色我尊者此是敬語敬重語尊重語尊敬語此是我尊名與色之義彼為我問請為語之句中彼於我者是我問我乞我求我信樂之請為語者是請語言示施設確立開顯分別顯示說明此是彼為我問請為語之義如何情況歸湮滅此是何情況而滅寂滅滅沒安息耶此是如何情況歸湮滅之義故彼婆羅門言尊者阿耆多曰慧與念為我所尊與此同倫名與色如何情況歸湮滅彼為我問請為語世尊宣阿耆多六汝斯所質問我將為汝說名與色無餘為湮滅之時由於識之滅此處慧念名色滅一三七汝斯所質問之句中如斯所質問是慧念名色質問是問乞求信樂阿耆多我將為汝說之句中阿耆多者是世尊呼彼婆羅門之名我將說者是其我將說言示將施設將確立將開顯將分別將顯示將說明慧念名色此是阿耆多我將為汝說之義名與色無餘為湮滅之時之句中名是四無色蘊色者是四大種及四大種所造之色無殘者是普徧一切之一切無殘是無餘之義無殘者此是徧取之語湮滅者是滅寂滅滅沒安息此是名與色無殘為湮滅之時之義由於識之滅此處慧念名色滅依須陀洹道智行作識之滅而除七有可生起無始輪迴之所有名與色一切於此時湮滅寂滅滅沒安息依斯陀含道智行作識之滅而除二有可生起五有之所有名與色一切於此時湮滅寂滅滅沒安息依阿那含道智行作識之滅而除一有可生起欲有之所有名與色一切於此之時湮滅寂滅滅沒安息依阿羅漢道智行作識之滅可生起所有名與色一切於此之時湮滅寂滅滅沒安息於無餘般涅槃界般涅槃阿羅漢前識之滅而慧念名識於此之時湮滅寂滅滅沒安息此是由於識之滅此處此湮滅之義故世尊宣示世尊宣阿耆多汝斯所質問我將為汝說名與色無殘為湮滅之時由於識之滅此處此湮滅七所有法之察悟者阿羅漢及茲一般之有學彼等行動行道問我尊智者佛請語我一三八所有法之察悟者之句中法之察悟者是阿羅漢漏盡者何故阿羅漢漏盡者謂法之察悟者耶彼等察悟法知法考量法度知法辨知法辨別法即一切行是無常以察悟法知法考量法度知法辨知法辨別法一切行是苦以察悟法乃至一切法是無我以察悟法緣無明而有行以察悟法乃至一九頁以下參照所有集之法皆是滅法以察悟法知法考量法度知法辨知法或又在彼等阿羅漢已察悟蘊察悟界察悟處察悟趣察悟生起察悟結生察悟有察悟輪迴察悟輪轉或又彼等在蘊之終邊在界之終邊在處之終邊在趣之終邊在生起之終邊在結生之終邊在有之終邊在輪迴之終邊在輪轉之終邊在最後有在最後之身體在最後之持身者是為阿羅漢此為彼等最後身此為最終之身體最後之生死輪迴彼等無有再有事謂彼阿羅漢漏盡者是法之察悟者此是所有法之察悟者及茲一般之有學之句中有學者何故言為有學耶為學故是有學學何耶一亦學增上戒二亦學增上心三亦學增上慧一增上戒學者云何茲有比丘具戒防護別解脫律儀而住具足正行與行處於微細之罪亦生怖畏受持學諸學處戒小戒蘊大戒蘊戒住立初行自制律儀諸善法得達之首先最先此是增上戒學二增上心學者云何茲有比丘離諸欲離諸不善法有尋有伺由離生喜樂具足初禪而住於尋伺止息之故為內之淨為心之專一無尋無伺由定生喜樂有具足第二禪而住於喜之捨離故住於有捨有念有正知而以身受樂說彼諸聖者有捨有念而樂住具足第三禪而住捨斷樂故捨斷苦故滅沒喜憂故成為不苦不樂由捨念之清淨具足第四禪而住此是增上心學三增上慧學者云何茲有比丘具慧是聖為決擇至正苦之盡滅具備有關於生滅之慧彼如實知解此是苦如實知解此是苦之集如實知解此是苦之滅如實知解此是至此苦滅之道如實知解此是漏如實知解此是漏之集如實知解此是漏之滅如實知解此是至漏滅之道此是增上慧學彼等有學學顧念此等三學知而學見而學觀察而學於心決意而學以信信解而學勉勵競進而學使現起念而學等持心而學以慧知解而學知通應知通而學徧知應徧知而學捨斷應捨斷而學修習應修習而學作證應作證而學行修行正行正持而行由此而言為有學一般者是多此等之有學即須陀洹與須陀洹向斯陀含與斯陀含向阿那含與阿那含向及阿羅漢與阿羅漢向所謂茲者是於此佛教之見於此之忍智於此之意欲於此之持說於此之法於此之律於此之法與律於此之宣說於此之梵行於此之師教於此之身體於此之人界此是及茲一般之有學之義彼等行動行道問我尊智者請語我者是尊師智者賢者覺慧者知者辨知者有慧者請語彼等法之察悟者及有學之行動所作行為所行行處住行道問者所問質問被乞被求信樂請語者是請語言示施設確立開顯分別顯示說明我尊者此是敬語敬重語尊重語尊敬語此是彼等行動行道問我尊智者請語我之義故彼之婆羅門言所有法之察悟者及茲一般之有學彼等行動行道問我尊智者請語我八諸欲不可為貪求意之混濁不可有善巧而於一切法比丘有念應普行一三九諸欲不可為貪求之句中欲者概言之是一事欲與二煩惱欲之二欲一事欲欲之對象物者云何適意之色適意之聲適意之香適意之味適意之觸敷物著物奴婢奴僕山羊羊鷄豚象牛馬牝馬田園宅地金銀貨幣村街王市國土地方四兵之營舍倉庫及所有染愛事物是事欲欲之對象又有過去之事欲有未來之事欲有現在之事欲有內之事欲有外之事欲有內外之事欲有劣之事欲中之事欲勝之事欲惡趣之事欲人之事欲天之事欲現起之事欲化作之事欲由他而所化作之事欲有徧取之事欲不徧取之事欲我執之事欲我所不執之事欲欲界之一切諸法無色界之一切諸法亦為渴愛之據所渴愛之所緣而由欲愛之義由染著之義由使起憍之義而為事欲此等言為事欲二煩惱欲者云何欲是煩惱欲貪是煩惱欲欲貪是煩惱欲思惟是煩惱欲貪是煩惱欲思惟貪是煩惱欲彼對五種欲是欲欲欲貪欲喜欲愛欲愛情欲熱惱欲昏迷欲縛著欲暴流欲軛欲取欲貪蓋欲我見汝之根本欲汝由思惟而生欲我不思惟於汝如是汝將成無有此等謂煩惱欲貪求是渴愛即所有貪染貪乃至一四頁參照貪欲貪成為不善根諸欲不可為貪求者是不可貪求事欲煩惱欲不可障礙於彼等離貪求捨貪求唾棄貪求脫貪求捨遣貪求離貪捨貪脫貪捨遣貪不愛寂滅清涼受樂自為梵而住此是諸欲不可為貪求之義意之混濁不可有之句中意者是心意意所心臟淨白心意意處意根識識蘊隨順觸等法之意識界由身惡行而心混濁動轉搖衝突動搖動亂而不寂滅由於語惡行意惡行貪瞋癡忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行而心混濁動轉搖衝突動搖動亂而不寂滅意之混濁不可有者是由心而不混濁不動轉不搖不衝突不動搖不動亂應為寂滅捨混濁諸煩惱捨斷除去滅除使之滅無遠離諸煩惱之混濁離捨離出離棄遣寂滅離脫離縛以不限定之心而住此是意之混濁不可有之義善巧而為一切法者是知一切行無常而善巧一切諸法知一切行是苦而善巧一切諸法知一切法無我而善巧一切諸法知緣無明而有行而善巧一切諸法乃至一九頁以下參照知所有集之法皆是滅法而善巧一切諸法如斯是善巧而為一切諸法之義或又知無常而善巧一切諸法知是苦病癰箭痛惱敵毀疾禍不快怖畏災患動壞不恒無救護所無避難所無歸依所不成為歸依者是空缺空虛空無我過患變易法不堅實痛恨殺戮者非有有漏有為魔食生法老法病法死法愁悲苦憂惱法雜染法集滅沒不樂味過患不出離而成善巧一切諸法如斯亦是一切諸法而為善巧之義或又蘊善巧界善巧處善巧緣起善巧念處善巧正勤善巧神足善巧力善巧覺支善巧道善巧果善巧涅槃善巧如斯亦是一切諸法而為善巧之義或又一切即言一切眼與色耳與聲鼻與香舌與味身與觸意與法之一切言為十二處對內外之十二處貪之捨斷根絕如被截頂之多羅樹成為滅無於未來不生起故由此而亦善巧一切諸法此是一切諸法而為善巧之義比丘有念應普行之句中有念者是由四原因而有念即對身修習身隨觀念處而有念對受對心對法修習法隨觀念處而有念又由他之四原因而亦有念即由不念之迴避而有念以念行應行諸法故而有念以念害破念之對治諸法故而有念不忘失念因之諸法故而有念又由他之四原因而亦有念即具備念之故而有念以念能為自在故而有念練達念之故而有念由念不退轉故而有念又由他之四原因而亦有念即念之故而念寂之故而有念寂止之故而有念具備善人之法故而有念由佛隨念而有念由法隨念而有願由僧隨念而有念由戒隨念而有念由捨隨念而有念由天隨念而有念由安般念而有念由死念而有念由身至念而有念由寂止隨念而有念所有念隨念現念念憶持沈潛不忘失念念根念力正念念覺支一行道一乘道此言為念具此之念正具達正達成正成令具備者言為有念比丘者是破壞七法故是比丘即一破壞有身見二破壞疑三破壞戒禁取四破壞貪五破壞瞋六破壞癡七破壞慢彼破壞雜染而齎再有有不安有苦報齎未來之生老死諸之惡不善法世尊宣示薩毘耶汝自由道使修習至般涅槃度疑惑已成梵行捨斷有滅盡再有成比丘比丘有念應普行者有念比丘應普行應有念而步行有念而立有念而坐有念而臥有念而往有念而來有念而前視有念而顧視有念而屈身有念而伸身有念而携僧伽梨依鉢衣有念而行有念而行作應動作活動護持持續維持此是比丘有念應普行之義故世尊宣示諸欲不可為貪求意之混濁不可有善巧而為一切法比丘有念應普行世尊說法之偈將終彼婆羅門向與同一欲同一加行同一意趣同一熏習之熏習者之數千生類云所有集之法皆是滅法已生遠塵離垢之法眼又彼之婆羅門之心為無取而已解脫諸漏將得阿羅漢果已消失羚羊皮結髮樹皮衣杖曼陀羅髮鬚彼成著黃色之袈裟依携僧伽梨衣之比丘而由隨義之行道而合掌禮拜世尊坐曰尊師世尊是我師我是弟子阿耆多學童所問之義釋第一畢
