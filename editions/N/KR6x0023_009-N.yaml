body:
  text: 第八醯摩迦學童所問之義釋一尊者醯摩迦曰瞿曇教之前人人曾語我有斯應有斯自為解說事此皆受賣說此皆增思擇妄想我已不喜彼一八四人人曾語我解說事之句中事者是婆和利婆羅門及其他彼之阿闍梨師等解說自己之見自己之忍自己之意欲自己之持說自己之意樂自己之意趣說示施設確立開顯分別顯示說明之事此是人人曾語我解說事之義尊者醯摩迦曰之句中曰斯者是此句之接續乃至一頁參照句之次第尊者此是敬語敬重語尊重語尊敬語醯摩迦者各乃至一頁參照稱呼此是尊者醯摩迦曰之義瞿曇教之前者是由瞿曇教之前由瞿曇教之外由瞿曇教之以前由瞿曇之教佛之教勝者之教如來之教阿羅漢之教開始此是瞿曇教之前之義有斯應有斯者實有已有如斯實應有如斯此是有斯應有斯之義此皆受賣說一切此受賣傳聞之說由傳說由傳承由藏經之說由思擇由推論由行相之審思由見省思忍者而非自己自知通之語者非語自現見法者此是此皆受賣說之義此皆增思擇者是一切增此思擇增尋增思惟增欲尋增恚尋增害尋增親里尋增國土尋增不死尋增關係向他人之憐憫尋增關係於利得恭敬讚嘆尋增關係於不輕賤尋此是此皆增思擇之義我已不喜彼者是我已無所得無證得無護得此是我已不喜彼之義故彼婆羅門言尊者醯摩迦曰瞿曇教之前人人曾語我有斯應有斯自為解說事此皆受賣說此皆增思擇我已不喜彼二然則尊師語我法牟尼害破渴愛者知彼有念而行作可度世間之愛著一八五然則尊師之語我之句中尊師者是言世尊語法之句中法者是初善中善後善有義有文而完全圓滿徧淨梵行之四念處四正勤四神足五根五力七覺支八支聖道涅槃至涅槃之行道請語此法請言示施設確立開顯分別顯示說明此是尊師語我法之義牟尼害破渴愛者之句中渴愛者是色愛聲愛香愛味愛觸愛法愛害破渴愛者是害破渴愛捨斷渴愛令寂滅渴愛捨遣渴愛令安息渴愛乃不死涅槃牟尼者言智為牟那乃至八四頁以下參照超著與網者此是牟尼此是牟尼害破渴愛者之義知彼有念而行作之句中知彼者為彼之知解考量度知辨知明暸即一切行是無常之知解考量度知辨知明暸一切行是苦一切法是無我乃至一九頁以下參照所有集法皆是此滅法之知解考量度知辨知明暸有念者是由四行相而有念即對身修習隨觀念處而有念乃至三頁參照言彼為有念行者是行行作動作活動護持持續維持此是知彼有念而行作之義可度世間之愛著之句中愛著者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根愛著由何義而為愛著耶乃至八九頁參照能擴大擴展此是愛著世間者於惡趣世間人世間天世間蘊世間界世間處世間可度世間之愛著者是世間所有之愛著彼愛著有念而可度越度度過超越可離越此是可度世間之愛著之義故彼婆羅門言然則尊師語我法牟尼害破渴愛者知彼有念而行作可度世間之愛著三醯摩迦茲見聞覺識對諸可愛色除去諸欲貪無死涅槃句一八六茲見聞覺識之句中見者是以眼見之聞者是以耳聞之覺者是強覺即以鼻嗅以舌味以身觸者識者以意知之者此是見聞覺識之義醯摩迦對諸可愛色之句中可愛色者於世間所有可愛色可意色即眼於世間是可愛色可意色耳鼻舌身意於世間是可愛色可意色聲香味觸法於世間是可愛色可意色眼識於世間是可愛色可意色耳識鼻識舌識身識意識於世間是可愛色可意色眼觸於世間是可愛色可意色耳觸鼻觸舌觸身觸意觸於世間是可愛色可意觸耳觸所生之受鼻觸所生之受舌觸所生之受身觸所生之受意觸所生之受於世間是可愛色可意色色想於世間是可愛色可意色聲想香想味想觸想法想於世間是可愛色可意色色思於世間是可愛色可意色聲思香思味思觸思法思於世間是可愛色可意色色愛於世間是可愛色可意色聲愛香愛味愛觸愛法愛於世間是可愛色可意色色尋於世間是可愛色可意色聲尋香尋味尋觸尋法尋於世間是可愛色可意色色伺於世間是可愛色可意色聲伺香伺味伺觸伺法伺於世間是可愛色可意色此是可愛色醯摩迦者是世尊呼彼婆羅門之名除去諸欲貪之句中欲貪者是對諸欲之欲欲欲貪欲喜欲愛欲愛情欲熱惱欲昏迷欲縛著欲暴流欲軛欲取欲貪蓋除去欲貪者是欲貪之捨斷欲貪之寂滅欲貪之捨遣欲貪之安息不死涅槃此是除去欲貪之義無死涅槃句者是涅槃句救護所句避難所句依據句無畏句無死者是常恒常恒不變易法此是無死涅槃句故世尊宣示醯摩迦茲見聞覺識對諸可愛色除去諸欲貪不死涅槃句四了知此有念現世善寂滅人人常寂靜能度世愛著一八七了知此有念之句中此者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅是離貪滅涅槃了知者是了知知考量度知辨知明暸即了知一切行無常知考量度知辨知明暸一切行是苦一切法無我乃至一九頁以下參照了知所有集法皆是此滅法知考量度知辨知明暸所之者是阿羅漢漏盡者有念者由四原因而有念即對身修習身隨觀念處而有念乃至三頁參照彼言為有念此是了知此有念之義現世善寂滅之句中現世者是現世能見法能知法能考量法能度知法能辨知法能明察法即一切法無常乃至一九頁以下參照所有集法皆是此滅法而見法知法考量法度知法辨知法明察法善寂滅者是貪之消滅故是善寂滅瞋之消滅故是善寂滅癡之消滅故是善寂滅忿恨乃至四一頁參照一切不善行之消滅故是善寂滅此是現世善寂滅之義人人常寂靜之句中寂靜者是貪之寂故是寂靜瞋之寂故是寂靜癡之寂故是寂靜忿恨乃至四一頁參照一切不善行之寂故寂止故寂靜故燒盡故消滅故離去故安息故是寂寂靜寂滅消滅安息此是寂靜人人者是阿羅漢漏盡者常者是於常於一切情況一切時常時恒時於常恒不絕次第而如水波之生不間斷於世間相續相接食前食後於初夜中夜後夜於新月黑分滿月白分於冬季夏季於青年期中年期老年期此是人人常寂靜之義能度世愛著之句中愛著者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根愛著者是由何義而為愛著耶乃至八九頁參照能擴大擴展此是愛著世者是世間惡趣世間乃至八九頁參照於處世間能度世愛著者是於世間所有之愛著廣彼世間之愛著而越度度過超越離越此是能度世愛著之義故世尊宣示了知此有念現世善寂滅人人常寂靜能度世愛著偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐醯摩迦學童所問之義釋第八畢
