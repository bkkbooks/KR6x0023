body:
  text: 犀角經之義釋一一切生物以笞控彼等亦無何害事不欲子女況朋友應可獨行如犀角三五一切生物以笞控之句中一切者是普皆一切之一切無殘無餘一切者是此徧取之語對生物之句中生物者是強弱之生物弱者是尚未捨斷渴愛尚未捨斷怖畏恐怖之人由何而言弱耶彼等駭駭怖懼怖陷於戰慄由此而言彼等弱駭怖強者是捨斷渴愛捨斷怖畏恐怖之人人由何而言強耶彼等不駭不駭怖不懼怖不陷於戰慄由此而言為強笞者是身笞語笞意笞之三笞殺生偷盜邪欲行之三種身惡行是身笞妄語兩舌惡口綺語四種之語惡行是語笞貪欲瞋恚邪見三種之意惡行是意笞一切生物以笞控者是對一切生物控笞收奪投棄而止息此是一切生物以控笞彼等亦無何害對唯一有情無以手以石塊以笞以刀以枷以繩加害對一切之有情無以手以石塊以笞以刀以枷以繩害此是彼等亦無何害之義不欲子女況朋友之句中不欲者是禁止子者是自生之子乳母所育之子領養之子徒弟子之四種子朋友者是共同往而愉快來而愉快往來而愉快坐而愉快臥而愉快招呼而愉快談而愉快會談而愉快之人人不欲子女況朋友者子亦不可欲不可樂不可希望不可熱望況可將欲樂希望熱望友人知己同輩朋友耶此是不欲子女況朋友之義應可獨行如犀角之句中獨者是彼辟支佛獨覺緣覺一由出家之稱而為獨二由無伴之義而為獨三由渴愛之捨斷義而為獨四一向離貪故而為獨一向離瞋故而為獨一向離癡故而為獨一向無煩惱故而為獨五能行一行道一乘道故而為獨六於現覺獨無上之辟支菩提故而為獨一彼辟支佛由出家之稱而為獨者云何彼辟支佛斷家居之障礙斷妻子之障礙斷親戚之障礙斷財寶之障礙剃除鬚髮著袈裟衣由家非家而出家為無一物之狀態而獨行行作動作活動護持持續維持如斯彼辟支佛由出家之稱而為獨二彼辟支佛由無伴義而為獨者云何彼如斯出家獨於阿練若之邊鄙無人聲無騷音無人人之境況隱人而住禪思受用適當臥坐所彼獨行獨立獨坐獨臥獨入村而行乞獨由行乞歸獨密而坐禪獨經行獨行行作動作活動護持持續維持如斯是彼辟支佛由無伴義而為獨三彼辟支佛渴愛之捨斷故而為獨者云何彼如斯無伴不放逸熱心精勤而住精勤大精勤擊破放逸親類惡魔障解脫之軍捨斷滅除令之滅無渴愛網罟輪迴之流愛著渴愛令為友之人不斷輪迴於長時由此狀態他狀態無有超度輪迴事渴愛乃是苦生因此為過患應須知離渴愛而無有取有念比丘應普行如斯彼辟支佛渴愛捨斷故而為獨四彼辟支佛一向離貪故而為獨者云何貪之捨斷故而一向離貪故而為獨瞋之捨斷故而一向離瞋故而為獨癡之捨斷故而一向離癡故而為獨煩惱之捨斷故而一向無煩惱故而為獨如斯彼辟支佛一向離貪故而為獨五彼辟支佛行一行道故而為獨者云何一行道是四念處四正勤四神足五根五力七覺支八支聖道見生盡滅邊有情利益者及至憐愍者知解一行道由此之行道過去聖者度現在亦正度未來度暴流如斯彼辟支佛行一行道故而為獨六彼辟支佛現正獨覺無上辟支菩提故而為獨者云何覺菩提者是於四沙門道智慧慧根慧力擇法覺支覩慧觀毘鉢舍那正見也辟支佛由辟支佛智而覺諸諦真理即覺一切行是無常覺一切行是苦覺一切法是無我覺緣無明而有行覺緣行而有識覺緣識而有名色覺緣名色而有六處覺緣六處而有觸覺緣觸而有受覺緣受而有愛覺緣愛而有取覺緣取而有有覺緣有而有生覺緣生而有老死覺無明滅故而行滅覺行滅故而識滅覺識滅故而名色滅覺名色滅故而六處滅覺六處滅故而觸滅覺觸滅故而受滅覺受滅故而愛滅覺愛滅故而取滅覺取滅故而有滅覺有滅故而生滅覺生滅故而老死滅覺此是苦覺此是苦之集覺此是苦之滅覺此是至苦滅之道覺此等是漏覺此是漏之集覺此是漏之滅覺此是至漏滅之道覺此等之法應知通覺此等之法應徧知覺此等之法應捨斷覺此等之法應修習覺此等之法應作證覺六觸處之集滅沒過患與出離覺五取蘊之集滅沒過患與出離覺地水火風四大種之集滅沒過患與出離覺所有集法皆是此滅法所有應覺隨覺正覺觸知作證者一切皆此彼辟支菩提智而覺隨覺正覺解知作證如斯彼辟支佛現獨正覺無上辟支菩提故而為獨應遊行者一威儀行二處行三念行四定行五智行六道行七行道行八世間利益行之八行一威儀行者是於行住坐臥四威儀之行二處行者是於內外處之行三念行者是於四念處之行四定行者是於四禪之行五智行者是於四聖諦之行六道行者是於四道之行七行道行者是於四沙門果之行八世間利益行者是於如來阿羅漢等正覺者行與於一部之辟支佛緣覺一部之聲聞之行又一於具足願之人人有威儀行二於護諸根門之人人有處行三於不放逸而住之人人有念行四於勵神變心之人人有定行五於具足覺慧之人人有智行六於正行道之人人有道行七於得果之人人有行道行八於如來阿羅漢等正覺者及一部之辟支佛一部之聲聞有世間利益行此是八行又有他之八行一以信而信觸行二以精進而策勵行三以念而現起行四以定而不散亂行五以慧而知解行六由於識行而識知行七如斯行道者令能將來諸之善法由處行而行八如斯行道者證得殊勝之涅槃由殊勝行而行此是八行又有他之八行一於正見有見行二於正思惟有攀著行三於正語有適取行四於正業有等起行五於正命有淨化行六於正精進有策勵行七於正念有現起行八於正定有不散亂行此是八行如犀角者譬如犀之角是獨一無第二如斯彼辟支佛譬為此於此等同於此比類譬如言塩之極鹹言苦瓜子之極苦言密之極甘言火之極熱言雪之極冷言海之大水聚言聲聞如師佛之得大神通如斯彼辟支佛譬為此犀角等同於此比類於此獨無伴第二者脫結縛正行於世間行作動作活動獲得持續維持此是應可獨行如犀角之義故彼辟支佛言一切生物以笞控彼等亦無何害事不欲子女況朋友應可獨行如犀角二已為交者有親愛從於親愛此苦生觀察親愛之過患應可獨行如犀角三六已為交者有親愛之句中為交者是一見交與二聞交之二交一見交者云何此某者麗見美而欲見觀具備第一之麗容婦人或少女執隨形之相即見觀歡喜其美髮美顏美眼美耳美鼻美唇美齒美口美頸美乳房美胸美腹美腰美腿美脛美手美指美爪歡迎冀求隨取隨縛貪縛彼等此是見交二聞交者云何於此某者於某村又某町見美而欲具備第一之麗容婦人或少女聞聽歡喜歡迎冀求隨取隨縛貪縛此是聞交親愛者是一愛親愛與二見親愛之二親愛一愛親愛者云何由渴愛者而此是我物是我色聲香味觸敷物著物奴婢奴僕山羊羊鷄豚象牛馬牝馬田園宅地金銀貨幣村町王市國土地方四兵之營舍倉庫為境界為限界為限定為制限而把取我執為限者又一切之大地亦由渴愛而我執乃至為百八渴愛之作用者此是愛親愛二見親愛者云何有二十事之有身見有十事之邪見有十事之邊見所有如斯類之見惡見見執見難路見曲邪見異動見結執執取住著取邪道邪路邪性異學處邪倒執違邪執顛倒執邪執對不如實而如實執乃至為六十二見此是見親愛已為交者有親愛者是緣於顛倒緣於見聞之交而有愛親愛與見親愛生發生起生起現前此是已為交者有親愛之義從於親愛此苦生之句中親愛者是愛親愛與見親愛之二親愛乃至前方參照此是愛親愛乃至此是見親愛此苦生者於此某者由身而行惡行由語而行惡行由意而行惡行殺生物取不被與破家之間隙掠奪包圍家待伏於路邊而追剝與通他妻語虛妄人人捕此者示於王陛下此者是盜賊惡漢對此者陛下請欲行所有刑罰王譴責此者彼緣於譴責而受苦憂此怖畏苦憂由何處生耶是緣於彼之親愛緣於喜緣於貪緣於喜貪而生王以此為不滿足王令縛以枷縛繩縛鎖縛籐縛蔓縛柵縛村縛街縛市縛國縛地方縛且判決汝由此處不可去彼緣於縛而受苦憂此怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於喜貪而生起王以此為不滿足王由此者沒收百金又千金之彼財彼緣於失財而亦受苦憂此怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於貪緣於喜貪而生起王以此為不滿足王令此者受種種懲罰即以鞭笞以棒笞以棍棒笞斷手斷足斷手足斷耳斷鼻斷耳與鼻破頭蓋而入鐵丸剝頭皮而磨向口中而燃燈火捲曲布而燒全身捲油布而燒手剝皮膚而捆倒剝皮膚而纏身縛手足而由四方放火剝取皮肉腱寸斷身傷壞身而擦入灰汁突刺鐵串於耳孔而迴轉拔骨而為如藁蒲團灌注熱油使狗噉食生而刺串以刀斷首彼由於懲罰而受苦憂此怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於貪緣於喜貪而生王是此等四罰之主權者彼罪人由於自己之業而身壞死後生於苦界惡趣隨處地獄獄卒等向此者行命名為五種縛之懲罰即令赤熱鐵棒觸於隻手赤熱鐵棒觸於次之手赤熱鐵棒觸於隻足赤熱鐵棒觸於次之足赤熱鐵棒觸於胸彼於其際受激甚之苦痛而尚未盡彼惡業之間命不終止此怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於貪緣於喜貪而生起獄卒等誘行此者而以斧截獄卒等捕此者足為上頭為下以利斧截獄卒等令此者軛於車而往返於燃燒之熱地上獄卒等使此者上下於大炭火之山獄卒等捕此者足為上頭為下投於燃燒之熱銅釜彼於其處而被煮沸彼於其處而受不斷之煮沸或行於上或行於下或行於橫彼於其際受激甚之苦痛而彼惡業尚未盡之間命不終止此之怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於貪緣於喜貪而生起獄卒等投此者於大地獄而彼大地獄有四隅而有四門被區分而被區劃圍以鐵柵蔽以鐵鐵製牀地火燃燒上下四方百由旬常時存續普擴展有窮之而有熱苦恐怖火焰難接近有怖畏而有苦痛將令身毛為豎立東方之壁火焰聚業者突擊西方壁西方之壁火焰聚業者突擊東方壁南方之壁火焰聚業者突擊北方壁北方之壁火焰聚業者突擊南方壁火焰聚由下方起業者突擊向天井火焰聚由天井起業者突擊向牀地阿鼻地獄揚鐵鍋上下四側燃赤熱兇惡罪過諸有情為極惡業煮不死身體如同火大聚灰亦不存滓亦無彼等由東向西走復由西方走向東復由北方向南走再由南方走向北為求出脫欲出離所至之處皆門閉苦對彼等不受報諸多惡業存限度彼等緣於彼惡業不能出離由彼處此怖畏苦憂由何處生耶緣於彼之親愛緣於喜緣於貪緣於喜貪而生起又所有地獄之苦所有畜生界之苦所有餽鬼界之苦所有人界之苦由何處生由何處發生由何處起由何處生起由何處現前耶緣於親愛緣於喜緣於貪緣於喜貪而有生成生發生起生起現前此是從於親愛此苦生之義觀察親愛之過患之句中親愛者是愛親愛與見親愛之二親愛乃至三二五頁參照此是愛親愛乃至三二五頁參照此是見親愛觀察親愛之過患者不斷觀察愛親愛與見親愛之過患不斷眺不斷省思不斷普觀此是觀察親愛之過患之義應可獨行如犀角者故彼辟支佛言已為交者有親愛從於親愛此苦生觀察親愛之過患應可獨行如犀角三不斷憐愍友親友心被繫縛失利益觀察親睦怖畏事應可獨行如犀角三七不斷憐愍友親友心被繫縛失利益之句中友者是一在家友與二非家友之二友人一在家之友者云何於此某者對於友與難與之物捨難捨之物為難為之事忍難忍之事對彼打開已之秘密守彼之秘密友遭遇災難亦不見捨為彼而擲身命彼零落而亦無輕蔑此是在家之友二非家之友者云何於此有比丘為友所愛適友之意為友所尊重所崇敬語溫和而話甚深之語不勸友不合理事令受持增上戒受持四念處之勤勵修習四正勤乃至受持四神足五根五力七覺支八支聖道之勤勵修習此是非家之友親友者是共愉快而往愉快而來愉快而往來愉快而坐愉快而臥愉快而招呼愉快而談愉快而會談之人人也不斷憐愍友親友心被繫縛失利益者是不斷憐愍友人親友知己同輩朋友且攝益亦失自利亦失他利亦失俱利亦失現世之利亦失來世之利亦失第一義之利摧破徧捨令消失此是不斷憐愍友親友心被繫縛失利益之義心被繫縛者是由二行相而心被繫縛一眨下自己高揚他人而心被繫縛又二高揚自己貶下他人而心被繫縛一貶下自己高揚他人而心被繫縛者云何向檀越之人人言卿等是我之大饒益者我依於卿等而他之人人亦與我又欲作與所思惟得之衣服食物臥坐所病者之資具藥品依於卿等為與卿等相識而父母之付與以前我之姓名消失我被知作為某氏貴氏之被護者某女貴女之被護者如斯成為貶下自己高揚他人而心被繫縛二高揚自己貶下他人而心被繫縛者云何向檀越之人人言我是卿等之大饒益者卿等由我而歸依佛歸依法歸依僧由我而離殺生離偷盜離邪欲行離妄語離穀酒果酒等放逸原因之酒我向卿等亦總說聖典亦徧問義疏亦告戒亦告布薩亦決心教新業然卿等捨我而去恭敬他之人人尊重供養敬重如斯高揚自己貶下他人而心被繫縛此是不斷憐愍友親友心被繫縛失利益之義觀察親睦怖畏事之句中怖畏者是生之怖畏老之怖畏病之怖畏死之怖畏王之怖畏賊之怖畏火之怖畏水之怖畏自責之怖畏他責之怖畏刑罰之怖畏惡趣之怖畏波浪之怖畏蛟龍鮫之怖畏旋流之怖畏鰐魚之怖畏生活之怖畏污名之怖畏於眾中而臆測之怖畏可怖畏身硬直身毛豎立心之悚懼駭怖親睦者是愛親睦與見親睦之二親睦乃至三九五頁參照此是愛親睦乃至三九五頁參照此是見親睦觀察親睦怖畏事者是於親睦觀察此之怖畏眺省思普觀此是觀察親睦怖畏事之義應可獨行如犀角故彼辟支佛言不斷憐愍友親友心被繫縛失利益觀察親睦怖畏事應可獨行如犀角四對子妻有貪愛者恰如鬱茂竹縛著如筍無為附著事應可獨行如犀角三八恰如鬱茂竹縛著之句中竹者是竹藪譬如於竹藪枝網縺結縫合縛著懸懸著礙著如斯縛著愛著者是渴愛即所有貪染貪隨導隨知喜喜貪心之染貪欲求昏迷縛著貪求徧貪執著污泥能動幻能生輪迴苦生因縫貪有網流貪愛著線綖染著營務伴侶願導有者貪林愛林親睦愛情期侍結縛望望求望欲色望聲望香望味望觸望得望財望子望命望覓徧覓熱望覓望覓貪覓欲動貪動轉貪動欲貪媚貪不善欲性非法貪不等貪欲求欲望冀求希望求望欲愛有愛無有愛色愛無色愛滅愛色愛聲愛香愛味愛觸愛法愛暴流軛縛取障蓋欲結縛隨煩惱隨眠纏蔓種種欲苦根苦因緣苦生魔罟魔鈎魔境魔住所魔縛愛河愛網愛羈愛海貪欲貪不善根也愛著縛著者由是何義而為愛著耶由擴大故為愛著由廣大故為愛著由染著故為愛著由冒險故為愛著由奪取故為愛著由欺語故為愛著由毒根故為愛著由毒果故為愛著由毒受用故為愛著或又彼渴愛而廣大於色聲香味觸施主檀家眾住居利得名聲賞讚安樂衣服食物臥坐所病者之資具藥品欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有在於過去未來現在於見聞覺識諸法中為擴大擴展此是愛著此是恰如鬱茂竹縛著之義對子妻有愛著者之句中子者是自生子乳母所育之子領養之子徒弟子之四種子妻者是妻也貪愛期待者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根此是對子妻有貪愛者之義如筍無為附著事之句中竹者是竹藪譬如筍於竹藪荀不著於他竹不懸不卷附不礙著由他竹出離棄遣離脫如斯是愛著與見著之二著乃至四頁參照此是愛著乃至四頁參照此是見著彼辟支佛捨斷愛著捨遣見著由愛著之捨斷故由見著之捨遣故彼辟支佛不著於色不著於聲不著於香不著於味不著於觸不著於施主檀家眾住居利得名聲賞讚安樂衣服食物臥坐所病者之資具藥品欲界色界無色界欲有色有無色有想有無想有非想非非想有一蘊有四蘊有五蘊有過去未來現在不著於應見聞覺識之諸法不執不縛不繫縛出離棄遣離脫離縛以不限定之心而住此是如筍無為附著事之義應可獨行如犀角故彼辟支佛言對子妻有貪愛者恰如鬱茂竹縛著如筍無為附著事應可獨行如犀角五恰如鹿在林野中求食行處不被縛觀察獨存有識者應可獨行如犀角三九恰如鹿在林野中求食行處不被縛之句中鹿者是羚羊伊尼鹿與沙羅婆鹿之二種鹿譬如林野之鹿住於林野安心而行安心而立安心而坐安心而臥即如斯說諸比丘譬如有林野之鹿遊於林野山林安心而行安心而立安心而坐安心而臥彼因何耶諸比丘是獵師之眼所不能屈如斯諸比丘有比丘離諸欲離諸不善法有尋有伺由離生有喜樂具足初禪而住諸比丘此比丘能言魔已盲目魔眼完全亡失已至波旬不能見更又諸比丘於尋與伺之寂滅故為內之淨為心之專一性無尋無伺由定生有喜樂具足第二禪而住諸比丘此比丘能言魔已盲目魔眼完全亡失已至波旬不能見更又諸比丘有比丘由喜之捨離故有捨而住有念有正知而以身受樂彼諸聖者能說有捨有念而樂住具足第三禪而住諸比丘此之比丘能言魔盲目魔眼完全亡失已至波旬不能見更又諸比丘有比丘由捨斷樂故由捨斷苦故由滅沒喜憂故不苦不樂由捨念之清淨具足第四禪而住諸比丘此比丘能言魔已盲目魔眼完全亡失已至波旬不能見更又諸比丘有比丘普超越色想滅沒有對想不作意種種想虛空是無邊具足空無邊處而住汝諸比丘此之比丘能言魔為盲目魔眼完全亡失已能至於波旬而不能見更又諸比丘有比丘普超越空無邊處識是無邊具足識無邊而住普超越識無邊處何物亦無具足無所有處而住普超越無所有處具足非想非非想處而住普超越非想非非想處具足想受滅而住又以慧見彼諸漏已盡滅諸比丘此比丘能言魔已盲目魔眼完全亡失已至波旬不能見已度世間之愛著彼安心而行安心而立安心而坐安心而臥彼因何耶諸比丘是惡魔之眼不能屈此是恰如鹿在林野中求食行處不被縛之義觀察獨存有識者之句中有識者是識者賢者具慧者覺慧者有智者辨知者有慧者人者是有情人摩奴之子士夫補特伽羅命者生死者生者根行者摩奴所生者獨存者是一獨存之法與二獨存人人之二獨存一獨存之法者云何是四念處四正勤四神足五根五力七覺支八支聖道此是獨存之法二獨存之人者云何具備此所獨存之法者言為獨存之人觀察獨存有識人者是有識之人觀察獨存眺省思普觀此是觀察獨存有識之義應可獨行如犀角故彼辟支佛言恰如鹿在林野中求食行處不被縛觀察獨存有識者應可獨行如犀角六朋友之間雖住立雖步遊行交語話愚者不願觀獨存應可獨行如犀角四朋友之間雖住立雖步遊行交語話之句中朋友者共愉快而往愉快而來愉快而往來愉快而坐愉快而臥愉快而招呼愉快而談愉快而會談人人朋友之間雖住立雖步履雖遊行交相語話者於朋友之間雖住雖立步履遊行有自利之語話他利之語話俱利之語話現世利之語話來世利之語話第一義之利之語話此是朋友之間雖住雖立雖步履雖遊行交相語話之義愚者不願觀獨存者是諸愚者不善人外學外學之弟子不願此事即是著黃色之袈裟衣諸賢者善人佛弟子辟支佛願此事即是著黃色之袈裟衣事獨存者是一獨存之法與二獨存人之二獨存一獨存之法者云何是四正勤四神足五根五力七覺支八支聖道此是獨存之法二獨存之人者云何是具備此所獨存之法者言為獨存之人不願觀獨存者是觀察獨存眺省思不斷普觀此是不願觀獨存應可獨行如犀角故彼辟支佛言朋友之間雖住立雖步遊行交語話愚者不願觀獨存應可獨行如犀角七朋友之間有戲樂妻子之中大愛生愛別離苦續嫌忌應可獨行如犀角四一朋友之間有戲樂之句中戲者是一身戲與二語戲之二戲一身戲者云何人人以象戲以馬戲以車戲以弓戲以八條盤碁戲以十條盤碁戲以無盤碁戲以蹴石戲以拔取戲以投骰子戲以棒打戲以遊筆手戲以骰子戲以葉笛戲以玩具鋤戲逆立戲以風車戲以玩具而戲以玩具弓戲以文字判戲以意志判戲以模倣殘障者戲此是身戲二語戲者云何是口大鼓口阿藍巴達口殿第摩迦口瓦利摩迦口貝魯拉迦口達達利迦舞戲舞蹈詩歌戲言此是語戲樂者此是滿悅之語於朋友之間之句中朋友者是共愉快而往愉快而來愉快而往來愉快而坐愉快而臥愉快而招呼愉快而談愉快而會談之人人朋友之間有戲樂者是朋友之間有戲與樂此是朋友之間有戲樂之義妻子之中大愛生之句中子者是自所生子為乳母所育子領養子徒弟子之四種子又於子之中大愛生者於子中有過大之愛此又是妻子之中大愛生之義愛別離苦續嫌忌之句中愛者是一愛有情與二愛行之二愛一愛有情者云何於此彼欲彼等有情之利欲益欲幸福欲瑜伽所安穩之母父兄弟姊妹親子親女友人同僚親戚緣者此是愛有情二愛行者云何是可意色可意聲可意香可意味可意觸此是愛行愛別離苦續嫌忌者是嫌忌愛別離之苦續忌續嫌惡此是愛別離苦續嫌忌之義應可獨行如犀角故彼辟支佛言朋友之間有戲樂妻子之中大愛生愛別離苦續嫌忌應可獨行如犀角八四方有情無瞋怒多少衣食住滿足堪諸危難不動轉應可獨行如犀角四二四方有情無瞋怒之句中四方者彼辟支佛是以慈俱之心徧滿一方而住同樣於第二方同樣於第三方同樣於第四方斯於上於下於橫於一切處於含一切有情世界自己一切見為廣大偉大無量無怨恨無瞋惱徧滿慈俱心而住於四方無瞋怒者慈之修習故於東方有情一切無厭逆於西方有情一切無厭逆於南方有情一切無厭逆於北方有情一切無厭逆於東隅有情一切無厭逆於西隅有情一切無厭逆於南隅有情一切無厭逆於北隅有情一切無厭逆於下方有情一切無厭逆於上方有情一切無厭逆於四方四維有情一切無厭逆悲之修習故喜之修習故捨之修習故於東方有情一切無厭逆乃至於四方四維有情一切無厭逆此是四方有情無瞋怒之義多少亦滿足者一彼辟支佛於多少衣服而滿足於多少衣服而讚說滿足又為衣服不適當而無陷邪求不得衣服亦無懼怖得衣服亦不貪覓不昏迷不縛著觀過患有出離之慧而受用又彼多少衣服亦無以滿足高揚自己亦無貶下他人其時而巧善無懶惰有正知有所念處者斯辟支佛言住古之最高聖種者二以多少之食物而滿足多少之食物而讚說滿足又為食物不適當而無陷於邪求不得食物亦無懼怖得食物亦不貪覓不昏迷不縛著觀過患有出離之慧而受用又多少之食物亦無以滿足高揚自己亦無貶下他人其時而巧善無懶惰有正知有所念慮者斯辟支佛言住古之最高聖種者三以多少之臥坐所而滿足多少之臥坐所而讚說滿足又為臥坐所之不適當而無陷於邪求不得臥坐所亦無懼怖得臥坐所亦不貪覓不昏迷不縛著觀過患有出離之慧而受用又多少之臥坐所亦無以滿足高揚自己亦無貶下他人其時而巧善無懶惰有正知有所念慮者斯辟支佛言住古之最高聖種者四以多少之病者資具藥品而滿足多少之病者資具藥品而讚說滿足又為病者之資具藥品不適當而無陷於邪求又得病者之資具藥品亦無懼怖得病者之資具藥品亦不貪覓不昏迷不縛著觀過患有出離之慧而受用又多少之病者之資具藥品亦無以滿足高揚自己亦無貶下他人其時而巧善無懶惰有正知有所念慮者斯辟支佛言住古之最高聖種者此是多少衣食住滿足堪諸危難不動轉之句中危難者是一顯現之危難與二隱密危難之二危難一顯現之危難者云何是有獅子虎豹熊鬣狗狼野牛象蛇蠍百足又盜賊又既遂未遂之兇暴人又眼病耳病鼻病舌病身病頭病外耳病口腔病齒痛咳喘息外鼻病熱病老腹病氣絕赤痢腹痛虎列剌癰疱瘡肺病癲癇輪癬疥癬風癬抓傷皸裂出血糖尿病痔疾疙疸潰瘍膽汁等起病痰等起病膽汁疾風集合病氣候變化所生病不等姿勢所生病傷害所生病業報所生病寒暑飢渴大便小便虻蚊風炎熱與爬行類蛇類之接觸此等言為顯現之危難二隱密之危難者云何是身惡行語惡行意惡行欲貪蓋瞋恚蓋昏沈睡眠蓋掉舉惡作蓋疑蓋貪瞋癡忿恨覆惱嫉慳諂誑強情激情慢過慢憍放逸一切煩惱一切惡行一切不安一切熱惱一切熱苦一切不善行此等言為隱密之危難危難者由何義而為危難耶是一征服善人故為危難二至於善法之減退故為危難三不善法以其處為依所故為危難一征服善人故為危難者云何彼等危難征其人征服勝蹂躪奪取打破如斯征服故為危難二至於善法之滅退故為危難者云何彼等危難至諸善法之減退消滅諸善法者云何是正行道隨順之行道無害敵之行道隨義之行道法隨法之行道諸戒之完成諸根之守護對食而知量向警寤之努力向念正知四念處修習之努力向四正勤四神足五根五力七覺支八支正道修習之努力至於此等諸善法之減退消滅如斯至於減退故而為危難三不善法以其處為依所故為危難者云何此等之惡不善法生起而自體依止於其處譬如以洞穴為依所之生物橫臥於洞穴以水為依所之生物橫臥於水中以林為依所之生物橫臥於林中以樹為依所之生物橫臥於樹上如斯此等諸不善法生起而自體依止於其處如斯依止於其處故是危難即世尊如斯說諸比丘與門人煩惱共與阿闍梨煩惱共之比丘苦而不樂住諸比丘與門人共與阿闍梨共之比丘苦而不樂住者云何諸比丘茲有比丘以眼見色後彼憶念思惟生起結縛惡不善法彼等之惡不善法於彼之內而住隨住故彼言與彼門人內住者共彼等惡不善法於彼現行故彼與阿闍梨現行者言共更又諸比丘有比丘以耳聞聲之後以鼻嗅香之後以舌嚐味之後以身觸所觸之後以意識法之後於彼憶念思惟生起結縛惡不善法彼等惡不善法住隨住於彼之內故言彼與門人內住者共彼等諸不善法現行於彼故言彼與阿闍梨現行者共如斯諸比丘是與門人共是與阿闍梨共之比丘苦而不樂住如斯以其處為依所故而為危難又世尊已為斯說諸比丘此等三之內垢有內不友內敵內殺戮者內反敵者三者云何諸比丘貪是內垢內不友內敵內殺戮者內反敵者瞋是內垢內不友內敵內殺戮者內反敵者癡是內垢內不友內敵內殺戮者內反敵者諸比丘此等是三之內垢內不友內敵內殺戮者內反敵者貪者生不利貪者心動亂怖畏由內生人不覺知彼貪者不知義貪者不見法貪而征人故時有黑闇冥瞋者生不利瞋者心動亂怖畏由內生人不覺知彼瞋者不知義瞋者不見法忿而征人故時有黑闇冥癡者生不利癡者心動亂怖畏由內生人不覺知彼癡者不知義癡者不見法癡而征人故時有黑闇冥如斯亦以其處為依所故而為危難又世尊如斯說大王於人有三法之生起彼等於內生起不利益苦不樂住三者云何大王於人有貪之生起彼於內生起不利益至苦不樂住大王在人有瞋之生起彼於內生起不利益至苦不樂住大王於人有癡之生起彼於內生起不利益至苦不樂住大王於人有此等三法之生起彼於內生起不利益至苦不樂住自己之心中生之貪瞋癡害人有惡心自果如枯竹如斯亦以其處為依所故為危難又世尊如斯說貪與瞋為身體因身毛豎立由此生不樂與樂身等起諸不善尋善意如諸童子放捨鳥一切諸鳥均放棄如斯亦以其處為依所故而為危難堪諸危難者是堪於諸危難超乘奪去破碎不動轉者是彼辟支佛無恐怖不動轉不駭怖不逃走捨斷怖畏恐怖離去身毛豎立而住此是堪諸危難不動轉之義應可獨行如犀角故彼辟支佛言四方有情無瞋怒多少衣食住滿足堪諸危難不動轉應可獨行如犀角九一類出家者攝益之事難住家在家者於如此亦然對他人子女無有執心事應如犀角之可為獨遊行四三一類出家者攝益之事難於此一類出家者雖亦與依止和尚亦與總說聖典亦與徧問義疏亦與依服亦與鉢亦與銅椀亦與水瓶亦與濾水器亦與剃刀亦與履物亦與腰帶但不聞正法不傾耳不起欲知之心不聞不從順不遵他語為違背行為以顏外向此是一類出家者攝益之事難之義住家在家者亦然者於此一類在家者雖亦與象亦與車亦與田園與宅地與黃金與金銀貨亦與村街市地方但不聞正法不傾耳不起欲知之心不聞不順從不尊他語為違背行為以顏外向此是住家在家者亦然之義對他人子女無有執心事之句中他人之子者是言於此情況除自己之一切者對他人子女無有執心事者無有執心不持關心無有觀待愛著此是對他人子女無有執心事之義應如犀角之可為獨遊行故彼辟支佛言一類出家者攝益之事難住家在家者於如此亦然對他人子女無有執心事應如犀角之可為獨遊行一如晝度樹之落葉取除鬚髮無俗相雄者斷世之結縛應可獨行如犀角四四取除鬚髮世俗相之句中世俗之相者是髮鬚華鬘薰香塗料纓絡飾物衣裳纏物頭捲布塗香按摩沐浴洗髮劑鏡眼藥華鬘塗油白粉口紅腕環髮飾杖棒劍傘蓋有彩色履物髻寶珠扇長短之白衣等取除鬚髮世俗相是奪去投棄息此是取除世俗相之義如晝度樹之落葉譬如晝度樹之葉離落已落葉如斯彼辟支佛之世俗相成為斷落此是如晝度樹之落葉雄者斷世之結縛之句中者是具精進者故而為雄者是有能者故而為雄者是權力者故而為雄者是有用者故而為雄者是勇者英雄戰士無怖者無懼者無駭者無敗走者怖畏恐怖之捨斷者身毛豎立之離去者故而為雄者遠離此世一切惡越地獄苦精進者有精進有精勤者斯人其故言雄者世俗之結縛者是子奴婢奴僕山羊羊鷄豚象牛馬田園宅地黃金金銀貨村街王市國土地方四兵之營舍倉庫及所有可染愛之事物雄者斷世之結縛者是雄者彼辟支佛斷世俗之結縛正斷捨除去滅除令之滅無此是雄者斷世之結縛之義應可獨行如犀角故彼辟支佛言如晝度樹之落葉取除鬚髮無俗相雄者斷世之結縛應可獨行如犀角一一若聰明友汝等得善住賢者與共行打勝一切諸危難有念愉快應遊行四五若聰明友汝等得者若得聰明賢具慧有覺慧有智有辨知有慧之友如獲得如得達如所有此是若聰明友汝等得之義善住賢者與共行之句中與共行者是與同行善住者是由初禪而善住由第二禪第三禪第四禪亦善住慈心解脫亦善住由悲喜捨心解脫亦善住由空無邊處定亦善住由識無邊處定無所有處定非想非非想處定亦善住由滅盡定亦善住由果定亦善住賢者者是賢者學者具慧者覺慧者有智者辨知者有慧者此是善住賢者與共行之義打勝一切諸危難之句中危難者是顯之危難與隱密危難之二危難乃至三四二頁以下參照此言顯現之危難乃至三四三頁以下參照此言隱密之危難打勝一切諸危難是打勝勝打超奪去一切之諸危難此是打勝一切諸危難有念愉快應遊行彼辟支佛與彼聰明賢具慧有覺慧有智有辨知有慧之友共愉快意滿意笑意笑喜意雀躍意喜悅而行行作動作活動護持持續可維持此是有念愉快應遊行之義有念者彼之辟支佛有念具備第一之念慧憶念隨念於甚久以前所行於甚久以前所語亦憶隨念此是有念愉快應遊行之義故彼辟支佛言若聰明友汝等得善住賢者與共行打勝一切諸危難有念愉快應遊行一二若聰明友汝不得善住賢者與共行征服國土如王捨應可獨行如犀角四六若聰明友汝不得若不得聰明賢具慧有覺慧有智有辨知有慧之友不獲得不得達不為所有此是若聰明友汝不得之義善住賢者與共行之句中共行者是同行善住者是由初禪而善住乃至前方參照由滅盡定而善住由果定而善住賢者是賢者學者具慧者覺慧者有智者辨知者有慧者此是善住賢者與共行之義征服國土如王捨如戰爭之勝打破敵已得意欲之物而以戰利品充滿倉庫之灌頂剎帝利王亦將國土地方充滿黃金金銀貨之倉庫以徧捨城市而剃除鬚髮著袈裟衣由家非家而出家成為無一物之狀態而獨行行作動作活動護持持續維持斯辟支佛亦斷一切家居之障礙斷妻子之障礙斷親戚緣者之障礙斷友人同僚之障礙剃除鬚髮著袈裟衣由家非家而出家成為無一物之狀態而獨行行作動作活動護持持續維持此是征服國土如王捨之義應可獨行如犀角故彼辟支佛言若聰明友汝不得善住賢者與共行征服國土如王捨應可獨行如犀角一三正使成具友我等應賞讚勝又等之友等等可親近如不得彼等無罪受用者應如犀角之可為獨遊行四七正使成具友我等應賞讚之句中正者此是一向之語無疑之語不二之語確實之語嚴密之語純粹之語確立之語使成具之友者是具備無學之戒蘊具備無學之定蘊無學之慧蘊無學之解脫蘊無學之解脫智見蘊之所有之朋友正使成具友我等應賞讚者是我等賞讚讚嘆稱譽讚說正成具之朋友此是正使成具友我等應賞讚之義勝又等之友我等可親近有由戒定慧解脫解脫智見而殊勝之朋友有由戒定慧解脫解脫智見而等同之朋友對此等之勝朋友又等朋友而可親近可親近可近侍可徧問應徧問此是勝又等之友我等可親近之義如不得彼等無罪受用者之句中於受用者者一有罪受用者二無罪受用者一有罪受用者云何於此某者由於詭詐由虛談由現相由激磨由以利成利由木之施與由竹之施與由葉之施與由草之施與由沐浴水之施與由洗粉之施與由浴土肥皂之施與由楊枝之施與由洗顏水之施與由諂諛由荒唐語由取悅由背後說由家相學由賤劣學由手足判斷學由占星學由通使由遣使由使走由醫業由普請由食物之贈答由施物之贈答於不如法於不正當而得獲獲得得達所有而營生活此言有罪受用者二無罪受用者云何於此某者不由詭詐不由虛談不由激磨不由以利成利不由木之施與不由竹之施與不由葉之施與不由草之施與不由沐浴水之施與不由洗粉之施與不由浴土肥皂之施與不由楊枝之施與不由洗顏水之施與不由諂諛不由荒唐語不由取悅語不由背後語不由家相學不由賤劣學不由手足判斷學不由占星學不由通使不由遣使不由使走不由醫業不由普請不由食物之贈答不由施物之贈答於如法正當而得獲獲得得達所有而營生活此言無罪受用者如不得彼等無罪受用者如不得彼等如不獲如不獲得如不得達如非所有此是如不得彼等無罪受用者之義應如犀角可獨遊行故彼辟支佛言正使成具友我等應賞讚勝又等之友等等可親近如不得彼等無罪受用者應如犀角之可為獨遊行一四金工善能細作為二環懸腕續接觸見有黃金之光輝應可獨行如犀角四八見有黃金之光輝之句中見者是見觀考量度知辨知明暸黃金者金也光輝者是徧淨徧白此是見有黃金之光輝之義金工善能細作為之句中金工者是金匠工金工善能細作為者是金工之善能細作善作善製造此是金工善能細作為二環懸腕續接觸之句中腕者是手譬如隻手所懸之二環相打斯諸有情由渴愛而相打即於畜生界而相打於餓鬼界而相打於人世界而相打於天世界而相打由趣向趣由生起向生起由結生向結生由有向有由輪迴向輪迴由輪轉向輪轉相打而行行作動作活動護持持續維持此是二環懸腕續接觸之義應可獨行如犀角故彼辟支佛言金工善能細作為二環懸腕續接觸見有黃金之光輝應可獨行如犀角一五如斯第二者與我成共同冗漫之言語又應有親著未來斯怖畏而且為觀察應如犀角之可為獨遊行四九如斯第二者與我成共同之句中第二者是一以渴愛為第二者伴侶又有以二人為第二者伴侶一以渴愛為第二者云何渴愛是色愛聲愛香愛味愛觸愛法愛如不捨斷此渴愛者言為渴愛為第二者使渴愛為第二者長時繼續於輪迴由此狀態他狀態無有超越輪迴事如斯是渴愛為第二者二以人為第二者云何於此某者亦非為自己亦無何等理由掉舉而心不寂靜亦向一人之居所加入為第二者亦向二人之居所加入為第三者亦向三人之居所加入為第四者於其處而多為綺語所謂王論賊論大臣論軍論怖畏論食物論飲物論著物論華鬘論親戚論乘物論村論街論市論地方論婦人論男子論英雄論道傍論井邊論俗哲學宇宙發生論有無論等如斯以人為第二者此是如斯第二者與我成共同之義冗漫之言語又應有親著之句中冗漫之言語者是三十二之無用論王論賊論乃至前方參照有無論等親著乃至前方參照有無論等親著者是愛著與見著之二者乃至四頁參照此是愛著乃至四頁參照此是見著此是冗漫之言語又應有親著之義未來斯怖畏而且為觀察之句中怖畏者是生之怖畏老之怖畏病之怖畏死之怖畏王之怖畏賊之怖畏火之怖畏水之怖畏自責之怖畏他責之怖畏刑罰之怖畏惡趣之怖畏波浪之怖畏蛟龍之怖畏旋流之怖畏鰐魚之怖畏生活之怖畏污名之怖畏於眾中而臆怖畏可怖畏身硬直身毛豎立心之悚懼駭怖未來斯怖畏而且為觀察於未來觀察有斯怖畏覩眺省思普觀此是未來斯怖畏而且為觀察之義應如犀角之可為獨遊行故彼辟支佛言如斯第二者與我成共同冗漫之言語又應有親著未來斯怖畏而且為觀察應如犀角之可為獨遊行一六種種為甘美實欲在意樂由雜多之欲將令攪亂心由於五種欲見有過患事應如犀角之可為獨遊行五種種為甘美實欲在意樂之句中欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲種種者是多種之色多種之聲多種之香多種之味多種之觸甘美者是世尊即斯說諸比丘有此等之五種欲五者云何好望適意可愛伴欲可染著眼所識之色耳所識之聲鼻所識之香舌所識之味好望適意可愛伴欲可染著身所識之觸諸比丘緣此等之五種欲而生起所樂喜此言為欲樂穢污樂凡夫樂非聖樂對此之樂不可親不可修習不可多作我言彼可怖畏此是種種為甘美實欲在意樂之義意樂之句中意者是心意意所心臟淨白心意意處意根識識蘊隨順於觸等法之意識界由雜多之欲將使攪亂心者於多種之色乃至由多種之觸而攪亂心使駭怖損毀損此是由雜多之欲攪亂心之義於由五種欲見有過患事世尊即斯說諸比丘諸欲之過患者云何諸比丘於此有善男子由所有工巧而營生活即以印而或以算而或以數或以耕作或以商賈或以牧畜或以弓術或以仕官或以其他之工巧營生活而遭寒冷遭暑熱由與虻蚊風炎熱爬行類蛇類之接觸而苦為飢渴所惱諸比丘此是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊諸比丘如斯發奮努力有不斷精進於彼之善男子若彼等之財富如不能得彼實我發奮成為徒爾實我精進已成無益而愁疲悲捶胸而泣陷於蒙昧諸比丘此亦為諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊諸比丘如斯發奮努力有不斷精進於彼之善男子若彼等之財富如得者彼如何而我之財產王不奪劫賊不奪火不燒水不流不愛後繼者不持去彼為守護彼等之財富而覺受苦憂如斯有不斷守護保護彼等之財富王奪劫賊奪火燒水流不愛後繼者持去彼我所有之所有物今已無而愁乃至陷於蒙昧諸比丘此是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊復次諸比丘以欲為因以欲為因緣關係於欲為諸欲而王與王諍論剎帝利與剎帝利諍論婆羅門與婆羅門諍論居士與居士諍論母與子諍論子與母諍論父與子諍論子與父諍論兄弟與兄弟諍論兄弟與姊妹姊妹與兄弟諍論朋友與朋友諍論彼等於其處陷於鬥爭諍論相互以手擊以石塊擊以杖擊以刀擊彼等於其處而至死又受等於死之苦諸比丘此亦是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊復次諸比丘以欲為因以欲為因緣關係於欲為諸欲而執劍與楯用弓與箭筒固身矢亂飛鎗亂飛劍不斷閃有中跳入於兩軍密集之戰陣彼等於其處射矢射鎗以劍切首彼等於其處至於死又受等於死之苦諸比丘此亦是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊復次諸比丘以欲為因以欲為因緣關係於欲為諸欲而執劍與楯用弓與箭筒固身矢亂飛鎗亂飛劍不斷閃中跳入善塗固之保壘彼等於其處射矢射鎗以煮沸之獸糞降注以強力令粉碎以劍切首彼等於其處而至於死又受等於死之苦諸比丘此亦是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊復次諸比丘以欲為因以欲為因緣關係於欲為諸欲而破家之隙間行掠奪包圍家待伏於路邊而搶掠通他人妻王捕此者而行種種懲罰即以鞭笞以棒笞以棍棒笞斷手斷足乃至二六二頁以下參照以劍斷首彼等於其處而至死又受等於死之苦諸比丘此亦是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起現世之苦蘊復次諸比丘以欲為因以欲為因緣關係於欲為諸欲而以身行惡行以語行惡行以意行惡行身壞死後生於苦界惡趣墮處地獄諸比丘此亦是諸欲之過患此以欲為因以欲為因緣關係於欲為諸欲而所起之世之苦蘊由於五種欲見有過患事由五種欲見有過患而觀考量度知辨知明暸此是由於五種欲見有過患事應如犀角之可為獨遊行故彼辟支佛言種種為甘美實欲在意樂由雜多之欲將令攪亂心由於五種欲見有過患事應如犀角之可為獨遊行一七此我是為疾乃為癰與禍乃為病與箭又是為怖畏由於五種欲見有怖畏事應如犀角之可為獨遊行五一此我乃為疾乃為癰與禍是為病與箭又是為怖畏者世尊即斯說諸比丘怖畏者是此諸欲之同義語諸比丘苦者是此諸欲之同義語諸比丘病者是此諸欲之同義語諸比丘癰者是此諸欲之同義語諸比丘箭者是此諸欲之同義語諸比丘著者是此諸欲之同義語諸比丘泥者是此諸欲之同義語諸比丘胎者是此諸欲之同義語諸比丘然者而何故怖畏此是諸欲之同義語於此之欲貪染貪於欲貪者為欲貪所結縛由現世之怖畏不徧脫由來世之怖畏不徧脫故怖畏是此諸欲之同義語又諸比丘何故而病癰箭著泥胎者此是諸欲之同義語於此於染貪欲貪者為欲貪所結縛由現世之胎不徧脫由來世之胎不徧脫故胎者是此諸欲之同義語怖畏苦與病兩者著與泥此等言諸欲凡夫著其處可意色因彼至赴於胎中諸比丘當知因為不怠禪彼超此頗難如斯度難路人人迫生老觀察且顫動此是此我之疾癰禍病箭又怖畏之義由於五種欲見有怖畏事者由於五種欲見有此怖畏觀考量度知辨知而明暸此是由於五種欲見有此怖畏應如犀角之可為獨遊行故彼辟支佛言此我是為疾乃為癰與禍乃為病與箭又是為怖畏由於五種欲見有怖畏事應如犀角之可為獨遊行一八寒與暑與飢與渴風炎熱虻爬行類此等一切堪打勝應可獨行如犀角五二寒與暑與飢與渴之句中寒者是由二行相而有寒即一由身內界之動搖而有寒又二由外部之氣候而有寒暑者由二行相而有暑即一由身內界之動搖而有暑又二由外部之氣候而有暑飢者是餓渴者是欲求此是寒與暑與飢與渴風炎熱虻爬行類之句中風者是東風西風北風南風有塵風無塵風寒風熱風微風烈風毘嵐風颱風翼風金翅鳥風多羅葉扇風扇風炎熱者是太陽之熱虻者成為赤眼蠅爬行類者是蛇此是風炎熱虻爬行類此等一切堪打勝者是對此等一切打勝打超奪去粉碎此是此等一切堪打勝應可獨行如犀角故彼辟支佛言寒與暑與飢與渴風炎熱虻爬行類此等一切堪打勝應可獨行如犀角一九肩善發育似蓮華大象獨臥避難群儘如所欲住林野應可獨行如犀角五三象以避群之句中象者是有鼻之象辟支佛亦是龍象由何而辟支佛是龍象耶一不行罪惡故是龍象二不行故是龍象三不來故是龍象一彼辟支佛不行罪惡故是龍象者云何罪惡者是有雜染齎再有有不安有苦報齎生老死於未來之惡不善法不行罪惡於世間捨離一切之結縛解脫染著一切處斯者其故言龍象如斯彼辟支佛不行罪惡故是龍象二彼辟支佛不行故是龍象者云何彼辟支佛不行於欲趣不行於瞋趣不行於癡趣不行於怖畏趣由貪而不行由瞋而不行由癡而不行由慢而不行由掉舉而不行由疑而不行由隨眠而不行由違和之諸法而不趣不受導不受運不受將來如斯彼之辟支佛不行故而是龍象三辟支佛不來故是龍象者云何由須陀洹道而捨斷所有煩惱一切此不再來不返不還由斯陀含道阿那含道阿羅漢道而捨斷所有煩惱一切此不再來不返不還如斯彼辟支佛不來故而是龍象象避群者是譬如彼有鼻象之避群迴避辟離獨於林野深入林中而行行作動作活動護持持續維持辟支佛亦避群迴避避離而獨如犀角可隱住於阿練若林野森林之邊鄙無人聲無騷音無人人之境況禪思受用適當之臥坐所彼獨行獨立獨坐獨臥獨入於村行乞獨由行乞歸獨密而坐禪獨為經行獨遊行行作動作活動護持持續維持此是象避群之義肩善發育大似蓮華者譬如彼有鼻象肩善發育高有七肘又八肘辟支佛亦由無學之戒蘊無學之定蘊無學之慧蘊無學之解脫蘊無學之解脫智見蘊而蘊善發育譬如彼有鼻象似蓮華辟支佛亦由七覺支之華即念覺支之華擇法覺支之華精進覺支之華喜覺支之華輕安覺支之華定覺支之華捨覺支之華而似蓮華譬如彼有鼻之象是大勢力速力勇氣辟支佛亦是大戒定慧解脫解脫智見此是肩善發育似蓮華之義儘如所欲住林野譬如彼有鼻之象儘如所欲住於林野辟支佛亦儘如所欲而住於林野即由初禪而儘如所欲住於林野由第二第三第四禪亦儘如所欲住於林野由慈心解脫亦儘如所欲住於林野由悲喜捨心解脫亦儘如所欲住於林野由空無邊處定亦儘如所欲住於林野由識無邊處定無所有處定非想非非想處定果定亦儘如所欲住於林野此是儘如所欲住林野之義應可獨行如犀角故彼之辟支佛言肩善發育似蓮華大象獨臥避難群儘如所欲住林野應可獨行如犀角二樂群集者時解脫無有可至道理事然遵日種佛之語應可獨行如犀角五四樂群集者時解脫無有可至道理事者世尊即斯說阿難有比丘喜群集樂群集耽於群集之樂喜眾樂眾喜悅眾只要耽於眾之樂彼欲得所有出離之樂遠離之樂寂止之樂正覺之樂容易得簡單得無有此道理然阿難彼比丘若遠離眾而獨住彼比丘能期待此事即彼欲得所有出離之樂遠離之樂寂止之樂正覺之樂欲得彼之樂容易得簡單得有此道理阿難有比丘喜群集樂群集耽於群集之樂喜眾喜悅眾只要耽於眾之樂彼時心解脫又可具足非時不動心解脫而住者無有此道理然阿難若彼比丘遠離眾而獨住彼比丘能期待此即彼時心解脫又具足可於非時不動心解脫而住者有此道理此是樂群集者時解脫無有可至道理事之義然遵日種佛之語之句中日者是太陽彼太陽之姓是瞿曇辟支佛之姓亦是瞿曇由彼之辟支佛由於姓是太陽之親戚姓是親戚故辟支佛是日種遵日種佛之語者是聞日種之語語路說示示教教訓聽把取保持觀察此是然遵日種佛之語應可獨行如犀角故彼辟支佛言樂群集者時解脫無有可至道理事然遵日種佛之語應可獨行如犀角二一超越戰鬥邪見事達正決定獲得道不被導我起覺智應可獨行如犀角五五超越戰邪見事之句中者戰見事者是二十事有身見即於無聞之凡夫不見諸聖者不熟達聖法不受教導於聖法中不見諸善人不熟達善人法不受教導於善人法中一觀我是色二觀我是有色三觀我中有色四觀色中有我五八受九十二想十三十六行十七觀識是我十八觀我是有識十九觀我中有識二十觀識中有我所有如斯類之見惡見見執見難所見曲邪見異動見結執執取住著取邪道邪路邪性異學處邪倒執違邪執顛倒執邪執對於不如實之如實執乃至為六十二惡見此是戰見事超越者是超越戰見事越度正越離越此是超越戰邪見事之義達正決定獲得道之句中決定者是四沙門道八支聖道所謂正見正思惟正語正業正命正精進正念正定具備四聖道正達得達觸達作證是達於決定獲得道者是得道獲得道得達道觸達道此是達正決定獲得道之義不被他導我起智者彼辟支佛起智生起生發生現前即起一切行是無常之智生起生發生現前一切行是苦乃至一九頁以下參照起所有集法皆是此滅法之智生起生發生現前此是我起智之義不為他導彼辟支佛不被他導由他不能得不緣於他不行結縛於他自如實知見不蒙昧有正知有念慮即一切行是無常乃至二八頁以下參照所有集法皆是此滅法不被他導由他不能得不緣於他不行結縛於他自如實知見不蒙昧有正知有念慮此是不被他導我起智之義應可獨行如犀角故彼辟支佛言超越戰邪惡見事達正決定獲得道不被導我起受智應可獨行如犀角二二動貪詭詐渴欲無除覆偽善惡濁癡無意樂渴愛於世間應可獨行如犀角五六動貪詭詐渴欲無之句中動貪者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根彼動貪貪是彼辟支佛所捨斷根絕如截頂之多羅樹成為滅無於未來不生起者故在辟支佛是不動貪無詭詐者詭詐有三詭詐事即一稱為資具受用之詭詐二稱為威儀之詭詐三稱為周邊語之詭詐一稱為資具受用之詭詐者云何於此諸居士為布施衣服食物臥坐所病者之資具藥品而招待比丘彼比丘有惡欲而敗於欲有欲求由欲得更多衣服食物臥坐所病者資具藥品之欲念而更拒絕衣服食物臥坐所病者之資具藥品彼斯言於沙門高價衣服有何用沙門由塚墓或又由塵堆或又由店前拾集襤褸而作僧伽梨衣方為應著若此乃相應於沙門上等之食物有何用沙門行乞由團食而營生活若此乃相應於沙門上等之臥坐有何用沙門是樹下住者又或露地住者若此乃相應於沙門高價之病者資具藥品有何用沙門以牛之腐尿又或阿梨勒果片藥若此乃相應為此著粗糙之衣服攝粗糙之食物受用粗糙之臥坐所受用粗糙之病者資具藥品諸居士如斯思考此彼此沙門少欲而知足獨居而不雜於眾是勵精進之頭陀行者愈益將布施衣服食物臥坐所病者之資具藥品而招待彼如斯言由三者之現前而有信善男子生多福即由信之現前而有信善男子生多福由施物現前而有信善男子生多福由應施者聖者之現前而有信善男子生多福於汝等有此之信又此施物之存在而我是受者若我不受汝等將失福於我此之施物無用然為憐愍汝等故我受施物由此而多之衣服亦受多之食物亦受多之臥坐所亦受多之病者資具藥品亦受而彼時示澀面而似有麻煩之態度如斯所有澀面顰蹙詭詐詭瞞詐欺此言為稱資具受用之詭詐二稱威儀之詭詐者云何於此某者有惡欲敗於欲意欲由他之尊敬若為斯人人將尊敬我為裝如得阿羅漢果而步行裝而立裝而坐裝而臥願求將見得阿羅漢果人而步行願求而立願求而坐願求而臥如入定者而步行如入定者而立如入定而坐如入定者而臥為欲使他見而為禪定如斯所有威儀之假立建立澀面顰蹙詭詐詭瞞詐欺此言稱為威儀之詭詐三稱周邊語之詭詐者云何於此某者有惡欲而敗於欲意欲由他之尊敬若如斯者人人將尊敬我依據聖法而言詐即語著如斯衣服之沙門此是大有能者語持如斯鉢銅椀水瓶濾水器鍵履履物著帶著腰紐之沙門此是大有能者語有如斯和尚有如斯沙門此是大有能者語有如斯同於阿闍梨和尚者弟子兄弟同阿闍梨者同門有友人知己同輩朋友之沙門此是大有能者語如斯住精舍之沙門此是大有能者語如斯住於單屋頂家住於臺觀住於平屋住於山窟住於洞穴住於小屋住於重閣住於樓房住於圓屋住於寶庫住於集會所住於假屋住於樹下所之沙門此是大有能者或又有惡染之心而屢屢澀面為大詭詐為大多言由口巧言而得他之尊敬者如言此沙門我如斯寂靜住等至禪定為甚深秘密微妙隱蔽為出世間而與空相應之論如斯所有澀面顰蹙詭詐詐欺此言為稱為周邊語之詭詐彼辟支佛捨斷此等三詭詐正斷寂滅安息不得生起以智火燒之故彼辟支佛是無詭詐無渴欲之句中渴欲者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根此渴欲愛為彼辟支佛所捨斷正斷寂滅安息不得生起以智火燒之故彼辟支佛是無渴欲此是無動貪詭詐渴欲之義無覆除去惡濁癡之句中覆者是所有覆覆偽為善嫉視嫉視業惡濁者貪是惡濁瞋是惡濁癡是惡濁忿恨覆惱乃至三九頁參照一切不善行是惡濁癡者是對苦而無智對苦集而無智對苦滅而無智對至苦滅之道而無智對前際無智對後際無智對前後際無智對此緣性之緣起諸法無智所有如斯無智不見不現觀不隨覺不正覺不通達不潛入不沈潛不正觀不觀察不現見業惡慧愚癡癡蒙癡昧無明無明流無明軛無明隨眠無明纏無明閂癡不善根彼辟支佛覆惡濁癡亦已唾棄除去捨斷正斷寂滅安息不得生起以智火燒之故彼辟支佛已無覆除去惡濁與癡無有意樂於一切世間之句中意樂者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根於一切世間者是於一切惡趣世間一切人世間一切天世間一切蘊世間一切界世間一切處世間無有意樂於一切世間於一切世間而無有意樂無有渴愛無有渴欲此是無有意樂於一切世間之義應可獨行如犀角故彼辟支佛言動貪詭詐渴欲無除覆偽善惡濁癡無意樂渴愛於世間應可獨行如犀角二三住著邪曲不見義十事惡友應迴避依著放逸不可習應可獨行如犀角五七惡友應迴避之句中惡友者是一不布施二不獻供三不祭祀四無善作惡作諸業之果報五無此世六無他世七無母八無父九無化生有情十無正生活於世間正行道且無自通達作證於此世他世而向世人宣說之沙門婆羅門所具備十事邪見之彼朋友此是惡朋友惡友應回避者是須迴避惡朋友離避迴避此是惡友應迴避之義住著邪曲不見義之句中不見義者是不布施不獻供乃至前方參照無自通達作證此世他世向世人宣說之沙門婆羅門所具備十事邪見彼朋友此是不見義住著於邪曲者住著邪曲之身業住著邪曲之語業住著邪曲之意業住著邪曲之殺生住著邪曲之偷盜住著邪曲之邪欲行住著邪曲之妄語住著邪曲之兩舌住著邪曲之惡口住著邪曲之綺語住著邪曲之貪欲住著邪曲之瞋恚住著邪曲之邪見住著邪曲之諸行住著邪曲之五種欲著繫著近著縛著而信解此是住著邪曲不見義之義依著放逸不可習之句中依著者是求諸欲覓求徧求行此屢屢為此重此向於此傾於此赴於此信解此以此為主者此是欲依著者又由渴愛而求諸色所徧求者由渴愛而所獲得者由渴愛而所受用諸色者受用諸聲香味觸行此屢屢為此重此向於此傾於此赴於此信解此以此為主者亦是此欲依著者放逸之句中放逸者是對身惡行語惡行意惡行又謂對五種欲心之放縱放縱之遂行又對諸善法之修習不作恭敬不作永續不作持續委縮行將行欲放棄責任之放棄不習行不修習不多作不受持不專念放逸即如斯所有放逸放慢放慢性此言為放逸自依著放逸不可習者不可習於依著者不可向放逸者習彼等之行為不可習行不可常習不可行不可共行不可正持而動作此是自依著放逸不可習之義應可獨行如犀角故彼辟支佛言住著邪曲不見義十事惡友應迴避依著放逸不可習應可獨行如犀角二四應交持法多聞友交具偉大應辯友調伏疑惑了知義應可獨行如犀角五八應交持法多聞友之句中多聞者是多聞而持聞以積聞即說完全圓滿徧淨梵行之初善中善後善有義有文彼諸法多聞憶持斯諸法以語通曉以意觀察以見通達持法者是持契經祇夜記說偈自說如是語本生未曾有法毘陀羅之法者應交持法多聞友應交多聞而且持法之友應習應習作應常習此是應交持法多聞友之義交具偉大應辯友之句中由戒定慧解脫解脫智見而偉大之友具應辯者是一對教說而具應辯者二對徧問而具應辯者三對證得而具應辯者之三具應辯者一對教說而具應辯者云何於此某者學得佛語即契經祇夜記說偈自說如是語本生未曾有法毘陀羅彼依其教說而具應辯者應辯此是對教說之具應辯者二對徧問而具應辯者云何於此某者有關義所知相原因處非處徧問而依彼之其徧問而具應辯者應辯此是對徧問之具應辯者三對證得而具應辯者云何於此某者證得四念處四正勤四神足五根五力七覺支八支聖道四沙門果四無礙解六神通彼若知義知法知詞文法者應說法知詞者應詞對此等義法詞三者智是應辯無礙解彼辟支佛具此應辯無礙解正具達正達成正成具備故辟支佛是具應辯者亦無有教說亦不徧問亦無所證得者具應辯者將何以應辯此是交具偉大應辯友之義調伏疑惑了知義了知自義者是了知他義了知俱義了知現世之義了知者是了知來世之義知通知考量度知辯知明暸調伏疑惑者是折伏捨斷除去滅除令之滅無此是調伏疑惑了知義之義應可獨行如犀角故彼辟支佛言應交持法多聞友交具偉大應辯友調伏疑惑了知義應可獨行如犀角二五世間戲樂與欲樂不莊嚴而不期待實語者離嚴飾處應可獨行如犀角五九世間戲樂與欲樂之句中戲者是身戲與語戲之二戲乃至三三九頁參照此是身戲乃至三三九頁參照此是語戲樂者此是滿悅之語欲樂者世尊即如斯說諸比丘有此等五種欲五者云何是好望適意可愛伴欲可染著眼所識之色耳所識之聲鼻所識之香舌所識之味及好望適意可愛伴欲可染著身所識之觸諸比丘此是五種欲諸比丘緣此五種欲而生喜樂此是欲樂世間者是人世間此是世間戲樂與欲樂之義不莊嚴而不期待者以世間之戲樂與欲樂而自不莊嚴不期待彼而捨斷除去滅除令之滅無此是不莊嚴而不期待實語者離嚴飾處之句中嚴飾者是二嚴飾即一在家者之嚴飾二非家者之嚴飾一在家者之嚴飾者云何是髮鬚華鬘薰香塗料瓔珞飾物衣服裝飾頭巾塗香按摩沐浴洗髮劑鏡眼藥華鬘塗油白粉口紅腕環髮飾杖棒傘蓋有彩色履物頭巾扇長短之白衣等此是在家者之嚴飾二出家者之嚴飾者云何是美飾之衣服美飾之鉢美食臥坐所又此污穢身外部諸資具之美飾嚴飾奢侈貪求貪求性浮薄輕佻此是出家者之嚴飾實語者彼辟支佛是實語者遵真實人實直人世人可信賴人辟支佛是實語者而遠離嚴飾處離去捨遣離脫離縛以不限定之心而住此是實語者離嚴飾處之義應可獨行如犀角故彼辟支佛言世間戲樂與欲樂不莊嚴而不期待實語者離嚴飾處應可獨行如犀角二六亦子亦妻亦父母財寶穀物亦親類各各諸欲亦捨斷應可獨行如犀角六亦子亦妻亦父母之句中子者是自所生子乳母所育子領養之子徒弟子之四種子妻者妻也父者所有之男親母者是所有之女親此是亦子亦妻亦父母之義財寶穀物亦親類之句中財寶者是真珠寶珠摩尼瑠璃螺貝車渠寶石珊瑚銀金赤珠瑪瑙穀物者是言前食與後食前食者是米粳麥小麥稷荳稗後食者是羹湯之蔬菜親類者是四親類即一親戚亦是親類二同姓者亦是親類三友人亦是親類四同習藝者亦是親類此是財寶穀物亦親類之義各各諸欲亦捨斷之句中諸欲者概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言事欲乃至二七頁參照此等言煩惱欲諸欲亦捨棄者是徧知事欲捨煩惱欲捨斷除去滅除令之滅無此是諸欲亦捨斷各各者是由須陀洹道所捨斷之諸煩惱此不再來不返不還來由斯陀含道所捨斷之諸煩惱由阿那含道所捨斷之諸煩惱由阿羅漢道所捨斷之諸煩惱此不再來不返不還來此是各各諸欲亦捨斷之義應可獨行如犀角故彼辟支佛言亦子亦妻亦父母財寶穀物亦親類各各諸欲亦捨斷應可獨行如犀角二七此受無縛著茲之可樂小如此快味少茲有多之苦知此為癰與此之覺慧者應如犀角之可為獨遊行六一此縛著茲之可樂小之句中縛著者亦言鈎食啄懸著礙著此是五種欲之同義語茲之可樂小之句中可樂者世尊即如斯說諸比丘有此等五種欲五者云何是喜好欲望適意可愛伴欲可染著眼所識之色耳所識之聲鼻所識之香舌所識之味及喜好欲望適意可愛伴欲可染著身所識之觸諸比丘此是五種欲此樂少此樂是下賤此樂是卑賤此樂是苦此是縛著茲之可樂小之義快味少茲有多之苦之句中快味少者是世尊說欲有多苦有多惱於茲有多過患世尊說欲如骨鎖世尊說欲如藁之炬火世尊說欲如信用物世尊說欲如樹果世尊說欲如屠殺場世尊說欲如劍㦸世尊說欲如蛇頭有多苦有多煩惱於茲有多過患此是快味少茲有多苦之義知此癰與覺慧者之句中癰者亦言鈎食味懸著礙著此是五種欲之同義語與者是此句之接續句之相合句之圓滿字之合體文之接著句之次第知此癰與覺慧者覺慧者者是賢者具慧者有覺者智者辨知者有慧者知此是癰睡知是鈎知是食味知是懸著知是礙著考量度知辨知明暸此是知此癰與覺慧者之義應如犀角之可為獨遊行故彼辟支佛言此受樂縛著茲之可樂小如此快味少茲有多之苦知此為癰與此之覺慧者應如犀角之可為獨遊行二八如水中魚破壞網捨斷十結結破裂如火燃燒不返已應可獨行如犀角六二結破裂之句中結者是欲貪結瞋恚結慢結見結疑結戒禁取結有貪結嫉結慳結無明結之十結破裂結者是裂十結破裂捨斷除去滅除令之滅無此是破裂結之義如水中魚破壞網之句中網者絲之網水者水也魚行水中物是魚如魚如斯破網破壞裂割裂破裂而行行作動作活動護持持續維持於網是愛網與見網之二網乃至四頁參照此是愛網乃至四頁參照此是見網彼辟支佛已捨斷愛網捨遣見網愛網之捨斷故見網之捨遣故彼辟支佛不著色不著聲不著香乃至一七七頁參照不著見聞覺識之諸法不執不縛出離此棄遣離脫以不限定之心而住此是如水中魚破壞網之義如火燃燒不返已譬如由藁與薪有燃之火行燃不返如斯彼辟支佛由須陀洹道而所捨斷之煩惱不再來不返不歸來由斯陀含道所捨斷之煩惱由阿那含道所捨斷之煩惱由阿羅漢道所捨斷之煩惱不再來不返不歸來此是如火燃燒不返已之義應可獨行如犀角故彼辟支佛言如水中魚破壞網捨斷結破裂如火燃燒不返已應可獨行如犀角二九眼向下投無彷徨護持諸根守制意無流漏而火不燒應可獨行如犀角六三眼向下投無彷徨之句中投眼者云何於此某者動眼具眼之動貪即可見未見之物可超越已見之物為見色而由庭園向庭園由花園向花園由村向村由街向街由市向市由國向國由地方向地方長途之旅行耽於無目的地之旅行如斯是投眼或又行乞入於村落家家之間行於街路不防護眼根而行即眺象兵眺馬兵眺車兵眺步兵眺女眺男眺男兒眺女兒眺店內眺家之入口眺上眺下左顧右眄而行如斯是投眼或又以眼見色已而取相取細相不防此眼根而住者應為貪憂諸惡不善法所浸彼為其防護而不行道不護眼根至無眼根之律儀如斯亦是投眼又譬如有一部應尊敬之沙門婆羅門為享信施之食例如彼等耽住於觀覽舞蹈歌謠音樂曲藝歌曲手鈴樂鐃鈸樂銅羅樂奇術鐵丸戲竹棒戲輕業象鬥馬鬥鬥水牛鬥牡牛鬥牝牛鬥牡山羊鬥牡羊鬥鷄鬥鶉鬥杖鬥拳角力模擬戰兵列兵團閱兵等如斯亦是投眼眼向下投者云何於此有比丘動眼無具眼之動貪彼可見未見之物可超越已見之物為見色而由庭園向庭園由花園向花園由村向村由街向街由市向市由國向國由地方向地方無沈於長途之旅行無目的地之旅行如斯是眼下投或又有比丘行乞而入村落之家家間行於街路而防護眼根而行不眺象不眺馬不眺車不眺步兵不眺女不眺男不眺男兒不眺女兒不眺店內不眺家之入口不眺上不眺下不左顧右眄而行如斯亦是眼下投或又以眼見色已而無取相無取細相不防護此眼根而住者可為貪憂諸惡不善法所侵故為防護其眼根而行道護眼根至於眼根之律儀如斯亦是眼下投又譬如有一部應尊敬之沙門婆羅門享信施之食而彼等譬如無耽住於舞蹈歌謠音樂乃至閱兵等物之觀覽如斯不耽於觀覽物而住如斯離去沈於觀覽物如斯亦眼下投無彷徨之句中彷徨者云何於此某者彷徨具備彷徨性即由由庭園向庭園由花園向花園由村向村由街向街由市向市由國向國由地方向地方耽住於長途之旅行無目的地之旅行如斯是彷徨或又有比丘於僧伽藍中而具備彷徨性即無目的無理由掉舉心不寂滅而由僧房向僧房行由精舍向精舍行由片面屋頂家向片面屋頂家行由臺觀向臺觀行由平屋向平屋行由山窟向山窟行由洞穴向洞穴行由小屋向小屋行由重閣向重閣行由樓房向樓房行由圓屋向圓屋行由寶庫向寶庫行由集會所向集會所行由假屋向假屋行由樹下向樹下行或又諸比丘坐又於行之處而在其處比丘若一人自加為第二人若二人則成為第三人若三人則成為第四人於其處而多綺語王論賊論乃至三五七頁參照有無論等如斯亦是彷徨無彷徨者彼辟支佛遠離彷徨離離去出離棄遣離脫離縛以不限定心而住喜獨坐樂獨坐勤勵於內心之止奢摩他不輕視禪具備觀毘鉢舍那常赴空閉處為靜慮者而樂禪專注於一境重最上義此是眼下投無彷徨之義護諸根者彼辟支佛以眼見色已而無取相無取細相不防護此之眼根而住者可為貪憂諸惡善法所侵故為防護其眼根而彼行道護眼根至眼根之律儀以耳聞聲已以鼻嗅香已以舌嚐味已以觸所觸已以意識法已而無取相無取細相不防護此意根而住者可為貪憂諸惡不善法所侵故為彼意根之防護而彼行道護意根至意根之律儀此是護諸根之義守意者是護意守意此是護諸根守意之義無流漏而不燒之句中無流漏者即由尊者大目犍連如斯說友等我將示流漏之教說及無流漏之教說諦聽善作意我將說之唯諾友彼等諸比丘應諾大目犍連尊者大目犍連告曰友等有流漏者云何友等於此有比丘以眼見色已可愛之色喜此而信解不可愛之色不喜此而恚怒不現起身念以劣小心而住於其處彼生起諸惡不善法如實不知解無餘所滅彼心解脫慧解脫以耳聞聲已以鼻嗅香已以舌嚐味已以身觸所觸已以意識法已而可愛之色喜此而信觸不可愛之法不喜此而恚怒不現起身念以劣小心而住於其處彼生起諸惡不善法如實不知解無餘滅彼心解脫慧觸脫友等此比丘眼所識之色而有流漏於耳所識之聲而有流漏乃至言為於意所識之法而有流漏友等如斯有流漏而住之比丘若彼由眼近於惡魔惡魔得機會惡魔得所緣若彼由耳乃至若彼由意近於惡魔惡魔得機會惡魔得所緣譬如友等乾燥無水氣經年葦葺之家又有藁葺之家若由東方人持燃藁之炬火近於彼家火得機會火可得所緣若由西方於彼之家若由北方於彼之家若由南方於彼之家若由下方於彼之家若由上方於彼之家即由何處人持燃藁之炬火近之火得機會火可得所緣如斯友等如斯有流漏而住之比丘由眼若近彼惡魔惡魔得機會惡魔得所緣由耳若彼乃至由意若近彼惡魔惡魔得機會惡魔得所緣友等如斯住之比丘為色所打勝比丘不打勝於色比丘為所聲打勝比丘不打勝於聲比丘為香所打勝比丘不打勝於香比丘為味所打勝比丘不打勝於味比丘為觸所打勝比丘不打勝於觸比丘為法所打勝比丘不打勝於法友等此比丘言為為色所打勝為聲所打勝為香所打勝為味所打勝為觸所打勝為法所打勝彼由彼等諸煩惱所打勝有雜染齎再有有苦患有苦報齎未來之老死不為打勝諸惡不善法友等如斯是有流漏於次友等無流漏者云何友等於此有比丘以眼見色已可愛之色喜此而無信解不可愛之色亦為不喜而無恚怒以無量心而住如實知解於其處生起彼諸惡不善法無餘滅彼心解脫慧解脫以耳聞聲已乃至以意識法已可愛之法亦喜此而無信解不可愛之法亦不喜此而無恚怒以無量心而住如實知解於其處彼生起諸惡不善法無餘滅彼之心解脫慧解脫友等言此比丘於所識之色而無流漏於耳所識之聲而無流漏乃至於意所識之法而無流漏友等如斯有無流漏而住之比丘由眼若惡魔雖近於彼惡魔不得機會惡魔不得所緣由耳若於彼乃至由意若惡魔雖近於彼惡魔不得機會惡魔不得所緣譬如友等有以厚土堅塗之高樓閣若由東方人持能燃藁炬火而近於彼家火亦不得機會火不得所緣若由西方於彼家若由北方於彼家若由南方於彼家若由下方於彼家若由上方於彼家即由何處人持能燃藁炬火而近火亦不得機會火不得所緣如斯友等有無流漏而住之比丘由眼若雖惡魔近於彼惡魔不得機會惡魔不得所緣由耳若於彼乃至由意若雖惡魔近於彼惡魔不得機會惡魔不得所緣友等如斯住言為不色所打勝於比丘比丘是打勝於色聲不為打勝於比丘比丘是打勝於聲乃至法不為打勝於比丘比丘是打勝於法友等言此之比丘打勝於色打勝於聲打勝於香打勝於味打勝於觸打勝於法彼不為彼等諸煩惱打勝打勝有雜染齎再有有苦患有苦報齎來世之老死諸惡不善法友等如斯是無流漏火不燒者是於貪火不能燒於瞋火不能燒於癡火不能燒此是無流漏而火不燒之義應可獨行如犀角故彼辟支佛言眼向下投無彷徨護持諸根守制意無流漏而火不燒應可獨行如犀角三令葉斷除如晝度取除鬚髮世俗相著袈裟衣而出家應可獨行如犀角六四取除鬚髮世俗相之句中世俗相者是鬚髮乃至三四九頁參照長短之白衣等取除世俗相者是取除奪去息止此是取除鬚髮世間相之義令葉斷除如晝度樹譬如樹葉生茂蔭森晝度樹之落葉如斯彼辟支佛取除世俗相而完全是鉢衣之保持者此是令葉斷除如晝度樹之義著袈裟衣而出家彼辟支佛斷一切家居之障礙斷妻子之障礙斷親戚之障礙斷財寶之障礙剃除鬚髮纏袈裟衣由家非家而出家成為無一物之狀態而獨行行作動作活動護持持續維持持續此是著袈裟衣而出家之義應可獨行如犀角故彼辟支佛言令葉斷除如晝度取除鬚髮世俗相著袈裟衣而出家應可獨行如犀角三一不求諸味不動貪次第乞食不養他家家心無所結縛應可獨行如犀角六五不貪求諸味不動貪之句中諸味者是根味幹味皮味葉味花味果味酸甘苦辛鹹鹼收斂性澀美味不味冷熱於世間有貪求味之沙門婆羅門彼等以舌端徧求最高之味而徘徊彼等得酸味已而徧求不酸味得不酸味已而徧求酸味得甘味已而徧求不甘味得不甘味已而徧求甘味得苦味已而徧求不苦味得不苦味已而徧求苦味已得辛味而徧求不辛味已得不辛味而徧求辛味已得鹹味而徧求不鹹味已得不鹹味而徧求鹹味已得鹼味而徧求不鹼味已得不鹼味而徧求鹼味已得收斂性味而徧求澀味已得澀味而徧求收斂性味已得美味而徧求不味已得不味而徧求美味已得冷而徧求熱已得熱而徧求冷彼等已得各各之味而彼不滿足徧求他物之他者對諸味貪貪求貪覓昏昧縛著戀懸著礙著彼味愛彼辟支佛已捨斷根絕如截頂之多羅樹令之滅無於未來不生起者故彼辟支佛如理而省察不為戲不為憍慢不為裝飾不為莊嚴為存續此身體為維持為止害如斯我無古之苦痛不令生新之苦痛又我有存命無罪與安樂住為攝益梵行之限內攝食譬如於植林之限內燒林或又譬如於運搬貨物之限內注油於車輛或又譬如於度過難所沙漠之限內攝食子之肉彼辟支佛如理而省察不為戲不為憍慢不為裝飾不為莊嚴為存續此身體為維持為止害如斯我無舊之苦痛不令生新之苦痛又我為有存命無罪與安樂住為於攝益梵行之限內攝食由欲愛之遠離離離去出離棄遣離脫離縛以不限定之心而住此是不貪求諸味不動貪之義不動貪之句中動又動貪者是渴愛即所有貪染貪乃至一三頁參照貪欲貪不善根此之動動貪渴愛為彼辟支佛所捨斷所根絕如截頂之多羅樹成為滅無於未來不生起者故辟支佛是不動貪此是不貪求諸味不動貪之義次第乞食不養他之句中不養他者彼辟支佛只養自己不養他不養他有完全智漏盡真髓善住立令為唾棄過惡者彼言我為婆羅門此是不養他之義次第乞食者彼辟支佛於晨朝著內衣携鉢衣為行乞而入於村又街彼時彼護身護語護心令現起念防護諸根眼下投具足威儀由家向家而行過乞食而步履此是次第乞食不養他之義家家心無被結縛者是由二行相而心被結縛即一貶自己高揚他人而心被結縛又二高揚自己貶下他人而心被結縛一貶下自己高揚他人而心被結縛者云何言卿等是我大饒益者我依卿等而他之人人亦與我又製作與獲得所思惟之衣服食物臥坐所病者之資具藥品依於卿等為與卿等相識請父母付我以前之姓名消失我至於被知為某氏貴氏之所護者某女貴女之所護者如斯是貶下自己高揚他人而心被結縛二高揚自己貶下他人而心被結縛者云何言我為卿等之大饒益者卿等由我而歸依佛歸依法歸依僧由於我而離殺生離偷盜離邪欲行離妄語離穀酒果酒等放逸原因之酒我向卿等亦告教總說聖典徧問義疏戒布薩亦決心新業然卿等捨去我而恭敬他之人人尊重供養敬重如斯是高揚自己貶下他人而心被結縛於家家心無被結縛者是彼辟支佛由施主家之障礙而心不被結縛由眾之障礙而心不被結縛由住居之障礙而心不被結縛由衣服之障礙而心不被結縛由食物之障礙而心不被結縛由臥坐所之障礙而心不被結縛由病者之資具藥品而心不被結縛此是於家家心無被結縛之義應可獨行如犀角故彼辟支佛言不求諸味不動貪次第乞食不養他家家心無被結縛應可獨行如犀角三一初禪捨斷心五蓋除卻一切隨煩惱斷貪瞋恚無依止應可獨行如犀角六六初禪捨斷心五蓋者是彼辟支佛捨斷欲蓋貪捨斷除去滅除令之滅無捨瞋恚蓋昏沈睡眠蓋掉舉惡作蓋疑蓋捨斷除去滅除令之滅無離諸欲離不善法有尋有伺由離能生樂與喜具足初禪而住此是初禪捨斷心五蓋之義除卻一切隨煩惱之句中貪是心之隨煩惱瞋是心之隨煩惱癡是心之隨煩惱分恨乃至四頁參照一切不善行是心之隨煩惱除卻一切隨煩惱者是除卻心之一切隨煩惱除斥捨斷除去滅除令之滅無此是除卻一切隨煩惱之義斷貪瞋恚無依止之句中無依止者是依止愛依與見依之二依乃至四頁參照此是愛依乃至四頁參照此是見依貪愛者是愛貪愛與見貪愛之二貪愛乃至四頁參照此是愛貪愛乃至四頁參照此是見貪愛瞋恚者是所有心之瞋害瞋恨瞋恚違逆怒激怒大激怒瞋激瞋心之大激瞋恚意之激瞋忿忿怒忿怒性瞋瞋怒瞋怒性恚恚怒恚怒性違背違逆憤怒憤慨心之不快斷貪瞋恚無依止者是彼辟支佛斷愛貪愛與見貪愛與瞋恚斷絕正斷捨斷除去減除令之滅無不依止於眼不依止於耳乃至一七七頁參照不依止於可見聞覺識之諸法不繫著不近著不縛著不信解出離棄遣離脫離縛以不限定心而住此是斷貪瞋恚無依止之義應可如犀角獨行遊故彼辟支佛言初禪捨斷心五蓋除卻一切隨煩惱斷貪瞋恚無依止應可獨行如犀角三二豫樂與苦令離去除二三禪喜與憂四禪清淨得捨止應可獨行如犀角六七豫樂與苦令離去除二三禪喜與憂彼辟支佛捨斷樂捨斷苦令滅沒喜憂故由捨而不苦不樂念之清淨具足第四禪而住此是豫樂與苦令離去除之義四禪清淨得捨止之句中捨者是於第四禪所有捨放捨捨置心平等性心安息心之中庸止奢摩他者是心之止住住立均衡不散亂不亂意止定根定力正定於第四禪捨與止淨清淨徧白無穢離隨煩惱柔軟適業達住立而不動清淨得捨止者是於第四禪得獲捨與止此是四禪清淨得捨止之義應可獨行如犀角故彼辟支佛言豫樂與苦令離去除二三禪喜與憂四禪清淨得捨止應可獨行如犀角三四精勤為達第一義無沈滯心無懈怠有固努力具勢力應可獨行如犀角六八精勤為達第一義之句中第一義者是不死涅槃即所有彼一切行之止一切依之捨遣渴愛之盡滅離貪滅涅槃為達第一義者為得獲得得達觸達作證精勤而住即捨斷諸不善法成就諸善法而對諸善法有力勢有堅固發動不放捨重擔責任此是精勤為達第一義之義無沈滯心無懈怠者彼辟支佛未起諸惡不善法為不欲生起而精進勵精進策勵心精勤為捨斷已起之諸惡不善法而精進勵精進策勵心精勤已起諸善法之持續不逸失增大廣大修習圓滿而精進勵精進策勵心精勤如斯是無沈滯心無懈怠之義或又雖寧皮與腱與骨乾盡依堅固之力勢依堅固之力依堅固勇猛而不得可能得者我則不令精進停止策勵心精勤如斯亦是無沈滯心無懈怠之義策勵心精勤無取而由諸漏至我心解脫止我則不解此結跏趺坐如斯亦是無沈滯心無懈怠之義愛箭不能拔我不食不飲不外出精舍又不橫脇臥是策勵心精勤如斯亦是無沈滯心無懈怠之行為之義由諸漏無取我心未解脫之間我不起此座以策勵心精勤如斯亦是無沈滯心無懈怠之行為之義無取而由諸漏我心未解之間我不下經行處不外出精舍不外出片屋頂家不外出臺觀不外出平屋不外出山窟不外出洞穴不外出小屋不外出重閣不外出樓房不外出圓屋不外出寶庫不外出集會不外出假屋不外出樹下而策勵心精勤如斯亦是無沈滯心無懈怠之義於此晨朝時我將取得聖法正得證達觸達作證策勵心精勤如斯亦是無沈滯心無懈怠之義於此正午時於日暮時於食前於食後於中夜於中夜於後夜於新月於滿月於兩期於冬期於夏期於青年期於中年期於老年期我將取得聖法正得證達觸達作證以策勵心精勤如斯亦是無沈滯心無懈怠之行為之義有固努力具勢力之句中有固努力者彼辟支佛對諸善法已堅固受持身善行語善行意善行施物之頒與戒之受持布薩之遂行向母之孝養向父之孝養向沙門之供養向婆羅門之供養家長之敬重對其他各各之增上善法已確固受持此是有固努力之義具勢力者是彼辟支佛具勢力精進與發勤正具達正達成正成具備此是有固努力具勢力之義應可獨行如犀角故彼辟支佛言精勤為達第一義無沈滯心無懈怠有固努力具勢力應可獨行如犀角三五獨坐與禪無遣事常於諸法行隨法思惟諸有之過患應可獨行如犀角六九獨坐與禪無遣事彼辟支佛喜獨坐樂獨坐勤勵內心之止奢摩他不怠禪不遣禪即為未起初禪之生起而行加行正行熱心專心為未起第二禪未起第三禪未起第四禪之生起而行加行正行熱心專心如斯是無遣禪事或又習行已起之初禪修習多作習行已起第二禪已起第三禪已起第四禪修習多作如斯無遣禪事此是獨坐與禪無遣事之義常於諸法行隨法之句中法者是四念處乃至八支聖道隨法者云何是正行道隨順之行道無害敵之行道隨義之行道法隨法之行道諸戒之完成諸根之守護對食之知量向警寤之努力念正知此等言隨法常於諸法行隨法者是於諸法常時常恒引續不絕逐次如水波之生不間斷無間而相續相接於食前於食後於初夜於中夜於後夜於新月於滿月於雨季於冬季於夏季於青年期於中年期於老年期行行作動作活動護持持續維持此是常於諸法行隨法之義思惟諸有之過患者乃一切行為無常以思惟諸有之過患一切行是苦一切法無我乃至一九頁以下參照所有集法皆是此滅法以思惟諸有之過患此是思惟諸有之過患之義應可獨行如犀角故彼辟支佛言獨坐與禪無遣事常於諸法行隨法思惟諸有之過患應可獨行如犀角三六求滅渴愛不放逸有聞有念非聾啞決定有勤察悟法應可獨行如犀角七求滅渴愛不放逸之句中渴愛者是色愛聲愛香愛味愛觸愛求滅渴愛不放逸者是欲求冀求熱望貪之盡滅瞋之盡滅癡之盡滅趣之盡滅生起之盡滅結生之盡滅有之盡滅輪迴之盡滅此是求滅渴望不放逸之義不放逸者彼辟支佛恭敬而作常而作乃至九四頁參照是對諸善法不放逸此是求滅渴愛不放逸之義有聞有念非聾啞之句中非聾啞者彼辟支佛是賢者具慧者覺慧者智者辨知者有慧者此是非聾啞之義有聞者彼辟支佛已多聞而持聞積聞即完全成而圓滿所徧知梵行之初善中善後善有義有文彼之諸法多聞憶持如斯諸法以語通曉以意觀察以見善通達此是有聞之義有念者是彼辟支佛有念具備第一念慧憶念隨念甚久以前所行之事甚久以前所語之事此是有聞有念非聾啞之義決定有勤察悟法之句中法之察悟者是智即所有慧知觸乃至一八頁參照不癡擇法正見察悟法者是彼辟支佛察悟法知法考量法度知法辨知法辨別法即一切行是無常乃至一九頁以下參照所有集法皆是此滅法而察悟法知法考量法度知法辨知法辨別法或又彼辟支佛已蘊之察悟界之察悟處之察悟趣之察悟生起之察悟結生之察悟有之察悟輪迴之察悟輪轉之察悟或又辟支佛在蘊之終邊在界之終邊在處之終邊在趣之終邊在生起之終邊在結生之終邊在有之終邊在輪迴之終邊在輪轉之終邊在最後有在最後之身體在最後之持身者是辟支佛此是彼之最後有此乃最終之身體最後生老死輪迴於彼無有再有事此是察悟法決定之句中決定者是四聖道具備四聖道者是決定即由聖道而達決定正達觸達作證此是決定之義有勤之句中勤者是精進即所有心之勤精進勇勤發勤勇猛努力力勢堅固緊張發勤不棄欲不棄重擔重擔堅持精進精進根精進力正精進彼辟支佛具此之勤正具達正達成正成具備故辟佛是有勤此是決定有勤察悟法之義應可獨行如犀角故彼辟支佛言求滅渴愛不放逸有聞有念非聾啞決定有勤察悟法應可獨行如犀角三七師子諸聲不戰慄如同諸風不著網如蓮不塗著於水應可獨行如犀角七一師子諸聲不戰慄者是譬如獸王之師子不戰慄於諸聲不戰駭不駭怖不悚懼不慴不駭不恐怖不動轉不駭怖不逃走辟支佛亦對諸聲不戰慄不戰駭不駭怖不悚懼不慴不駭不恐怖不動轉不駭怖不逃走捨斷怖畏恐怖離去身毛豎立而住此是師子諸聲不戰慄之義如同諸風不著網之句中風者是東風西風北風南風有塵風寒風熱風微風烈風黑風颱風毘嵐風翼風金翅鳥風多羅葉扇風扇風網者是絲之網譬如風不著網不執不縛不結縛如斯有愛網與見網之二網乃至四頁參照此是愛網乃至四頁參照此是見網於彼辟支佛已愛網之捨斷見網之捨遣愛網之捨斷故見網之捨遣故彼辟支佛不著於色不著於聲乃至一七七頁參照不著於可見聞覺識諸法不執不縛不結縛出離棄遣離脫離縛以不限定之心而住此是如同諸風不著網之義如蓮不塗著於水之句中蓮者是蓮華水者是水也譬如蓮華不著於水不著不染著如斯有愛著與見著之二著乃至四頁參照此是愛著乃至四頁參照此是見著於彼辟支佛已愛著之捨斷見著之捨遣愛著之捨斷故見著之捨遣故彼辟支佛不著於色不著於聲乃至一七七頁參照不著於可見聞覺識諸法不染著不著不染著出離遣離脫離縛彼等以不限定心而住此是如蓮不塗著於水之義應可獨行如犀角故彼辟支佛言師子諸聲不戰慄如同諸風不著網如蓮不塗著於水應可獨行如犀角三八師子牙強百獸王克服而行制壓他受用邊境臥坐所應可獨行如犀角七三師子牙強百獸王克服而行制壓者是譬如牙齒強以齒牙為武器百獸王之師子克服一切之畜生生物而打勝打超奪去粉碎而行行作動作活動獲得持續維持此是師子牙強百獸王克服而行制壓之義受用邊境臥坐所者是譬如百獸之王師子深入於林野森林而行行作活動護持持續維持如斯辟支佛亦於林野森林之邊鄙無人聲無騷音無人人之境況隱人而住於禪思受用適當之臥坐所彼獨行獨立獨坐獨臥獨入於村行乞獨由行乞歸獨密坐禪獨為經行獨行行作動作活動護持持續維持此是受用邊境臥坐所之義應可獨行如犀角故彼辟支佛言師子牙強百獸王克服而行制壓他受用邊境臥坐所應可獨行如犀角三九慈捨悲喜四無量時時解脫且習行無違背諸世間事應可獨行如犀角七三慈捨悲喜時時解脫且習行者彼辟支佛以慈俱之心令一方徧滿而住同樣於第二方同樣於第三方同樣於第四方如斯於上於下於橫於一切處於含一切有情之世界自己一切見為廣大偉大無量無怨恨無瞋惱令徧滿慈俱心而住以悲俱之心以喜俱之心以捨俱之心令徧一方而住同樣於第二方同樣於第三方同於第四方如斯於上於下於橫於一切處含一切有情之世界自己一切見為廣大偉大無量無怨恨無瞋惱而令捨俱之心而住此是慈捨悲喜之時時解脫習行之義無違背於一切世間者已修習慈等故而於東方之有情一切無厭逆於西方之有情一切無厭逆於南方之有情一切無厭逆於北方之有情一切無厭逆於東隅之有情一切無厭逆於西隅之有情一切無厭逆於南隅之有情一切無厭逆於北隅之有情一切無厭逆於下方之有情一切無厭逆於上方之有情一切無厭逆於四方四維之有情一切無厭逆無違背於一切世間者無違背於一切有情世間無違逆無衝突無害破此是無違背於一切世間之義應可獨行如犀角故彼辟支佛言慈捨悲喜四無量時時解脫且習行無違背諸世間事應可獨行如犀角四捨斷貪與瞋與癡裂破滅除諸之結生命滅盡不戰慄應可獨行如犀角七四捨斷貪與瞋與癡之句中貪者是所有貪染貪乃至一三頁參照貪欲貪不善根瞋者是所有心之瞋害乃至三九七頁參照是憤怒憤慨心之不快癡者是對於苦無智乃至一二頁參照是無明閂不善根捨斷貪與瞋與癡彼辟支佛捨貪與瞋與癡捨斷除去滅除令之滅無此是捨斷貪與瞋與癡之義裂破滅除諸之結之句中諸之結者是欲貪結瞋恚結乃至三七六頁參照無明結之十結裂破滅除諸之結裂破諸結裂引裂捨斷除去滅除令之滅無此是裂破滅除諸之結之義生命滅盡不戰慄彼辟支佛對生命之終滅亦不戰慄不戰駭不駭怖不悚懶不慴不駭不恐怖不動轉不駭怖不逃走捨斷怖畏恐怖離去身毛豎立此是生命滅盡不戰慄之義應可獨行如犀角故彼辟支佛言捨斷貪與瞋與癡裂破滅除諸之結生命滅盡不戰慄應可獨行如犀角四一人人為利親交他無所得友今難得不淨人人為己慧應可獨行如犀角七五為利親交為自利者是為他利為俱利為現世之利為來世之利為第一義之利人人親於他親近交親交此是為利親交之義無所得友今難得之句中友者有二種之友即在家之友與非家之友乃至三三頁參照此是在家之友乃至三三頁參照此是非家之友無所得友今難得者是無以利己為因無以利己為緣無所得此等二種友之難得此是無所得友今難得之義不淨人人為己慧之句中為己慧者為自己以自己之利益為因以自己之利益為緣以自己之利益為理由而親親近交交際親交行正行近侍問徧問此是為己慧之義不淨人人者是具備不淨之身業故為不淨人人具備不淨語業故為不淨人人具備不淨意業故為不淨人人具備不淨之殺生不淨之偷盜不淨之邪欲行不淨之妄語不淨之兩舌不淨之惡口不淨之綺語不淨之貪欲不淨之瞋恚不淨之邪見故為不淨人具備不淨思故為不淨人人具備不淨冀求故為不淨人人具備不淨願故為不淨劣賤劣下劣卑賤劣小為小人人此是不淨人人為己慧之義應可獨行如犀角之句中獨者乃至三一九頁以下參照可獨遊行者有行於八行乃至三二三頁以下參照此是應可獨行如犀角之義故彼辟支佛言人人為利親交他無所得友今難得不淨人人為己慧應可獨行如犀角犀角經之義釋畢阿耆多帝須彌勤富那迦與彌多求度多迦優波私婆難陀又與醯摩迦刀提耶劫波兩人賢者為闍都乾耳還有跋陀羅浮陀優陀耶與布沙羅莫伽羅闍有慧者及已有賓祇大仙此等共為十六人婆羅門教彼岸道以上義釋彼岸道乃至犀角經義釋義釋應知有二種彼已圓滿所善書
