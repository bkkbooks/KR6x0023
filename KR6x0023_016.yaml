body:
  text: 第十五莫伽羅闍學童所問之義釋一尊者莫伽羅闍曰釋迦佛我先二度問具眼者不為我解説及至第三回天仙為解説一一一六釋迦我先二度問者是彼婆羅門二回向佛世尊質問世尊於彼質問而不為解説而思考於其直後此婆羅門之根成熟釋迦者是世尊由釋迦族出家故而為釋迦又或有富有者大富者具財者故亦為釋迦彼有此等諸財所謂信財戒財慚財愧財聞財捨財慧財念處財神足財根財力財覺支財道財果財涅槃財由此等多數之財寶而為富者大富者具財者故亦為釋迦又或為可能者有能者有力者有用者勇者英雄戰士無怖者無懼者無駭者無敗去者怖畏恐怖之捨斷者身毛豎立之離去者故亦為釋迦問者釋迦我二度問乞求信樂此是釋迦我先二度問之義尊者莫伽羅闍曰之句中曰者是句之接續尊者是敬語莫伽羅闍者是彼婆羅門之名乃至一頁參照稱呼此是尊者莫伽羅闍曰之義具眼者不為我解説已不為我解説不言不示不施設不確立不開顯不分別不顯示不説明具眼者是世尊由五眼而為具眼者即一由肉眼為具眼者二由天眼為具眼者三由慧眼為具眼者四由佛眼為具眼者五由普眼為具眼者一世尊由肉眼為具眼者云何於世尊之肉眼存在青色黃色赤色黑色白色之五色於此有眼毛而青如烏摩羅華美麗紺碧彼之眼毛之根元如黃羯尼迦華美麗正黃之黃金色世尊之兩眼球赤如赤色甲蟲美麗深紅其中央黑如濡濕之木槵子美麗不粗濕潤之漆黑彼之深奧白如明星太白金星美麗淨白白銀白世尊屬於身體之宿世善行業而生起彼自然肉眼於日中夜中亦普見一由旬三四里具備四支有暗黑之時亦即太陽沒於黑份新月之布薩時於鬱茂密林中出現大非時之雨雲如斯具備四支於暗黑之中亦普見一由旬對於見色彼之屋頂門戶壁柵山嶽林藪蔓藤不為障礙假令一粒之胡麻置在數百粒胡麻之中亦可取出彼之胡麻粒如斯世尊之肉眼原來是遍淨如斯世尊由肉眼而為具眼者二世尊由天眼為具眼者云何世尊以超人之眼為清淨天眼見諸有情之有死生知諸有情隨業而趣於劣勝美醜幸與不幸即汝等此等之有情具身惡行具語惡行具意惡行誹謗諸聖者有邪見取得邪見業彼等身壞死後生於苦界惡趣墮處地獄或又汝等此等之有情具身善行具語善行具意善行不誹謗諸聖者有正行取得正見業彼等身壞死後生善趣天界如斯以超人清淨天眼見諸有情之死生知隨諸有情之業而趣於劣勝美醜幸與不幸又世尊如願意者亦見一世界亦見二世界亦見三世界亦見四世界亦見五世界亦見十世界亦見二十世界亦見三十世界亦見四十世界亦見五十世界亦見一小千世界亦見二中千世界亦見三千大千世界或又只要願意亦可見其他者如斯世尊之天眼是遍淨如斯世尊由為具眼者三世尊由慧眼為明眼者云何世尊是大慧者博慧者疾慧者速慧者利慧者擇慧者於慧分別善巧而有明了智證得無礙解達於四無畏是十力之保持者人牡牛人師子人龍人良馬人軛獸無邊智者無邊威力者無邊名聲者富者大財者有財者指導者調伏者教導者令知者令解者令觀者令信樂者彼世尊實是未起之道令起者未生之道令生者未説之道宣説者知道者解道者達道者又現今隨從道之彼諸弟子倣世尊而具備諸德而住彼世尊實知應知之物見應見之物眼者智者法者梵天者告示者告説者義之將來者不死之施與者法主如來者也彼世尊無有由慧而不能知者不能見者不能解者不能作證者不能觸者經過去未來現在一切諸法由一切行相而現來於佛世尊之智門如有所有應知應所知之物無論其自義他義俱義現世之義來世之義明白之義甚深之義隱密之義覆蔽之義未了之義已了之義無罪之義無煩惱之義淨白之義第一義其一切作用於佛智之中一切之身業隨佛世尊之智而起一切之語業隨佛智而起一切之意業隨佛智而起關於過去於佛世尊無有障害智關於未來於佛世尊無有障害智關於現在於佛世尊無有障害智限於應知之物一切是佛智限於有佛智一切是應知之物佛智以應知之物為限界應知之物以佛智為限界超越應知之物無佛智之作用超越佛智無有應知之義彼等智與可知諸法相互同在一限界譬如在於正相合致之函與蓋之二者函對蓋無餘蓋對函無餘相互同在一限界如斯於佛世尊應知之物與智相互同在一限界應知限度之物一切是佛智有佛智限度一切是應知之物佛智以知之物為限界超越應知之物而無佛智之作用超越佛智無有應知之物彼等諸法相互同在一限界佛世尊智之作用於一切諸法一切諸法關係於佛世尊之意門轉心關係於意欲速行心關係於作意關係於心之生起佛世尊智之作用對於一切有情世尊知一切有情之意樂知隨眠知所作知信解了知小塵垢大塵垢利根鈍根善行相惡行相易教化難教化能不能之有情含天含魔含梵天之世界及含沙門婆羅門含天人之人人於佛智之中而活動譬如任何之魚龜乃至吞舟之大魚為止在大海中而活動如斯含天含魔含梵天之世界及含沙門婆羅門含天人之人人亦在佛智中而活動譬如任何之鳥乃至金翅鳥為止在虛空之方域而活動如斯等於舍利弗有慧之人人亦一切在佛智之方域而活動佛智遍滿天與人之慧而勝於彼所有賢剎帝利賢婆羅門賢居士賢沙門之聰敏而長於議論亦以射貫毛髮程度之練達以慧解能摧破他之諸惡見而行之人人頻為質問而接近如來質問隱密覆蔽之義而彼等之質問由世尊而解説解答而彼解答之理由説示而至彼等歸投於世尊如斯於茲世尊所謂由慧而極耀如斯世尊由慧眼而為具眼者四世尊由佛眼為具眼者云何世尊以佛眼眺世間見諸有情之小塵垢大塵垢利根鈍根善行相惡行相易教化難教化或又見來世罪之怖畏而見住者譬如於青蓮之池紅蓮之池白蓮之池一部之青蓮紅蓮白蓮在水中生在水中生長尚未由水中出沒在水中而發育一部之青蓮紅蓮白蓮在水中生在水中生長而在水面之所一部之青蓮紅蓮白蓮在水中生在水中生長由水出不染著於水如斯世尊以佛眼眺世間見諸有情之小塵垢大塵垢利根鈍根善行相惡行相易教化難教化或又見來世罪之怖畏而見住者世尊知此者是貪行者此是瞋行者此是癡行者此是尋行者此是信行者此是智行者世尊對貪行者説不淨説世尊對瞋行者告慈修習世尊對癡行者總説聖典與遍問義釋為時使聽法時使語法使與師共住世尊對尋行者告安般念數息觀世尊對信行者應信樂之相即告以佛之善覺法之善法性僧之善行道及自己之戒世尊對智行者告以無常相苦相無我相之如觀毗鉢舍耶之相譬如山巔站立者普見下界諸人人又如彼之善慧者升法所成之殿堂打敗生老普眼者瞰視沈愁世間人如斯世尊由佛眼而為具眼者五世尊由普眼為具眼者云何普眼者為一切知智世尊具一切知智正具達正達成正成具備彼所不見者此世無何物又不識之物無可知之物應知皆知通如來故普眼如斯世尊由普眼為具眼者此是具眼者不為我解説之義及至第三回天仙為解説及至第三回佛被正當之質問而解説不與拒絶斯我把持斯我保持斯我為觀察天仙者世尊是天而且是仙人故為天仙譬如王之出家者言王仙婆羅門之出家者言婆羅門仙斯世尊是天而且是仙人故為天仙或又世尊是出家者故亦為仙求覓求遍求大戒蘊故亦為仙求者求覓求遍求大定蘊大慧蘊大解脫蘊大解脫智見蘊故亦為仙求覓求遍求大暗身之摧破大顛倒之破壞大愛箭之拔除大見葛藤之開解大慢幢之撤去大行作之寂滅大暴流之度越大重擔之放下大輪回輪轉之斷絶大熱苦之消滅大熱惱之安息大法幢之舉揚故亦為仙求覓求遍求大念處大正勤大神足大根大力大覺支大八支聖道大第一義不死涅槃故亦為仙求覓求遍求有大權勢諸有情佛者何處耶世尊者何處耶天中天者何處耶故亦為仙此及至第三回天仙為解説之義故彼之婆羅門言尊者莫伽羅闍曰釋迦佛我先二度問具眼者不為我解説及至第三回天仙為解説二此世界與他世界含諸天之梵天界有名聲尊師瞿曇之見乃不知通也一一一七此世界與他世界之句中此世界者是人世界他世界者除人世界之其他一切世界此是此世界與他世界含諸天之梵天界者是含天含魔之梵天界亦含沙門婆羅門含天人之人人此是含諸天之梵天界尊師之見不知通者世間之人人不知尊師之見忍意欲持説意樂意圖即不知不見不觀不得達不存不獲得此人之斯見斯忍者斯意者斯持説者斯意樂者斯意圖者此是尊師之見不知通之義有名聲瞿曇者世尊得名聲故有名聲或者世尊被恭敬尊重尊敬奉事敬重得衣服食物臥坐所病者之資具藥品此是有名聲瞿曇故彼婆羅門言此世界與他世界含諸天之梵天界有名聲尊師瞿曇之見乃不知通也三如斯優異之見者我已前來欲將問如何觀察世間者死王無有見彼事一一一八如斯優異之見者如斯優異之見者最高之見者最勝之見者最殊勝之見者秀逸之見者最上之見者勝妙之見者此是如斯優異之見者之義我已前來欲將問我已前來欲質問乃至四七頁參照説示得語如斯亦是我已前來欲將問之義如何觀察世間者以如何觀察觀見考量度知辨知明暸者此是如何觀察世間者死王無有見彼事者乃死王不見耶不覩耶不得達耶無所有耶不獲得耶此是死王無有見彼事之義故彼婆羅門言如斯優異之見者我已前來欲將問如何觀察世間者死王無有見彼事四莫伽羅闍常有念害破自我之諸見世間空也須觀察如斯可度死神關如斯觀察世間者死王無有見彼事一一一九世間空也須觀察之句中世間者是地獄世間畜生世間餓鬼世間人世間天世間蘊世間界世間處世間此世間他世間梵世間天世間有一比丘白世尊言尊師示世尊宣世間世間尊師如何意義而言為世間耶比丘破壞故言為世間然則何者是破壞耶乃眼破壞色破壞眼識破壞眼觸破壞緣於眼觸所生起樂苦又不苦不樂之受亦破壞耳破壞聲破壞鼻破壞香破壞舌破壞味破壞身破壞觸破壞意破壞法破壞意識破壞意觸破壞緣於意觸所生起樂苦又不苦不樂之受亦破壞比丘破壞故言為世間世間空也須觀察者是由二行相觀察世間是空即一由不自在之正察又二由空無行之正觀一由不自在之正察而觀察世間空無者云何於色中不得自在於受中不得自在於想中不得自在於行中不得自在於識中不得自在即世尊曾如斯説諸比丘色是無我諸比丘若色是我者此色可不至於病又於色可得謂我色有斯我色勿有斯然諸比丘色是無我故色至於病又於色不得謂我色有斯我色勿有斯受是無我諸比丘若受是我此受可不至於病又於受可得謂我受有斯我受勿有斯然諸比丘受是無我故受至於病又於受不得謂我受有斯我受勿有斯想是無我諸比丘若想是我者此想可不至於病又於想可得謂我想有斯我想勿有斯然諸比丘想是無我故想至於病又於想不得謂我想有斯我想勿有斯行是無我諸比丘若行是我者此行可不至於病又於行可得謂我行有斯我行勿有斯然諸比丘行是無我故行至於病又於行不得謂我行有斯我行勿有斯識是無我諸比丘若識是我者此識可不至於病又於識可得謂我識有斯我識勿有斯然諸比丘識是無我故識至於病又於識不得謂我識有斯我識勿有斯又世尊如斯説諸比丘此身不成汝等之物又不為他人之物諸比丘此可見由先業所行作意思感受之物諸比丘於此有聞博識之聖弟子善緣起如理作意即此有時故此有此生故此生無此時故無此此滅故此滅緣無明而有行緣行而有識緣識而有名色緣名色而有六處緣六處而有觸緣觸而有受緣受而有愛緣愛而有取緣取而有有緣有而有生緣生而有生老死愁悲苦憂惱如斯有此一切苦蘊之集然無明之無餘滅故而行之滅行滅故而識滅識滅故而名色滅名色滅故而六處滅六處滅故而觸滅觸滅故而受滅受滅故而愛滅愛滅故而取滅取滅故而有滅有滅故而生滅生滅故而老死愁悲苦憂惱滅如斯有此一切苦蘊之滅如斯由不自在之正察而觀察世間空二由空無行之正觀而觀察世間空者云何於色中不得堅實於受中不得堅實於想中不得堅實於行中不得堅實於識中不得堅實色由常堅實而無堅實故由樂堅實而無堅實故由我堅實而無堅實故常恆不常恆故不不變易法故不堅實而非堅實以離堅實也受不堅實而非堅實以離堅實想不堅實而非堅實以離堅實行不堅實而非堅實以離堅實識由常堅實而無堅實故由樂堅實而無堅實故由我堅實而無堅實故常恆不常恆故不不變易法故不堅實而非堅實以離堅實譬如葦中空而不堅實不堅實髓以離堅實也譬如伊蘭無堅實之髓以離堅實譬如白花之藪不堅實不堅實以離堅實譬如肉色花樹不堅實不堅實以離堅實譬如泡沫不堅實不堅實以離堅實譬如水泡不堅實不堅實以離堅實譬如陽炎不堅實不堅實以離堅實譬如芭蕉之幹不堅實不堅實以離堅實譬如幻術不堅實不堅實以離堅實如斯色由常堅實而無堅實故由樂堅實而無堅實故由我堅實而無堅實故常恆不常恆故不不變易法故不堅實而非堅實以離堅實受不堅實而非堅實以離堅實想不堅實而非堅實以離堅實行不堅實而非堅實以離堅實識由常堅實而無堅實故由樂堅實而無堅實故由我堅實而無堅實故常恆不常恆故而不不變易法故不堅實而非堅實以離堅實如斯由空無行之正觀而觀察世間空由此等二行相而觀察世間空又由六行相而觀察世間空即觀察色一無主二無欲作三無樂決定四無自在五他六種種別離觀察受想行識無主無欲作無樂決定無自在他種種如斯由六行相而觀察世間空又由十行相而觀察世間空即觀察色一是絶無二是空無三是空四是無我五是無堅實六是殺戮者七是非有八是痛根九是有漏十是有為觀察受想行識是絶無空無空無我無堅實殺戮者非有痛根有漏有為如斯由十行相而觀察世間空又由十二行相而觀察世間空即觀察色一非有情二非命者三非人士四非人五非摩奴之子六非女人七非男子八非我九非我所十非我十一非我之物十二任何者亦非觀察受想行識非有情非命者非人士非人非摩奴之子非女人非男子非我非我所非我非我之物任何者亦非如斯由十二行相而觀察世間空又世尊如斯説諸比丘非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘然非汝等之物者何耶諸比丘色非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘受非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘想非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘行非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘識非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘汝等云何思惟此耶於此之祗樹園所有草薪木樹枝樹葉為人人持去燃燒又從於用途而應用然時汝等將斯思念人人持去我等燃燒又從於用途而用耶尊師不然其何因耶尊師此是非我非我所諸比丘如斯非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘然非汝等之物者何耶諸比丘色非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂諸比丘受想行識非汝等之物須捨斷之其捨斷者是汝等長時之利益安樂如斯而亦觀察世間空尊者阿難白世尊言尊師言世間空世間空尊師何故言世間空耶阿難我我所亦空故言世間空阿難我我所亦空者云何阿難眼是空色是空眼識是空眼觸是空由眼觸所生起樂苦又不樂不苦之受亦是此我我所無故是空耳是空聲是空鼻是空香是空舌是空味是空身是空所觸是空意是空法是空意識是空意觸是空由意觸所生起樂苦又不苦不樂之受亦是此我我所無故亦是空阿難我我所空故言世間是空如斯觀察世間空單法之生起持續單諸行有如實觀者村長無怖畏世等草薪木於以慧觀時除不結生涅槃何物不冀求如斯亦是觀察世間空又世尊如斯説如斯諸比丘有比丘至色之究極追求色至受之究極追求受至想之究極追求想至行之究極追求行至識之究極追求識至色之究極追求色之彼至受之究極追求受之彼至想之究極追求想之彼至行之究極追求行之彼至識之究極追求識之彼人言我或我物或有我者是無所有如斯亦是觀察世間空世間空也須觀察須觀察世間空須觀見考量度知辨知明暸此是世間空也須觀察之義莫伽羅闍常有念之句中莫伽羅闍世尊呼彼婆羅門之名常者是於一切時乃至三八頁參照於老年期有念者是由四行相而有念即對身修習身隨觀念處而有念乃至三八頁參照言彼有念此是莫伽羅闍常有念之義害破自我之見之句中自我之見者有二十事之有身見即於此無聞之凡夫不見諸聖不熟達聖法不於聖法中受教導不見諸善人不熟達善人法不於善人法中受教導一觀色是我二觀我有色三觀我中有色四觀色中有我五八受九十二想十三十六行十七觀識是我十八觀我有識十九觀我中有識二十觀識中有我所有如斯類之見惡見見執見難所見曲邪見異動見結執執取住著取邪道邪路邪性異學處邪倒執違邪執顛倒執邪執對不如實為如實執乃至為六十二惡見此是自我之見害破自我之見者乃破自我之見害破取去取除壞捨斷除去滅除令之滅無此是害破自我之見之義如斯可度死者如斯可度死神亦可度老度死越度超越離越此是如斯可度死之義如斯觀察世間者是如斯觀察世間觀見考量度知辨知明暸者此是如斯觀察世間者之義死王無有見彼事之句中魔亦是死王死亦死王無見彼事者不見死王不覩不得達無所有無獲得即世尊如斯説諸比丘譬如有林野之鹿遊於林野山林安心而行安心而立安心而坐安心而臥其何因耶諸比丘乃不至獵師之眼如斯諸比丘有比丘離諸欲離諸不善法有尋有伺由離生喜樂具足初禪而住諸比丘此比丘言魔是盲目魔眼完全亡失波旬至不見更又諸比丘有比丘尋伺寂滅故而內之淨心之專一性無尋無伺由定生喜樂第二禪第三禪具足第四禪而住諸比丘此比丘言魔是盲目魔眼完全亡失波旬至不見更又諸比丘有比丘普遍超越色想滅沒有對想不作意種種想謂虛空無邊具足空無邊處而住諸比丘此比丘言魔是盲目魔眼完全亡失波旬至不見更又諸比丘有比丘普遍超越空無邊處謂識無邊處具足識無邊處而住普遍超越識無邊處謂無何物具足無所有處而住普遍超越無所有處具足非想非非想處而住普遍超越非想非非想處具足想受滅而住又以慧見彼諸漏已盡滅諸比丘此比丘言魔是盲目魔眼完全亡失波旬至不見已度世間之愛著彼安心而行安心而立安心而坐安心而臥其何因耶諸比丘不至惡魔之眼此是死王無有見彼事之義故世尊宣莫伽羅闍常有念害破自我之諸見世間空也須觀察如斯可度死神關如斯觀察世間者死王無有見彼事偈終否乃至三二頁參照尊師世尊是我師我是弟子而坐莫伽羅闍學童所問之義釋第十五畢
