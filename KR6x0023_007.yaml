body:
  text: 第六優波私婆學童所問之義釋一尊者優波私婆曰釋迦佛我獨無依止不能度於大暴流普眼者請語所緣依彼可度此暴流一六九釋迦我獨大暴流之句中獨大暴流者是依止於彼人又依止於彼法以度大欲流有流見流無明流越度度過超越所離越處之人究竟唯我一而無第二又斯法究竟唯我一而無第二此是獨之義釋迦者是世尊由釋迦族出家故是釋迦或又是富者大富者具財者故是釋迦彼有此等諸財所謂信財戒財慚財愧財聞財捨財慧財念處財神足財根財力財覺支財道財果財涅槃財由此等多數之財寶而是富者大富者具財者之故亦是釋迦或又可能者有能者權力者有用者勇者英雄戰士無怖者無懼者無駭者無敗走者怖畏恐怖之捨斷者身毛豎立之離去者故亦是釋迦此是釋迦我獨大暴流之義尊者優波私婆曰之句中曰斯者是句之接續尊者是敬語優波私婆是彼婆羅門之名乃至一頁參照稱呼此是尊者優波私婆曰之義無依止而不能度之句中無依止者不為依止於人又不依止於法不能者是力不及不能不堪度者是度大欲流有流見流無明流越度度過超越離越此是無依止而不能度之義普眼者請語所緣之句中請語所緣者請語所緣對象依止近依言示施設確立開顯分別顯示請說明此是請語所緣之義普眼者是言普眼一切知智世尊具一切知智正具達正達成正成具備在彼不能見之物此世亦無何物又無不能識之物亦無不可知之物可能知之物一切皆可知通旨此如斯之故如來是普眼者此是普眼者請語所緣之義依彼可度此暴流之句中依彼者是依止其人又依止其法可度此暴流者可度大欲流有流見流無明流可越度度過超越離越此是依彼可度此暴流之義故彼婆羅門言尊者優波私婆曰釋迦我獨無依止而不能度大暴流普眼者請語所緣依彼可度此暴流二世尊宣示優波私婆具念且觀無所有依無所有而非有捨欲離惑受滅盡晝夜觀察度暴流一七觀無所有具正念者彼婆羅門原來得無所有處定此是我之依止而不知彼之依止事世尊向彼告其無所有處是彼之依止更告以出路婆羅門由此入定於非想非非想處定由此出定且觀察於其際所生心心所法是無常又是苦是病是癰是箭是痛是惱是敵是毀是疾是禍是不快是怖畏是災患是動是壞是不恆是無救護所是無避難所是無歸依所是不歸依者是空缺是空虛是空是無我是過患是變易法是不堅實是痛根是殺戮者是非有是有漏是有為是魔食是生法是老法是病法是死法是愁悲苦憂惱法是雜染法是集是滅沒是不樂味是過患是不出離以且觀察眺望省思普觀具念之句中念者是所有念隨念想念乃至一八頁參照是正念此言為念具此之念正具達正達成正成令具備者言為具念者此是具念且觀無所有之義世尊宣示優波私婆之句中優波私婆是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同為施設者此是世尊宣示優波私婆之義謂非有依無所有處度暴流之句中一切謂非有是無所有處定由何謂一切非有是無所有處定耶於識無邊處定有念而入定由此出定彼識令無令為非有令消滅而觀一切非有由此一切謂非有是無所有處定依其無所有處定近依所緣對象此而度欲流有流見流無明流須越度度過超越離越此是謂非有度暴流之義捨斷諸欲離疑惑之句中欲者若概言之是事欲與煩惱欲之二欲乃至二七頁參照言此等為事欲乃至二八頁參照言此等為煩惱欲捨斷諸欲者是遍知事欲捨煩惱欲捨斷除去滅除令之滅無此是捨斷諸欲之義離惑之句中言疑為疑惑即對於苦猶豫乃至一五頁參照為遠離疑惑離離去出離棄遣離脫離縛以不限定心而住如斯是離惑之義或又離三十二之無用論離離去出離棄遣離脫離縛以不限定心而住如斯亦是離惑論之義此是捨斷諸欲離疑惑之義晝夜觀察渴愛滅之句中渴愛者是色愛聲愛香愛味愛觸愛法愛夜者是夜晝者是日中觀晝夜渴愛之盡滅輪回之盡滅輪轉之盡滅觀察見眺省思普觀此是晝夜觀察渴愛滅之義故世尊宣示世尊宣示優波私婆具念且觀無所有依無所有而非有捨欲離惑愛滅盡晝夜觀察度暴流三尊者優波私婆曰一切諸欲於離貪捨他依止無所有第一有想解脫信彼不退住立其處一七一一切諸欲於離貪之句中一切者是普一切一切之一切無殘無餘此是一切於諸欲者欲者若概言之是事欲與煩惱欲之二欲乃至二七頁參照言此等為事欲乃至二八頁參照言此等為煩惱欲一切諸欲於離貪者於一切諸欲離貪棄貪唾棄貪脫貪捨斷貪捨遣貪能鎮伏所貪此是一切諸欲於離貪之義尊者優波私婆曰之句中曰斯者是句之接續尊者是敬語優波私婆者是彼婆羅門之名乃至一頁參照稱呼依止無所有而捨他捨下之六定四禪定及下二無色定遣遍捨越超越離越而依止無所有處定止著繫著近著縛著信解此是捨他依止無所有之義信第一有想解脫之句中有想解脫者是七有想解脫無所有處定解是其等有想定之最高最勝最殊勝秀逸最上勝妙第一是最高最勝最殊勝秀逸最上勝妙之有想解脫由信解脫而信解於其處信解信解彼行彼屢屢為彼重彼向於彼傾於彼赴於彼以彼為主此是信第一有想解脫之義彼不退住立其處之句中應住立耶與否耶如斯耶不然耶如何耶云何耶是疑之質問疑念之質問迷惑之質問此是可住立耶與否耶之義於其處者是無所有處不退去者是不退去不動轉不離去不消失或又不染不污不昏迷不染污此是彼不退住立其處之義故彼婆羅門言尊者優波私婆曰一切諸欲於離貪捨他依止無所有第一有想解脫信彼不退住立其處四世尊宣示優波私婆一切諸欲於離貪捨他依止無所有信第一有想解脫彼不退住立其處一七二一切諸欲於離貪之句中一切者是普皆一切之一切無殘無餘此是一切於諸欲者欲若概言之是事欲與煩惱欲之二欲乃至二七頁參照此等言為事欲乃至二八頁參照此等言為煩惱欲一切諸欲於離貪者於一切諸欲離貪棄貪唾棄貪脫貪捨斷貪捨遣貪能鎮伏所貪此是一切諸欲於離貪之義世尊宣示優波私婆之句中優波私婆是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同為施設者此是世尊宣示優波私婆之義捨他依止無所有捨下之六定遣遍捨越超越離越而依止無所有處定正著繫著近著縛著信解此是捨他依止無所有之義信第一有想解脫之句中有想解脫是七有想解脫無所有處定解脫是其等有想定之最高最勝最殊勝秀逸最上勝妙由信解解脫第一最高最勝最殊勝秀逸最上勝妙之有想解脫而信解信解其處信解彼行彼屢屢為彼重彼向於彼傾於彼赴於彼以彼為主此是信第一有想解脫之義彼不退住立其處之句中住立者可住立可住立六萬劫之間於其處者是於無所有處不退去是不退去不動轉不離去不消失而不滅損或又不染不污不昏迷不染污此是彼不退去住立其處之義故世尊宣示世尊宣示優波私婆一切諸欲於離貪捨他依止無所有信第一有想解脫彼不退住立其處五若彼不退無所有其處多年之住立普眼者其處解脫彼可成為清涼耶又如斯者之識者當於可為亡滅耶一七三若彼不退去其處若住立之句中若彼住立者是若彼可住六萬劫之間其處者是無所有處不退去者是不退去不動轉不離去不消失不滅損或又不染不污不昏迷不染污此是若彼不退去其處為住立之義普眼者多年之句中多年者是多年數年數百年數千年數十萬年數百劫數千劫數十萬劫普眼者是言一切知智為普眼乃至一六二頁參照如來以其故是普眼者此是普眼者多年之義彼解脫其處可成清涼耶又如斯者之識可為亡滅耶者彼得其處清涼之狀態是恆常恆不變易而可永久住立於其處耶又彼之識亡斷絶滅為非有欲界色界無色界之結生識而可生起耶問生於無所有處者之常與斷或在其處而可於無餘涅槃界般涅槃耶又說彼之識亡而更為欲界色界無色界之結生識可生起耶問於無所有處生者之般涅槃與結生如斯者是於無所有處生起之如斯者如是住立彼之類彼之部類者此是彼解脫其處可為清涼耶又如斯者之識可為亡滅耶之義故彼婆羅門言若彼不退無所有其處多年之住立普眼者其處解脫彼可成為清涼耶又如斯者之識者當於可為亡滅耶六世尊宣示優波私婆譬如於強風吹飛之火焰又如至滅沒不入存在數如斯之牟尼名身識解脫又如至滅沒不入存在數一七四譬如於強風吹飛之火焰之句中火焰者是火之焰風是東風西風北風南風有塵風無塵風寒風熱風微風烈風毗嵐風颱風翼風金翅鳥風多羅葉扇風譬如於強風吹飛之火焰者是強風所吹飛被吹起斥散除去伏鎮伏者此是譬如於強風吹飛之火焰之義世尊宣示優波私婆之句中優波私婆是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示優波私婆之義至滅沒不入存在數之句中至滅沒者是至於滅沒赴於滅沒行於滅沒滅寂滅終熄不入於數者謂行於此方向而不入可言之數不可指示不可數不可認此是至滅沒不入於數之義如斯之牟尼名身之解脫之句中斯者是譬喻與事實為照合句牟尼者智言為牟那乃至八四頁以下參照超著與網此為牟尼名身之解脫彼牟尼原來既解脫名身解脫色身由彼分捨斷超越捨斷鎮伏捨斷而捨斷彼牟尼來於有之邊最終而獲得四聖道獲得四聖道故而亦遍知名身色身遍知名身色身故而由究竟解脫而脫名身色身已解脫此是如斯之牟尼名身之解脫之義至滅沒不入數之句中至滅沒者是於無餘涅槃界而般涅槃於無餘涅槃界而般涅槃不入於存在之數剎帝利婆羅門毗舍首陀在家者出家者天人有色者無色者有想者無想者非想非非想者無可稱計彼因無緣無原因不入存在之數不可指示不可數不可認此是至滅沒不入數之義故世尊宣示世尊宣示優波私婆譬如於強風吹飛之火焰又如至滅沒不入存在數如斯之牟尼名身識解脫又如至滅沒不入存在數七滅沒之彼或非有或是常恆而無病牟尼願彼為解說此法尊師如實知一七五滅沒之彼或非有者是滅沒之彼或此非有耶彼滅斷絶亡滅耶此是滅沒之彼或非有之義或是常恆而無病者或是恆常恆不變易者而可永久住立於其處耶此或是常恆而無病之義牟尼願彼為解說之句中彼者是我問我乞我求我信樂牟尼者言智為牟那乃至八四頁以下參照超著網者是牟尼願彼為解說願請為語言示施設確立開顯分別顯示說明此是牟尼願彼為解說之義此法尊師如實知者是尊師如實知此法識考量度知辨知明暸此是此法尊師如實知之義故彼婆羅門言滅沒之彼或非有或是常恆而無病牟尼願彼為解說此法尊師如實知八世尊宣示優波私婆滅沒者無有非有量彼不言有非有彼己無其所煩惱一切諸法害破時一切語路被害破一七六滅沒者無有量者於滅沒無餘涅槃界般涅槃者無有色之量無有受之量想之量行之量識之量不存在不能得被捨斷正斷寂滅安息不得生起以智火所燒者此是滅沒者無有量之義世尊宣示優波私婆之句中優波私婆是世尊呼彼婆羅門之名世尊者是尊重之同義語乃至一二頁以下參照此謂世尊語是與作證共同施設者此是世尊宣示優波私婆之義於彼無可所言彼可言由彼貪而染可言由彼瞋而怒可言由彼癡而昏迷可言由彼慢而結縛可言由彼見而執取可言由彼掉舉而散亂可言由彼疑而不決定可言由彼隨眠而強力其捨斷等諸行於諸行之捨斷故可言由彼趣彼地獄有情畜生餓鬼人天有色者無色者有想者無想者非想非非想者可語可言彼無因無緣無原因此是於彼無可所言彼之義一切諸法害破時者是一切諸法一切諸蘊一切諸處一切諸界一切諸趣一切諸生起一切諸結生一切諸有一切諸輪回一切諸輪轉被破害破取去取除壞破壞捨斷正斷而寂滅安息不得生起以智火所燒之時此是一切諸法害破時之義一切語路被害破之句中語路者是煩惱蘊行彼之語語路增語增語路辭辭路施設施設路破害破取去取除壞破壞捨斷正斷而寂滅安息不得生起以智火所燒之此是一切語路被害破之義故世尊宣示世尊宣示優波私婆滅沒者無有非有量彼不可言有非有彼已無其所煩惱一切諸法害破時一切語路被害破世尊之說法終乃至三二頁參照尊師世尊是我師我是弟子而坐優波私婆學童所問之義釋第六畢
